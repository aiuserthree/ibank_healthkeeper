# HTTP → HTTPS 리다이렉트 + ACME 갱신
server {
    listen 80;
    listen [::]:80;
    server_name healthkeeper.ibank.co.kr;

    location /.well-known/acme-challenge/ {
        root /var/www/certbot;
    }

    location / {
        return 301 https://$host$request_uri;
    }
}

# HTTPS
server {
    listen 443 ssl http2;
    listen [::]:443 ssl http2;
    server_name healthkeeper.ibank.co.kr;

    ssl_certificate /etc/healthkeeper/ssl/fullchain.pem;
    ssl_certificate_key /etc/healthkeeper/ssl/privkey.pem;
    ssl_protocols TLSv1.2 TLSv1.3;
    ssl_prefer_server_ciphers off;
    ssl_session_cache shared:SSL:10m;
    ssl_session_timeout 1d;

    include /opt/healthkeeper/deploy/nginx/app-locations.inc;
}

# IP 직접 접속 (SSL 인증서 없음)
server {
    listen 80 default_server;
    listen [::]:80 default_server;
    server_name 115.68.221.73;

    include /opt/healthkeeper/deploy/nginx/app-locations.inc;
}
