# HTTP only — Let's Encrypt 인증서 발급 전·실패 시 사용
server {
    listen 80;
    listen [::]:80;
    server_name healthkeeper.ibank.co.kr;

    location /.well-known/acme-challenge/ {
        root /var/www/certbot;
    }

    include /opt/healthkeeper/deploy/nginx/app-locations.inc;
}

# IP 직접 접속 (SSL 인증서 없음)
server {
    listen 80 default_server;
    listen [::]:80 default_server;
    server_name 115.68.221.73;

    include /opt/healthkeeper/deploy/nginx/app-locations.inc;
}
