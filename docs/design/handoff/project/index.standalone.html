const { useEffect } = React;

function Icon({ name, size = 18, color, style }) {
  return <i data-lucide={name} style={{ width: size, height: size, color, display: "inline-flex", ...style }} />;
}

const MEMBER = [
  { icon: "home", title: "서비스 소개 (홈)", desc: "헬스키퍼 안내 · 운영 사이클 · 정책 요약", href: "사용자/index.html" },
  { icon: "user-plus", title: "회원가입", desc: "이메일 인증코드 → 기본정보(부서·직급) → 완료", href: "사용자/회원가입.html" },
  { icon: "log-in", title: "로그인", desc: "인증 계정 로그인 · 미인증/실패 처리", href: "사용자/로그인.html" },
  { icon: "calendar-days", title: "예약하기 (캘린더)", desc: "주간 슬롯 · 상태 전환 · 우선권 경합", href: "사용자/예약하기.html" },
  { icon: "rotate-ccw", title: "탈락자 재신청", desc: "빈 슬롯 선착순 · 즉시 확정 · 충돌 거절", href: "사용자/재신청.html" },
  { icon: "list-checks", title: "마이페이지 · 예약 내역", desc: "상태별 내역 · 마감 전 취소", href: "사용자/마이페이지-예약내역.html" },
  { icon: "user-round-cog", title: "마이페이지 · 내 정보", desc: "정보 수정 · 비밀번호 변경 · 탈퇴", href: "사용자/마이페이지-내정보.html" },
];
const ADMIN = [
  { icon: "shield", title: "관리자 로그인", desc: "관리자 인증 · 실패 처리", href: "관리자/로그인.html" },

  { icon: "scale", title: "신청자 상세 · 우선권", desc: "우선권 자동 정렬 · 수동 확정 · 탈락", href: "관리자/신청자상세.html" },

      <p style={{ fontSize: 14.5, color: "var(--text-secondary)", margin: "0 0 18px" }}>{sub}</p>
      <div style={{ display: "flex", flexDirection: "column", gap: 10 }}>
        {items.map((it, i) => (
          <a key={it.href} href={it.href} style={{ textDecoration: "none" }}>
            <div className="hub-card" style={{ display: "flex", alignItems: "center", gap: 14, padding: "16px 18px", background: "var(--surface-card)",
              border: "1px solid var(--border-default)", borderRadius: "var(--radius-md, 8px)", boxShadow: "var(--shadow-xs)", transition: "transform .14s var(--ease-standard), box-shadow .14s" }}>
              <div style={{ width: 28, textAlign: "center", fontSize: 12, fontWeight: 700, color: "var(--text-muted)" }}>{String(i + 1).padStart(2, "0")}</div>
              <div style={{ width: 42, height: 42, borderRadius: 10, background: "var(--color-signal-blue-soft)", display: "flex", alignItems: "center", justifyContent: "center", flexShrink: 0 }}>
                <Icon name={it.icon} size={21} color="var(--color-signal-blue)" />
              </div>
              <div style={{ flex: 1, minWidth: 0 }}>
                <div style={{ fontSize: 15.5, fontWeight: 700, color: "var(--color-midnight-navy)" }}>{it.title}</div>
                <div style={{ fontSize: 13, color: "var(--text-secondary)", marginTop: 1 }}>{it.desc}</div>
              </div>
              <Icon name="arrow-right" size={18} color="var(--color-steel-blue)" />
            </div>
          </a>
        ))}
      </div>
    </section>
  );
}

function Hub() {

  return (
    <>
      <header style={{ background: "var(--surface-card)", borderBottom: "1px solid var(--border-default)" }}>
        <div style={{ maxWidth: 1100, margin: "0 auto", padding: "0 32px", height: 72, display: "flex", alignItems: "center" }}>
          <img src={window.__resources.logoLockup} alt="헬스키퍼" height="34" />
          <div style={{ flex: 1 }} />
          <span style={{ fontSize: 13, color: "var(--text-muted)" }}>화면 설계 · 전체 페이지</span>
        </div>
      </header>

      <main style={{ maxWidth: 1100, margin: "0 auto", padding: "48px 32px 72px" }}>

        <div style={{ display: "grid", gridTemplateColumns: "1fr 1fr", gap: 48, alignItems: "start" }}>

          <Column tag="ADMIN" tagColor="#0b3558" title="관리자 화면" sub="서비스 운영자" items={ADMIN} />

            </div>
            <div style={{ flex: 1, minWidth: 0 }}>
              <div style={{ display: "flex", alignItems: "center", gap: 10 }}>

              </div>
              <div style={{ fontSize: 13.5, color: "var(--text-secondary)", marginTop: 3 }}>인증 · 예약 완료(일반/재신청) · 탈락/재신청 안내 — 메일 발송 정책 기반 4종</div>
            </div>
            <Icon name="arrow-right" size={18} color="var(--color-steel-blue)" />

      <footer style={{ borderTop: "1px solid var(--border-default)", background: "var(--surface-card)" }}>
        <div style={{ maxWidth: 1100, margin: "0 auto", padding: "24px 32px", display: "flex", alignItems: "center", gap: 12 }}>

      <style>{`.hub-card:hover{transform:translateY(-2px);box-shadow:var(--shadow-sm)!important;border-color:var(--color-steel-blue)!important}`}</style>
    </>
  );
