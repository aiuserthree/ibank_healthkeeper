<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>헬스키퍼 관리자 — 운영 설정</title>
<script src="https://unpkg.com/react@18.3.1/umd/react.development.js" integrity="sha384-hD6/rw4ppMLGNu3tX5cjIb+uRZ7UkRJ6BPkLpg4hAu/6onKUg4lLsHAs9EBPT82L" crossorigin="anonymous"></script>
<script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.development.js" integrity="sha384-u6aeetuaXnQ38mYT8rp6sbXaQe3NL9t+IBXmnYxwkUI2Hw4bsp2Wvmx4yRQF1uAm" crossorigin="anonymous"></script>
<script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js" integrity="sha384-m08KidiNqLdpJqLq95G/LEi8Qvjl/xUYll3QILypMoQ65QorJ9Lvtp2RXYGBFj1y" crossorigin="anonymous"></script>
<script src="https://unpkg.com/lucide@0.460.0/dist/umd/lucide.min.js"></script>
<script>
(function(){ if (window.ReactDOM && ReactDOM.createRoot && !ReactDOM.__hkPatched) { var o = ReactDOM.createRoot.bind(ReactDOM); ReactDOM.createRoot = function (c, p) { if (!c || (c.id === "root" && !window.__hkReady)) return { render:function(){}, unmount:function(){} }; return o(c, p); }; ReactDOM.__hkPatched = true; } })();
</script>
<link rel="stylesheet" href="../_ds/healthkeeper-ds-31e44bd2-68dd-4c55-91c3-7ca10811b6be/styles.css">
<script src="../_ds/healthkeeper-ds-31e44bd2-68dd-4c55-91c3-7ca10811b6be/_ds_bundle.js"></script>
<link rel="stylesheet" href="../_shared/responsive.css">
<meta name="ext-resource-dependency" content="../assets/logo-mark.svg" data-resource-id="logoMark" />
<style>
  html,body{height:100%}
  body{margin:0;background:var(--surface-canvas,#f8f9fb);color:var(--text-body,#0a0a0a)}
</style>
</head>
<body>
<template id="__bundler_thumbnail" data-bg-color="#0b3558"><svg viewBox="0 0 1200 800" xmlns="http://www.w3.org/2000/svg"><rect width="1200" height="800" fill="#0b3558"></rect><circle cx="600" cy="356" r="150" fill="none" stroke="#ffffff" stroke-width="28"></circle><path d="M538 360 L585 407 L672 308" fill="none" stroke="#ffffff" stroke-width="34" stroke-linecap="round" stroke-linejoin="round"></path><circle cx="726" cy="242" r="38" fill="#006bff"></circle></svg></template>
<div id="root"></div>
<script type="text/babel" src="../_shared/admin-shell.js" data-presets="react"></script>
<script type="text/babel" data-presets="react">
const NS = "HealthkeeperDS_31e44b";
const { Icon, PageHead, Shell, boot } = window.AdminUI;
const { useState } = React;

// 4종 메일 템플릿 — 제목/본문 기본값 + 실제 미리보기 파일(이메일/ 폴더)
const MAIL_TPL = {
  verify: {
    label: "이메일 인증 메일",
    subject: "[헬스키퍼] 이메일 인증코드 안내",
    body: "안녕하세요.\n헬스키퍼 회원가입을 진행 중이시군요. 아래 인증코드를 회원가입 화면에 입력하면 이메일 인증이 완료됩니다.\n\n인증코드: {인증코드}\n\n· 인증코드는 발송 후 5분 동안 유효합니다.\n· 본인이 요청하지 않았다면 이 메일을 무시하셔도 됩니다.",
    file: "../이메일/01-이메일인증.html",
  },
  confirm: {
    label: "예약 완료 메일 (일반)",
    subject: "[헬스키퍼] 예약이 확정되었습니다",
    body: "안녕하세요, {이름}님.\n신청하신 안마서비스 예약이 관리자 확정으로 완료되었습니다.\n\n날짜: {날짜}\n시간: {시간}\n\n· 일반 신청 취소는 마감(수요일 17:00) 전까지 가능합니다.",
    file: "../이메일/02-예약완료-일반.html",
  },
  "confirm-re": {
    label: "예약 완료 메일 (재신청)",
    subject: "[헬스키퍼] 재신청 예약이 확정되었습니다",
    body: "안녕하세요, {이름}님.\n선착순 재신청이 즉시 확정되었습니다.\n\n날짜: {날짜}\n시간: {시간}\n\n· 재신청 건은 취소할 수 없습니다.",
    file: "../이메일/03-예약완료-재신청.html",
  },
  reapply: {
    label: "탈락 / 재신청 안내 메일",
    subject: "[헬스키퍼] 탈락 안내 및 재신청 가능 슬롯 안내",
    body: "안녕하세요, {이름}님.\n신청하신 시간대는 우선권에 따라 탈락 처리되었습니다.\n\n비어있는 슬롯: {빈슬롯목록}\n재신청 마감: 내일(목) 17:00\n\n· 재신청은 선착순으로 즉시 확정되며 취소할 수 없습니다.",
    file: "../이메일/04-탈락-재신청안내.html",
  },
};

function SectionCard({ icon, title, desc, children }) {
  const { Card } = window[NS];
  return (
    <Card padded>
      <div style={{ display: "flex", gap: 12, alignItems: "flex-start", marginBottom: 18 }}>
        <div style={{ width: 38, height: 38, borderRadius: 9, background: "var(--color-signal-blue-soft)", display: "flex", alignItems: "center", justifyContent: "center", flexShrink: 0 }}>
          <Icon name={icon} size={20} color="var(--color-signal-blue)" />
        </div>
        <div>
          <h2 style={{ fontSize: 18, margin: 0 }}>{title}</h2>
          {desc && <p style={{ fontSize: 13.5, color: "var(--text-secondary)", margin: "3px 0 0" }}>{desc}</p>}
        </div>
      </div>
      {children}
    </Card>
  );
}

function Page() {
  const { Button, Card, Input, Select, Switch, Textarea, Toast } = window[NS];
  const [toast, setToast] = useState(null);
  const flash = (m) => { setToast(m); setTimeout(() => setToast(null), 2800); };
  const save = () => flash("운영 설정이 저장되었습니다");

  // 메일 템플릿 상태
  const [tplKey, setTplKey] = useState("reapply");
  const [subject, setSubject] = useState(MAIL_TPL.reapply.subject);
  const [body, setBody] = useState(MAIL_TPL.reapply.body);
  const [preview, setPreview] = useState(null);
  const pickTpl = (k) => { setTplKey(k); setSubject(MAIL_TPL[k].subject); setBody(MAIL_TPL[k].body); };
  const restore = () => { setSubject(MAIL_TPL[tplKey].subject); setBody(MAIL_TPL[tplKey].body); flash("기본 문구로 복원했습니다"); };

  return (
    <Shell active="settings">
      <PageHead title="운영 설정" sub="운영 시간 · 오픈/마감 · 재신청 창 · 메일 템플릿"
        right={<Button variant="primary" onClick={save}>설정 저장</Button>} />

      <div style={{ display: "grid", gridTemplateColumns: "1fr 1fr", gap: 16, alignItems: "start" }}>
        <SectionCard icon="clock" title="운영 시간 · 슬롯" desc="기본 13:30~17:00, 하루 4타임">
          <div style={{ display: "flex", flexDirection: "column", gap: 12 }}>
            <div style={{ display: "grid", gridTemplateColumns: "1fr 1fr", gap: 12 }}>
              <Input label="운영 시작" defaultValue="13:30" />
              <Input label="운영 종료" defaultValue="17:00" />
            </div>
            <div style={{ display: "grid", gridTemplateColumns: "1fr 1fr", gap: 12 }}>
              <Input label="타임 길이 (분)" defaultValue="30" />
              <Input label="휴식 시간 (분)" defaultValue="30" />
            </div>
            <div style={{ padding: "10px 12px", background: "var(--color-mist)", borderRadius: "var(--radius-sm)", fontSize: 12.5, color: "var(--text-secondary)" }}>
              현재 슬롯 — 13:30 / 14:30 / 15:30 / 16:30 · 주당 최대 20슬롯
            </div>
          </div>
        </SectionCard>

        <SectionCard icon="calendar-clock" title="오픈 / 마감" desc="현재 수요일 09:00 오픈 · 17:00 마감">
          <div style={{ display: "flex", flexDirection: "column", gap: 12 }}>
            <Select label="오픈 요일" defaultValue="wed" options={[
              { value: "mon", label: "월요일" }, { value: "tue", label: "화요일" }, { value: "wed", label: "수요일" }, { value: "thu", label: "목요일" }, { value: "fri", label: "금요일" }]} />
            <div style={{ display: "grid", gridTemplateColumns: "1fr 1fr", gap: 12 }}>
              <Input label="예약 오픈" defaultValue="09:00" />
              <Input label="예약 마감" defaultValue="17:00" />
            </div>
          </div>
        </SectionCard>

        <SectionCard icon="rotate-ccw" title="재신청 창" desc="탈락자 한정 · 선착순 · 즉시 확정">
          <div style={{ display: "flex", flexDirection: "column", gap: 12 }}>
            <div style={{ display: "grid", gridTemplateColumns: "1fr 1fr", gap: 12 }}>
              <Input label="재신청 시작" defaultValue="수 17:00" disabled hint="마감 직후 자동" />
              <Input label="재신청 마감" defaultValue="목 17:00" />
            </div>
            <Switch label="재신청 즉시 확정 (취소 불가)" defaultChecked />
            <Switch label="동시 신청 시 슬롯 락 처리" defaultChecked />
          </div>
        </SectionCard>

        <SectionCard icon="mail" title="메일 자동 발송" desc="발송 시점별 자동화 설정">
          <div style={{ display: "flex", flexDirection: "column", gap: 12 }}>
            <Switch label="예약 완료 메일 자동 발송 (확정 시)" defaultChecked />
            <Switch label="탈락 / 재신청 안내 자동 발송 (마감 시)" defaultChecked />
            <Switch label="이메일 인증 메일 발송" defaultChecked />
            <Switch label="발송 실패 시 재시도 큐 사용" defaultChecked />
          </div>
        </SectionCard>
      </div>

      {/* 메일 템플릿 */}
      <div style={{ marginTop: 16 }}>
        <SectionCard icon="file-text" title="메일 템플릿" desc="발송 메일 양식을 관리합니다">
          <div style={{ display: "grid", gridTemplateColumns: "1fr 1fr", gap: 16 }}>
            <div style={{ display: "flex", flexDirection: "column", gap: 12 }}>
              <Select label="템플릿 선택" value={tplKey} onChange={e => pickTpl(e.target.value)}
                options={Object.entries(MAIL_TPL).map(([value, t]) => ({ value, label: t.label }))} />
              <Input label="메일 제목" value={subject} onChange={e => setSubject(e.target.value)} />
            </div>
            <Textarea label="메일 내용" rows={8} value={body} onChange={e => setBody(e.target.value)} />
          </div>
          <div style={{ marginTop: 14, display: "flex", gap: 10, alignItems: "center" }}>
            <Button variant="primary" size="sm" iconLeft={<Icon name="eye" size={16} color="#fff" />} onClick={() => setPreview(MAIL_TPL[tplKey].file)}>미리보기</Button>
            <Button variant="secondary" size="sm" onClick={() => flash("메일 템플릿이 저장되었습니다")}>템플릿 저장</Button>
            <Button variant="ghost" size="sm" onClick={restore}>기본값 복원</Button>
            <span style={{ fontSize: 12.5, color: "var(--text-muted)" }}>· {`{이름}`} {`{날짜}`} {`{인증코드}`} 등 변수는 발송 시 치환됩니다</span>
          </div>
        </SectionCard>
      </div>

      {preview && (
        <div onClick={() => setPreview(null)} style={{ position: "fixed", inset: 0, background: "rgba(11,53,88,0.4)", backdropFilter: "blur(2px)", zIndex: 300, display: "flex", alignItems: "center", justifyContent: "center", padding: 24 }}>
          <div onClick={e => e.stopPropagation()} style={{ width: 660, maxWidth: "100%", maxHeight: "88vh", background: "var(--surface-card)", borderRadius: "var(--radius-md, 8px)", overflow: "hidden", display: "flex", flexDirection: "column", boxShadow: "var(--shadow-lg)" }}>
            <div style={{ display: "flex", alignItems: "center", gap: 12, padding: "15px 18px", borderBottom: "1px solid var(--border-default)" }}>
              <Icon name="mail" size={18} color="var(--color-signal-blue)" />
              <div style={{ flex: 1, minWidth: 0 }}>
                <div style={{ fontSize: 14, fontWeight: 700, color: "var(--color-midnight-navy)", overflow: "hidden", textOverflow: "ellipsis", whiteSpace: "nowrap" }}>{subject}</div>
                <div style={{ fontSize: 12, color: "var(--text-muted)" }}>{MAIL_TPL[tplKey].label} · 미리보기</div>
              </div>
              <a href={preview} target="_blank" style={{ fontSize: 13, fontWeight: 600, color: "var(--color-signal-blue)", textDecoration: "none", display: "inline-flex", alignItems: "center", gap: 4 }}>새 창 <Icon name="external-link" size={14} color="var(--color-signal-blue)" /></a>
              <button onClick={() => setPreview(null)} aria-label="닫기" style={{ border: "none", background: "transparent", cursor: "pointer", padding: 6, display: "flex" }}><Icon name="x" size={20} color="var(--color-slate-blue)" /></button>
            </div>
            <div style={{ background: "#eef1f6", overflow: "auto", flex: 1 }}>
              <iframe src={preview} title="메일 미리보기" style={{ width: "100%", height: 760, border: "none", display: "block" }}></iframe>
            </div>
          </div>
        </div>
      )}

      {toast && (
        <div style={{ position: "fixed", bottom: 28, left: "calc(50% + 120px)", transform: "translateX(-50%)", zIndex: 200 }}>
          <Toast variant="success">{toast}</Toast>
        </div>
      )}
    </Shell>
  );
}
boot(() => <Page />);
</script>
</body>
</html>
