<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>헬스키퍼 관리자 — 휴가 관리</title>
<script src="https://unpkg.com/react@18.3.1/umd/react.development.js" integrity="sha384-hD6/rw4ppMLGNu3tX5cjIb+uRZ7UkRJ6BPkLpg4hAu/6onKUg4lLsHAs9EBPT82L" crossorigin="anonymous"></script>

<script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js" integrity="sha384-m08KidiNqLdpJqLq95G/LEi8Qvjl/xUYll3QILypMoQ65QorJ9Lvtp2RXYGBFj1y" crossorigin="anonymous"></script>

<script>
(function(){ if (window.ReactDOM && ReactDOM.createRoot && !ReactDOM.__hkPatched) { var o = ReactDOM.createRoot.bind(ReactDOM); ReactDOM.createRoot = function (c, p) { if (!c || (c.id === "root" && !window.__hkReady)) return { render:function(){}, unmount:function(){} }; return o(c, p); }; ReactDOM.__hkPatched = true; } })();
</script>
<link rel="stylesheet" href="../_ds/healthkeeper-ds-31e44bd2-68dd-4c55-91c3-7ca10811b6be/styles.css">
<script src="../_ds/healthkeeper-ds-31e44bd2-68dd-4c55-91c3-7ca10811b6be/_ds_bundle.js"></script>
<link rel="stylesheet" href="../_shared/responsive.css">
<meta name="ext-resource-dependency" content="../assets/logo-mark.svg" data-resource-id="logoMark" />
<style>
  html,body{height:100%}
  body{margin:0;background:var(--surface-canvas,#f8f9fb);color:var(--text-body,#0a0a0a)}
</style>
</head>
<body>
<template id="__bundler_thumbnail" data-bg-color="#0b3558"><svg viewBox="0 0 1200 800" xmlns="http://www.w3.org/2000/svg"><rect width="1200" height="800" fill="#0b3558"></rect><circle cx="600" cy="356" r="150" fill="none" stroke="#ffffff" stroke-width="28"></circle><path d="M538 360 L585 407 L672 308" fill="none" stroke="#ffffff" stroke-width="34" stroke-linecap="round" stroke-linejoin="round"></path><circle cx="726" cy="242" r="38" fill="#006bff"></circle></svg></template>
<div id="root"></div>
<script type="text/babel" src="../_shared/admin-shell.js" data-presets="react"></script>
<script type="text/babel" data-presets="react">
const NS = "HealthkeeperDS_31e44b";
const { Icon, PageHead, Shell, boot, DAYS } = window.AdminUI;
const { useState } = React;

function Page() {
  const { Button, Card, Badge, Switch, Alert, Toast, Dialog } = window[NS];
  const [phase, setPhase] = useState("before");        // before | after (오픈 전/후)
  const [off, setOff] = useState({ "6/24": true });
  const [toast, setToast] = useState(null);
  const [blocked, setBlocked] = useState(false);
  const locked = phase === "after";

  const toggle = (d) => {
    if (locked) { setBlocked(true); return; }
    setOff(o => ({ ...o, [d]: !o[d] }));
  };
  const save = () => { setToast("휴가 일정이 저장되었습니다"); setTimeout(() => setToast(null), 2800); };

  return (
    <Shell active="vacation">
      <PageHead title="휴가 관리"
        sub="예약 오픈(수요일 09:00) 전에만 안마사 휴가를 지정할 수 있어요"
        right={
          <div style={{ display: "flex", gap: 6 }}>
            {[["before", "오픈 전"], ["after", "오픈 후"]].map(([k, l]) => (
              <button key={k} onClick={() => setPhase(k)} style={{ padding: "8px 14px", borderRadius: 999, cursor: "pointer", font: "inherit", fontSize: 13, fontWeight: 600,
                border: "1px solid " + (phase === k ? "var(--color-signal-blue)" : "var(--border-default)"),
                background: phase === k ? "var(--color-signal-blue-soft)" : "var(--surface-card)",
                color: phase === k ? "var(--color-info-blue)" : "var(--color-slate-blue)" }}>데모: {l}</button>
            ))}
          </div>
        } />

      {locked ? (
        <Alert variant="danger" title="예약이 오픈되어 휴가를 수정할 수 없습니다">
          예약 오픈(수 09:00) 이후에는 해당 주차 휴가를 등록·수정할 수 없습니다. 다음 차주 일정에 대해 오픈 전에 등록해 주세요.
        </Alert>
      ) : (
        <Alert variant="info" title="차주 일정 · 6/22(월) – 6/26(금)">
          휴가로 지정한 날짜는 회원 예약 화면에서 <b>예약 불가</b>로 표시됩니다. 오픈 후에는 수정할 수 없습니다.
        </Alert>
      )}

      <div style={{ display: "grid", gridTemplateColumns: "repeat(5,1fr)", gap: 16, marginTop: 24 }}>
        {DAYS.map(dy => {
          const isOff = !!off[dy.date];
          return (
            <Card key={dy.date} padded style={{ borderColor: isOff ? "var(--color-danger)" : "var(--border-default)",
              background: isOff ? "var(--color-danger-soft)" : "var(--surface-card)", opacity: locked ? 0.85 : 1 }}>
              <div style={{ textAlign: "center" }}>
                <div style={{ fontSize: 22, fontWeight: 700, color: "var(--color-midnight-navy)" }}>{dy.d}</div>
                <div style={{ fontSize: 13, color: "var(--text-muted)", marginBottom: 16 }}>{dy.date}</div>
                {isOff ? <Badge variant="danger" dot>휴가</Badge> : <Badge variant="success" dot>운영</Badge>}
                <div style={{ marginTop: 18, display: "flex", justifyContent: "center" }}>
                  <Switch checked={isOff} onChange={() => toggle(dy.date)} disabled={locked} />
                </div>
              </div>
            </Card>
          );
        })}
      </div>

      <div style={{ marginTop: 24, display: "flex", gap: 10, alignItems: "center" }}>
        <Button variant="primary" disabled={locked} onClick={save}>휴가 저장</Button>
        <Button variant="secondary" disabled={locked}>변경 취소</Button>
        <div style={{ flex: 1 }} />
        <span style={{ fontSize: 13, color: "var(--text-secondary)" }}>
          휴가 {Object.values(off).filter(Boolean).length}일 지정됨 · 예약 가능 {5 - Object.values(off).filter(Boolean).length}일
        </span>
      </div>

      <Dialog open={blocked} title="등록할 수 없습니다" confirmLabel="확인" hideCancel onConfirm={() => setBlocked(false)} onCancel={() => setBlocked(false)}>
        예약 오픈 후에는 해당 주차 휴가를 등록할 수 없습니다.
      </Dialog>

      {toast && (
        <div style={{ position: "fixed", bottom: 28, left: "calc(50% + 120px)", transform: "translateX(-50%)", zIndex: 200 }}>
          <Toast variant="success">{toast}</Toast>
        </div>
      )}
    </Shell>
  );
}
boot(() => <Page />);
</script>
</body>
</html>
