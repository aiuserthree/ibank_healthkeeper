<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>헬스키퍼 관리자 — 신청자 상세</title>
<script src="https://unpkg.com/react@18.3.1/umd/react.development.js" integrity="sha384-hD6/rw4ppMLGNu3tX5cjIb+uRZ7UkRJ6BPkLpg4hAu/6onKUg4lLsHAs9EBPT82L" crossorigin="anonymous"></script>
<script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.development.js" integrity="sha384-u6aeetuaXnQ38mYT8rp6sbXaQe3NL9t+IBXmnYxwkUI2Hw4bsp2Wvmx4yRQF1uAm" crossorigin="anonymous"></script>
<script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js" integrity="sha384-m08KidiNqLdpJqLq95G/LEi8Qvjl/xUYll3QILypMoQ65QorJ9Lvtp2RXYGBFj1y" crossorigin="anonymous"></script>
<script src="https://unpkg.com/lucide@0.460.0/dist/umd/lucide.min.js"></script>
<script>
(function(){ if (window.ReactDOM && ReactDOM.createRoot && !ReactDOM.__hkPatched) { var o = ReactDOM.createRoot.bind(ReactDOM); ReactDOM.createRoot = function (c, p) { if (!c || (c.id === "root" && !window.__hkReady)) return { render:function(){}, unmount:function(){} }; return o(c, p); }; ReactDOM.__hkPatched = true; } })();
</script>
<link rel="stylesheet" href="../_ds/healthkeeper-ds-31e44bd2-68dd-4c55-91c3-7ca10811b6be/styles.css">
<script src="../_ds/healthkeeper-ds-31e44bd2-68dd-4c55-91c3-7ca10811b6be/_ds_bundle.js"></script>
<link rel="stylesheet" href="../_shared/responsive.css">
<meta name="ext-resource-dependency" content="../assets/logo-mark.svg" data-resource-id="logoMark" />
<style>
  html,body{height:100%}
  body{margin:0;background:var(--surface-canvas,#f8f9fb);color:var(--text-body,#0a0a0a)}
</style>
</head>
<body>
<template id="__bundler_thumbnail" data-bg-color="#0b3558"><svg viewBox="0 0 1200 800" xmlns="http://www.w3.org/2000/svg"><rect width="1200" height="800" fill="#0b3558"></rect><circle cx="600" cy="356" r="150" fill="none" stroke="#ffffff" stroke-width="28"></circle><path d="M538 360 L585 407 L672 308" fill="none" stroke="#ffffff" stroke-width="34" stroke-linecap="round" stroke-linejoin="round"></path><circle cx="726" cy="242" r="38" fill="#006bff"></circle></svg></template>
<div id="root"></div>
<script type="text/babel" src="../_shared/admin-shell.js" data-presets="react"></script>
<script type="text/babel" data-presets="react">
const NS = "HealthkeeperDS_31e44b";
const { Icon, PageHead, Shell, boot, endT } = window.AdminUI;
const { useState } = React;

const SLOTS = {
  "6/22-15:30": {
    label: "6/22(월) 15:30 – 16:00",
    manual: false,
    applicants: [
      { name: "최유진", dept: "영업팀", pos: "대리", email: "yujin.choi@ibank.co.kr", applied: "09:33", lastUse: "2025.04.02", uses: 3 },
      { name: "정현우", dept: "재무팀", pos: "사원", email: "hyunwoo.jung@ibank.co.kr", applied: "10:11", lastUse: "2025.04.28", uses: 2 },
      { name: "강다은", dept: "경영지원실", pos: "과장", email: "daeun.kang@ibank.co.kr", applied: "11:40", lastUse: "2025.06.01", uses: 5 },
    ],
  },
  "6/22-14:30": {
    label: "6/22(월) 14:30 – 15:00",
    manual: true,
    applicants: [
      { name: "박지훈", dept: "인사팀", pos: "과장", email: "jihoon.park@ibank.co.kr", applied: "09:01", lastUse: "이력 없음", uses: 0 },
      { name: "서다현", dept: "마케팅팀", pos: "사원", email: "dahyun.seo@ibank.co.kr", applied: "09:47", lastUse: "이력 없음", uses: 0 },
    ],
  },
};

function sortByPriority(list) {
  return list.slice().sort((a, b) => {
    const an = a.lastUse === "이력 없음", bn = b.lastUse === "이력 없음";
    if (an && !bn) return -1;
    if (bn && !an) return 1;
    if (an && bn) return a.applied < b.applied ? -1 : 1;     // 동률(이력없음) → 신청 시각
    if (a.lastUse !== b.lastUse) return a.lastUse < b.lastUse ? -1 : 1;
    return a.applied < b.applied ? -1 : 1;
  });
}

function Page() {
  const { Button, Card, Badge, StatusBadge, Avatar, Alert, Dialog, Toast } = window[NS];
  const [slotKey, setSlotKey] = useState("6/22-15:30");
  const [statusMap, setStatusMap] = useState({});  // email -> 확정/탈락
  const [dialog, setDialog] = useState(null);
  const [toast, setToast] = useState(null);

  const slot = SLOTS[slotKey];
  const ranked = sortByPriority(slot.applicants);
  const decided = Object.keys(statusMap).length > 0;

  const confirm = () => {
    const picked = dialog.email;
    const m = {};
    slot.applicants.forEach(a => { m[a.email] = a.email === picked ? "확정" : "탈락"; });
    setStatusMap(m);
    setToast(`${dialog.name}님 예약을 확정했습니다 · 완료 메일 발송 · 마지막 이용일 갱신`);
    setDialog(null);
    setTimeout(() => setToast(null), 3600);
  };
  const reset = () => setStatusMap({});

  return (
    <Shell active="reservations">
      <PageHead title="신청자 상세 · 우선권 확인"
        sub="동일 슬롯 신청자를 우선권 순으로 정렬합니다 · 마지막 이용일 오래된 순 → 동률 시 신청 시각"
        right={<a href="예약관리.html"><Button variant="ghost" size="sm" iconLeft={<Icon name="arrow-left" size={16} color="var(--color-slate-blue)" />}>목록으로</Button></a>} />

      {/* slot switcher */}
      <div style={{ display: "flex", gap: 8, marginBottom: 20, flexWrap: "wrap" }}>
        {Object.entries(SLOTS).map(([k, s]) => (
          <button key={k} onClick={() => { setSlotKey(k); setStatusMap({}); }}
            style={{ padding: "10px 16px", borderRadius: "var(--radius-sm)", cursor: "pointer", font: "inherit", fontSize: 14, fontWeight: 600, display: "flex", alignItems: "center", gap: 8,
              border: "1px solid " + (slotKey === k ? "var(--color-signal-blue)" : "var(--border-default)"),
              background: slotKey === k ? "var(--color-signal-blue-soft)" : "var(--surface-card)",
              color: slotKey === k ? "var(--color-info-blue)" : "var(--color-midnight-navy)" }}>
            {s.label.replace(" – ", "–").split(" ")[0]} {s.label.match(/\d{2}:\d{2}/)[0]}
            {s.manual && <span style={{ fontSize: 11, color: "var(--color-warning)", fontWeight: 700 }}>이력없음</span>}
          </button>
        ))}
      </div>

      {/* slot header */}
      <Card padded style={{ marginBottom: 16 }}>
        <div style={{ display: "flex", alignItems: "center", gap: 12, flexWrap: "wrap" }}>
          <Icon name="clock" size={20} color="var(--color-signal-blue)" />
          <span style={{ fontSize: 19, fontWeight: 700, color: "var(--color-midnight-navy)" }}>{slot.label}</span>
          <Badge variant="warning">중복 {slot.applicants.length}명</Badge>
          {decided && <Badge variant="success" dot>확정 완료</Badge>}
          <div style={{ flex: 1 }} />
          {decided && <Button variant="ghost" size="sm" onClick={reset}>다시 보기</Button>}
        </div>
      </Card>

      {slot.manual ? (
        <div style={{ marginBottom: 16 }}>
          <Alert variant="warning" title="자동 우선권 판단 불가 · 수동 확정 필요">
            신청자 전원이 <b>이력 없음</b>입니다. 우선권을 자동으로 정할 수 없으니 관리자가 직접 1명을 확정해 주세요. (동률 기준은 신청 시각)
          </Alert>
        </div>
      ) : (
        <div style={{ marginBottom: 16 }}>
          <Alert variant="info" title="우선권 1순위가 자동 정렬되었습니다">
            마지막 이용일이 가장 오래된 <b>{ranked[0].name}</b>님이 1순위입니다. 확정하면 나머지 신청자는 자동으로 <b>탈락</b> 처리됩니다.
          </Alert>
        </div>
      )}

      {/* applicants */}
      <div style={{ display: "flex", flexDirection: "column", gap: 12 }}>
        {ranked.map((a, i) => {
          const st = statusMap[a.email];
          const isTop = i === 0;
          return (
            <Card key={a.email} padded style={{ borderColor: st === "확정" ? "var(--color-success)" : (isTop && !decided && !slot.manual ? "var(--color-signal-blue)" : "var(--border-default)"),
              borderWidth: (st === "확정" || (isTop && !decided && !slot.manual)) ? 2 : 1, borderStyle: "solid",
              background: st === "확정" ? "var(--color-success-soft)" : "var(--surface-card)" }}>
              <div style={{ display: "flex", alignItems: "center", gap: 16, flexWrap: "wrap" }}>
                <div style={{ width: 32, height: 32, borderRadius: 999, display: "flex", alignItems: "center", justifyContent: "center", flexShrink: 0,
                  background: isTop && !slot.manual ? "var(--color-signal-blue)" : "var(--color-fog)", color: isTop && !slot.manual ? "#fff" : "var(--color-slate-blue)", fontWeight: 700, fontSize: 14 }}>{i + 1}</div>
                <Avatar name={a.name} size="md" />
                <div style={{ minWidth: 160 }}>
                  <div style={{ display: "flex", alignItems: "center", gap: 8 }}>
                    <span style={{ fontSize: 16, fontWeight: 700, color: "var(--color-midnight-navy)" }}>{a.name}</span>
                    {isTop && !slot.manual && !decided && <Badge variant="info">우선권 1순위</Badge>}
                  </div>
                  <div style={{ fontSize: 13, color: "var(--color-slate-blue)", fontWeight: 600 }}>{a.dept} · {a.pos}</div>
                  <div style={{ fontSize: 13, color: "var(--text-muted)" }}>{a.email}</div>
                </div>
                <Field label="신청 시각" value={a.applied} tabular />
                <Field label="마지막 이용일" value={a.lastUse} warn={a.lastUse === "이력 없음"} />
                <Field label="누적 이용" value={`${a.uses}회`} />
                <div style={{ flex: 1 }} />
                <div style={{ minWidth: 96, display: "flex", justifyContent: "flex-end" }}>
                  {st ? <StatusBadge status={st} />
                    : <Button variant={isTop && !slot.manual ? "primary" : "secondary"} size="sm" onClick={() => setDialog({ email: a.email, name: a.name })}>확정</Button>}
                </div>
              </div>
            </Card>
          );
        })}
      </div>

      <Dialog open={!!dialog} title="예약을 확정할까요?" confirmLabel="확정하기" onConfirm={confirm} onCancel={() => setDialog(null)}>
        {dialog && <><b>{dialog.name}</b>님을 확정합니다. 같은 슬롯의 다른 신청자는 <b>탈락</b> 처리되고, 확정자에게 <b>완료 메일</b>이 발송됩니다. 확정자의 마지막 이용일이 갱신됩니다.</>}
      </Dialog>

      {toast && (
        <div style={{ position: "fixed", bottom: 28, left: "calc(50% + 120px)", transform: "translateX(-50%)", zIndex: 200 }}>
          <Toast variant="success">{toast}</Toast>
        </div>
      )}
    </Shell>
  );
}

function Field({ label, value, warn, tabular }) {
  return (
    <div style={{ minWidth: 84 }}>
      <div style={{ fontSize: 11, color: "var(--text-muted)", marginBottom: 3 }}>{label}</div>
      <div style={{ fontSize: 14, fontWeight: warn ? 700 : 600, color: warn ? "var(--color-warning)" : "var(--color-midnight-navy)", fontVariantNumeric: tabular ? "tabular-nums" : "normal" }}>{value}</div>
    </div>
  );
}
boot(() => <Page />);
</script>
</body>
</html>
