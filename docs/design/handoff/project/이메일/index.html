<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>헬스키퍼 — 이메일 템플릿</title>
<script src="https://unpkg.com/react@18.3.1/umd/react.development.js" integrity="sha384-hD6/rw4ppMLGNu3tX5cjIb+uRZ7UkRJ6BPkLpg4hAu/6onKUg4lLsHAs9EBPT82L" crossorigin="anonymous"></script>
<script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.development.js" integrity="sha384-u6aeetuaXnQ38mYT8rp6sbXaQe3NL9t+IBXmnYxwkUI2Hw4bsp2Wvmx4yRQF1uAm" crossorigin="anonymous"></script>
<script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js" integrity="sha384-m08KidiNqLdpJqLq95G/LEi8Qvjl/xUYll3QILypMoQ65QorJ9Lvtp2RXYGBFj1y" crossorigin="anonymous"></script>
<script src="https://unpkg.com/lucide@0.460.0/dist/umd/lucide.min.js"></script>
<script>
(function(){ if (window.ReactDOM && ReactDOM.createRoot && !ReactDOM.__hkPatched) { var o = ReactDOM.createRoot.bind(ReactDOM); ReactDOM.createRoot = function (c, p) { if (!c || (c.id === "root" && !window.__hkReady)) return { render:function(){}, unmount:function(){} }; return o(c, p); }; ReactDOM.__hkPatched = true; } })();
</script>
<link rel="stylesheet" href="../_ds/healthkeeper-ds-31e44bd2-68dd-4c55-91c3-7ca10811b6be/styles.css">
<script src="../_ds/healthkeeper-ds-31e44bd2-68dd-4c55-91c3-7ca10811b6be/_ds_bundle.js"></script>
<link rel="stylesheet" href="../_shared/responsive.css">
<meta name="ext-resource-dependency" content="../assets/logo-lockup.svg" data-resource-id="logoLockup" />
<meta name="ext-resource-dependency" content="../assets/logo-mark.svg" data-resource-id="logoMark" />
<style>
  html,body{height:100%}
  body{margin:0;background:var(--surface-canvas,#f8f9fb);color:var(--text-body,#0a0a0a)}
</style>
</head>
<body>
<template id="__bundler_thumbnail" data-bg-color="#0b3558"><svg viewBox="0 0 1200 800" xmlns="http://www.w3.org/2000/svg"><rect width="1200" height="800" fill="#0b3558"></rect><circle cx="600" cy="356" r="150" fill="none" stroke="#ffffff" stroke-width="28"></circle><path d="M538 360 L585 407 L672 308" fill="none" stroke="#ffffff" stroke-width="34" stroke-linecap="round" stroke-linejoin="round"></path><circle cx="726" cy="242" r="38" fill="#006bff"></circle></svg></template>
<div id="root"></div>
<script type="text/babel" data-presets="react">
const NS = "HealthkeeperDS_31e44b";
const { useEffect } = React;
function Icon({ name, size = 18, color, style }) {
  return <i data-lucide={name} style={{ width: size, height: size, color, display: "inline-flex", ...style }} />;
}

const MAILS = [
  { file: "01-이메일인증.html", icon: "shield-check", tint: "#006bff", bg: "#e6f0ff", subject: "[헬스키퍼] 이메일 인증코드 안내",
    trigger: "회원가입 1단계 · 인증코드 발송 시", to: "가입 진행자", desc: "6자리 인증코드(5분 유효) 안내" },
  { file: "02-예약완료-일반.html", icon: "circle-check-big", tint: "#1f8a5b", bg: "#e4f4ec", subject: "[헬스키퍼] 예약이 확정되었습니다",
    trigger: "관리자 확정 시 자동 발송", to: "확정 신청자", desc: "확정 날짜·시간 안내, 마감 전 취소 가능" },
  { file: "03-예약완료-재신청.html", icon: "rotate-ccw", tint: "#004eba", bg: "#e6f0ff", subject: "[헬스키퍼] 재신청 예약이 확정되었습니다",
    trigger: "재신청 즉시 확정 시 자동 발송", to: "재신청 확정자", desc: "확정 날짜·시간, 취소 불가 강조" },
  { file: "04-탈락-재신청안내.html", icon: "bell-ring", tint: "#c2780c", bg: "#fbf0db", subject: "[헬스키퍼] 탈락 안내 및 재신청 가능 슬롯 안내",
    trigger: "마감(수 17:00) 시 자동 / 관리자 수동", to: "우선권 탈락자", desc: "빈 슬롯·재신청 시간·선착순·즉시확정·취소불가" },
];

function MailCard({ m, idx }) {
  const { Card, Badge } = window[NS];
  return (
    <Card padded={false} style={{ overflow: "hidden" }}>
      {/* 메일 메타 헤더 */}
      <div style={{ padding: "18px 22px", borderBottom: "1px solid var(--border-default)" }}>
        <div style={{ display: "flex", alignItems: "center", gap: 12, marginBottom: 14 }}>
          <div style={{ width: 40, height: 40, borderRadius: 10, background: m.bg, display: "flex", alignItems: "center", justifyContent: "center", flexShrink: 0 }}>
            <Icon name={m.icon} size={20} color={m.tint} />
          </div>
          <div style={{ minWidth: 0 }}>
            <div style={{ fontSize: 16, fontWeight: 700, color: "var(--color-midnight-navy)" }}>{m.subject}</div>
            <div style={{ fontSize: 12.5, color: "var(--text-muted)", marginTop: 2 }}>헬스키퍼 &lt;no-reply@ibank.co.kr&gt; · 받는사람: {m.to}</div>
          </div>
        </div>
        <div style={{ display: "flex", gap: 8, flexWrap: "wrap", alignItems: "center" }}>
          <Badge variant="soft">{`0${idx + 1}`}</Badge>
          <Badge variant="info">{m.trigger}</Badge>
          <span style={{ fontSize: 13, color: "var(--text-secondary)" }}>{m.desc}</span>
          <div style={{ flex: 1 }} />
          <a href={m.file} target="_blank" style={{ fontSize: 13, fontWeight: 700, color: "var(--color-signal-blue)", textDecoration: "none", display: "inline-flex", alignItems: "center", gap: 4 }}>
            전체로 보기 <Icon name="external-link" size={14} color="var(--color-signal-blue)" />
          </a>
        </div>
      </div>
      {/* 이메일 실제 렌더 */}
      <div style={{ background: "#eef1f6", height: 540, overflow: "auto" }}>
        <iframe src={m.file} title={m.subject} style={{ width: "100%", height: 760, border: "none", display: "block" }}></iframe>
      </div>
    </Card>
  );
}

function Gallery() {
  useEffect(() => { window.lucide && window.lucide.createIcons(); });
  return (
    <>
      <header style={{ background: "var(--surface-card)", borderBottom: "1px solid var(--border-default)" }}>
        <div style={{ maxWidth: 1180, margin: "0 auto", padding: "0 32px", height: 72, display: "flex", alignItems: "center" }}>
          <img src={(window.__resources && window.__resources.logoLockup) || "../assets/logo-lockup.svg"} alt="헬스키퍼" height="34" />
          <div style={{ flex: 1 }} />
          <a href="../index.html" style={{ fontSize: 13.5, color: "var(--text-muted)", textDecoration: "none" }}>← 전체 화면 목록</a>
        </div>
      </header>
      <main style={{ maxWidth: 1180, margin: "0 auto", padding: "48px 32px 72px" }}>
        <div style={{ marginBottom: 36, maxWidth: 720 }}>
          <span style={{ fontSize: 12, fontWeight: 700, letterSpacing: "0.08em", color: "#006bff", background: "#006bff1a", padding: "4px 10px", borderRadius: 999 }}>EMAIL</span>
          <h1 style={{ fontSize: 36, letterSpacing: "-0.02em", margin: "14px 0 12px" }}>이메일 템플릿</h1>
          <p style={{ fontSize: 16.5, color: "var(--text-secondary)", lineHeight: 1.6, margin: 0 }}>
            설계서 메일 발송 정책에 정의된 4종 템플릿입니다. 모든 메일은 테이블 기반 인라인 스타일로 작성되어 메일 클라이언트에서 안전하게 렌더됩니다.
          </p>
        </div>
        <div style={{ display: "grid", gridTemplateColumns: "1fr 1fr", gap: 24, alignItems: "start" }}>
          {MAILS.map((m, i) => <MailCard key={m.file} m={m} idx={i} />)}
        </div>
        <div style={{ marginTop: 28, padding: "16px 20px", background: "var(--color-fog)", borderRadius: "var(--radius-md,8px)", fontSize: 13, color: "var(--text-secondary)", lineHeight: 1.6 }}>
          제작 메모 — 로고·아이콘은 브라우저 미리보기용 SVG입니다. 실제 발송 시에는 호스팅된 PNG로 교체하고, 발송 시점에 <b>{`{이름}`}</b>·<b>{`{날짜}`}</b>·<b>{`{빈슬롯목록}`}</b>·<b>{`{인증링크}`}</b> 변수를 치환하세요.
        </div>
      </main>
      <footer style={{ borderTop: "1px solid var(--border-default)", background: "var(--surface-card)" }}>
        <div style={{ maxWidth: 1180, margin: "0 auto", padding: "24px 32px", display: "flex", alignItems: "center", gap: 12 }}>
          <img src={(window.__resources && window.__resources.logoMark) || "../assets/logo-mark.svg"} width="26" height="26" alt="" />
          <span style={{ fontSize: 13, color: "var(--text-muted)" }}>© 2026 ibank Healthkeeper · 메일 발송 정책 기반 템플릿</span>
        </div>
      </footer>
    </>
  );
}
(function wait(){ if (window[NS] && window.lucide) { window.__hkReady = true; ReactDOM.createRoot(document.getElementById("root")).render(<Gallery />); } else setTimeout(wait, 40); })();
</script>
</body>
</html>
