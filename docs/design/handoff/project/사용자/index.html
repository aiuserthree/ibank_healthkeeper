<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>헬스키퍼 — 서비스 소개</title>
<script src="https://unpkg.com/react@18.3.1/umd/react.development.js" integrity="sha384-hD6/rw4ppMLGNu3tX5cjIb+uRZ7UkRJ6BPkLpg4hAu/6onKUg4lLsHAs9EBPT82L" crossorigin="anonymous"></script>
<script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.development.js" integrity="sha384-u6aeetuaXnQ38mYT8rp6sbXaQe3NL9t+IBXmnYxwkUI2Hw4bsp2Wvmx4yRQF1uAm" crossorigin="anonymous"></script>
<script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js" integrity="sha384-m08KidiNqLdpJqLq95G/LEi8Qvjl/xUYll3QILypMoQ65QorJ9Lvtp2RXYGBFj1y" crossorigin="anonymous"></script>
<script src="https://unpkg.com/lucide@0.460.0/dist/umd/lucide.min.js"></script>
<script>
(function(){ if (window.ReactDOM && ReactDOM.createRoot && !ReactDOM.__hkPatched) { var o = ReactDOM.createRoot.bind(ReactDOM); ReactDOM.createRoot = function (c, p) { if (!c || (c.id === "root" && !window.__hkReady)) return { render:function(){}, unmount:function(){} }; return o(c, p); }; ReactDOM.__hkPatched = true; } })();

<link rel="stylesheet" href="../_ds/healthkeeper-ds-31e44bd2-68dd-4c55-91c3-7ca10811b6be/styles.css">
<script src="../_ds/healthkeeper-ds-31e44bd2-68dd-4c55-91c3-7ca10811b6be/_ds_bundle.js"></script>
<link rel="stylesheet" href="../_shared/responsive.css">
<meta name="ext-resource-dependency" content="../assets/logo-lockup.svg" data-resource-id="logoLockup" />
<meta name="ext-resource-dependency" content="../assets/logo-mark.svg" data-resource-id="logoMark" />
<style>
  html,body{height:100%}
  body{margin:0;background:var(--surface-canvas,#f8f9fb);color:var(--text-body,#0a0a0a)}
</style>
</head>
<body>
<template id="__bundler_thumbnail" data-bg-color="#0b3558"><svg viewBox="0 0 1200 800" xmlns="http://www.w3.org/2000/svg"><rect width="1200" height="800" fill="#0b3558"></rect><circle cx="600" cy="356" r="150" fill="none" stroke="#ffffff" stroke-width="28"></circle><path d="M538 360 L585 407 L672 308" fill="none" stroke="#ffffff" stroke-width="34" stroke-linecap="round" stroke-linejoin="round"></path><circle cx="726" cy="242" r="38" fill="#006bff"></circle></svg></template>
<div id="root"></div>
<script type="text/babel" src="../_shared/member-shell.js" data-presets="react"></script>
<script type="text/babel" data-presets="react">
const NS = "HealthkeeperDS_31e44b";
const { Icon, Header, Footer, boot } = window.MemberUI;

function MiniCalendar() {
  const { Card, SlotButton, Badge } = window[NS];
  return (
    <Card padded style={{ width: 360, position: "relative", zIndex: 2 }}>
      <div style={{ display: "flex", justifyContent: "space-between", alignItems: "center", marginBottom: 14 }}>
        <b style={{ fontSize: 15, color: "var(--color-midnight-navy)" }}>이번 주 예약</b>
        <Badge variant="success" dot>예약 가능</Badge>
      </div>
      <div style={{ display: "grid", gridTemplateColumns: "repeat(4,1fr)", gap: 8 }}>
        <SlotButton time="13:30" meta="가능" />
        <SlotButton time="14:30" meta="선택" state="selected" />
        <SlotButton time="15:30" meta="가능" />
        <SlotButton time="16:30" meta="완료" state="confirmed" />
      </div>
      <div style={{ marginTop: 14, fontSize: 13, color: "var(--text-secondary)", display: "flex", alignItems: "center", gap: 6 }}>
        <Icon name="clock" size={15} color="var(--color-slate-blue)" /> 매일 13:30 – 17:00 · 하루 4타임
      </div>
    </Card>
  );
}

function Feature({ icon, title, desc }) {
  return (
    <div style={{ display: "flex", gap: 16 }}>
      <div style={{ flexShrink: 0, width: 44, height: 44, borderRadius: 10, background: "var(--color-signal-blue-soft)", display: "flex", alignItems: "center", justifyContent: "center" }}>
        <Icon name={icon} size={22} color="var(--color-signal-blue)" />
      </div>
      <div>
        <div style={{ fontSize: 18, fontWeight: 700, color: "var(--color-midnight-navy)", marginBottom: 4 }}>{title}</div>
        <div style={{ fontSize: 15, color: "var(--text-secondary)", lineHeight: 1.6 }}>{desc}</div>
      </div>
    </div>
  );
}

function Step({ n, title, desc, time }) {
  return (
    <div style={{ display: "flex", gap: 16, alignItems: "flex-start" }}>
      <div style={{ flexShrink: 0, width: 36, height: 36, borderRadius: 999, background: "var(--color-midnight-navy)", color: "#fff", fontWeight: 700, fontSize: 16, display: "flex", alignItems: "center", justifyContent: "center" }}>{n}</div>
      <div>
        <div style={{ fontSize: 17, fontWeight: 700, color: "var(--color-midnight-navy)" }}>{title}</div>
        {time && <div style={{ fontSize: 13, fontWeight: 600, color: "var(--color-signal-blue)", margin: "2px 0 4px" }}>{time}</div>}
        <div style={{ fontSize: 15, color: "var(--text-secondary)", lineHeight: 1.6, maxWidth: 280 }}>{desc}</div>
      </div>
    </div>
  );
}

function Page() {
  const { Button, Badge, Card, Alert } = window[NS];
  return (
    <>
      <Header active="home" loggedIn={false} />
      <main>
        {/* Hero */}
        <section style={{ maxWidth: 1200, margin: "0 auto", padding: "64px 32px 48px", display: "grid", gridTemplateColumns: "1fr 1fr", gap: 48, alignItems: "center" }}>
          <div>
            <Badge variant="soft">사내 복지 · 안마서비스</Badge>
            <h1 style={{ fontSize: 52, lineHeight: 1.1, letterSpacing: "-0.02em", margin: "20px 0 16px" }}>
              마음까지 풀리는<br />헬스키퍼 예약
            </h1>
            <p style={{ fontSize: 19, lineHeight: 1.64, color: "var(--text-secondary)", maxWidth: 460, margin: "0 0 24px" }}>
              매주 수요일, 차주 안마서비스를 신청하세요. 한정된 시간을 공정하게 — 오래 기다린 분께 우선권을 드립니다.
            </p>
            <div style={{ maxWidth: 460, marginBottom: 28 }}>
              <Alert variant="info" title="차주 예약 신청이 가능합니다 · 오늘 17:00 마감">
                수요일 09:00~16:59 동안 차주(월~금) 예약을 신청할 수 있어요.
              </Alert>
            </div>
            <div style={{ display: "flex", gap: 12 }}>
              <a href="회원가입.html"><Button variant="primary" size="lg" iconRight={<Icon name="arrow-right" size={18} color="#fff" />}>무료로 시작하기</Button></a>
              <a href="예약하기.html"><Button variant="secondary" size="lg">예약 현황 보기</Button></a>
            </div>
          </div>
          <div style={{ position: "relative", display: "flex", justifyContent: "center" }}>
            <div style={{ position: "absolute", width: 340, height: 300, background: "var(--blob-sunrise)", filter: "blur(40px)", opacity: 0.8, top: -30, right: 40 }} />
            <div style={{ position: "absolute", width: 260, height: 240, background: "var(--blob-calm)", filter: "blur(44px)", opacity: 0.7, bottom: -40, left: 30 }} />
            <MiniCalendar />
          </div>
        </section>

        {/* Stat strip */}
        <section style={{ borderTop: "1px solid var(--border-default)", borderBottom: "1px solid var(--border-default)", background: "var(--surface-card)" }}>
          <div style={{ maxWidth: 1200, margin: "0 auto", padding: "28px 32px", display: "flex", gap: 64, flexWrap: "wrap" }}>
            {[["주 20타임", "월~금 · 하루 4타임"], ["1명", "전담 안마사"], ["수요일 9시", "차주 예약 오픈"], ["30분", "타임당 서비스"]].map(([n, l]) => (
              <div key={l}>
                <div style={{ fontSize: 32, fontWeight: 700, color: "var(--color-midnight-navy)", letterSpacing: "-0.01em" }}>{n}</div>
                <div style={{ fontSize: 14, color: "var(--text-secondary)", marginTop: 2 }}>{l}</div>
              </div>
            ))}
          </div>
        </section>

        {/* Features */}
        <section style={{ maxWidth: 1200, margin: "0 auto", padding: "64px 32px 24px" }}>
          <h2 style={{ fontSize: 34, marginBottom: 8 }}>예약은 이렇게 진행돼요</h2>
          <p style={{ fontSize: 17, color: "var(--text-secondary)", marginBottom: 40 }}>신청 → 확정 → 안내 메일까지, 공정하고 투명하게.</p>
          <div style={{ display: "grid", gridTemplateColumns: "repeat(3,1fr)", gap: 32 }}>
            <Feature icon="calendar-days" title="수요일에 신청" desc="매주 수요일 09:00~16:59 동안 차주(월~금) 예약을 신청합니다." />
            <Feature icon="scale" title="우선권 배분" desc="같은 시간에 몰리면 마지막 이용일이 가장 오래된 분께 우선권이 돌아갑니다." />
            <Feature icon="bell-ring" title="재신청 안내" desc="탈락하면 다음날 17시까지 빈 슬롯에 선착순으로 재신청할 수 있어요." />
          </div>
        </section>

        {/* How it works — weekly cycle */}
        <section style={{ maxWidth: 1200, margin: "0 auto", padding: "48px 32px 24px" }}>
          <Card padded style={{ background: "var(--color-mist)" }} flat>
            <h2 style={{ fontSize: 26, marginBottom: 28 }}>매주 운영 사이클</h2>
            <div style={{ display: "grid", gridTemplateColumns: "repeat(4,1fr)", gap: 28 }}>
              <Step n="1" title="예약 오픈" time="수 09:00" desc="차주 월~금 일정이 열립니다. 휴가일은 예약 불가로 표시돼요." />
              <Step n="2" title="신청 마감" time="수 17:00" desc="16:59까지 접수. 마감 시점에 우선권으로 확정·탈락이 정렬됩니다." />
              <Step n="3" title="재신청 창" time="수 17:00 ~ 목 17:00" desc="탈락자 한정 선착순·즉시 확정. 재신청은 취소할 수 없어요." />
              <Step n="4" title="다음 사이클" time="다음 주 수 09:00" desc="목 17:00 이후 모든 신청이 종료되고 다음 주에 새로 오픈합니다." />
            </div>
          </Card>
        </section>

        {/* Policy summary */}
        <section style={{ maxWidth: 1200, margin: "0 auto", padding: "32px 32px 72px" }}>
          <h2 style={{ fontSize: 26, marginBottom: 20 }}>꼭 알아두세요</h2>
          <div style={{ display: "grid", gridTemplateColumns: "repeat(2,1fr)", gap: 16 }}>
            {[
              ["신청 ≠ 확정", "일반 신청은 관리자 확정 후 예약이 완료됩니다. 확정 시 완료 메일을 보내드려요."],
              ["우선권 기준", "마지막 이용일이 오래된 순 → 동률이면 먼저 신청한 분이 우선입니다. 이용 이력이 없으면 최우선이에요."],
              ["취소 규칙", "일반 신청은 마감(수 17:00) 전까지 취소할 수 있어요. 취소는 우선권에 영향을 주지 않습니다."],
              ["재신청 규칙", "재신청은 선착순·즉시 확정되며 취소할 수 없습니다. 이미 확정된 슬롯은 신청이 거절돼요."],
            ].map(([t, d]) => (
              <Card key={t} padded>
                <div style={{ display: "flex", gap: 12, alignItems: "flex-start" }}>
                  <Icon name="circle-check-big" size={20} color="var(--color-signal-blue)" style={{ marginTop: 2, flexShrink: 0 }} />
                  <div>
                    <div style={{ fontSize: 16, fontWeight: 700, color: "var(--color-midnight-navy)", marginBottom: 4 }}>{t}</div>
                    <div style={{ fontSize: 14.5, color: "var(--text-secondary)", lineHeight: 1.6 }}>{d}</div>
                  </div>
                </div>
              </Card>
            ))}
          </div>
          <div style={{ marginTop: 36, textAlign: "center" }}>
            <a href="회원가입.html"><Button variant="primary" size="lg" iconRight={<Icon name="arrow-right" size={18} color="#fff" />}>지금 가입하고 예약하기</Button></a>
          </div>
        </section>
      </main>
      <Footer />
    </>
  );
}
boot(() => <Page />);
</script>
</body>
</html>
