<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>헬스키퍼 — 회원가입</title>
<script src="https://unpkg.com/react@18.3.1/umd/react.development.js" integrity="sha384-hD6/rw4ppMLGNu3tX5cjIb+uRZ7UkRJ6BPkLpg4hAu/6onKUg4lLsHAs9EBPT82L" crossorigin="anonymous"></script>
<script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.development.js" integrity="sha384-u6aeetuaXnQ38mYT8rp6sbXaQe3NL9t+IBXmnYxwkUI2Hw4bsp2Wvmx4yRQF1uAm" crossorigin="anonymous"></script>
<script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js" integrity="sha384-m08KidiNqLdpJqLq95G/LEi8Qvjl/xUYll3QILypMoQ65QorJ9Lvtp2RXYGBFj1y" crossorigin="anonymous"></script>
<script src="https://unpkg.com/lucide@0.460.0/dist/umd/lucide.min.js"></script>
<script>
(function(){ if (window.ReactDOM && ReactDOM.createRoot && !ReactDOM.__hkPatched) { var o = ReactDOM.createRoot.bind(ReactDOM); ReactDOM.createRoot = function (c, p) { if (!c || (c.id === "root" && !window.__hkReady)) return { render:function(){}, unmount:function(){} }; return o(c, p); }; ReactDOM.__hkPatched = true; } })();
</script>
<link rel="stylesheet" href="../_ds/healthkeeper-ds-31e44bd2-68dd-4c55-91c3-7ca10811b6be/styles.css">
<script src="../_ds/healthkeeper-ds-31e44bd2-68dd-4c55-91c3-7ca10811b6be/_ds_bundle.js"></script>
<link rel="stylesheet" href="../_shared/responsive.css">
<meta name="ext-resource-dependency" content="../assets/logo-lockup.svg" data-resource-id="logoLockup" />
<meta name="ext-resource-dependency" content="../assets/logo-mark.svg" data-resource-id="logoMark" />
<style>
  html,body{height:100%}
  body{margin:0;background:var(--surface-canvas,#f8f9fb);color:var(--text-body,#0a0a0a)}
</style>
</head>
<body>
<template id="__bundler_thumbnail" data-bg-color="#0b3558"><svg viewBox="0 0 1200 800" xmlns="http://www.w3.org/2000/svg"><rect width="1200" height="800" fill="#0b3558"></rect><circle cx="600" cy="356" r="150" fill="none" stroke="#ffffff" stroke-width="28"></circle><path d="M538 360 L585 407 L672 308" fill="none" stroke="#ffffff" stroke-width="34" stroke-linecap="round" stroke-linejoin="round"></path><circle cx="726" cy="242" r="38" fill="#006bff"></circle></svg></template>
<div id="root"></div>
<script type="text/babel" src="../_shared/member-shell.js" data-presets="react"></script>
<script type="text/babel" data-presets="react">
const NS = "HealthkeeperDS_31e44b";
const { Icon, boot } = window.MemberUI;
const { useState } = React;
const DEMO_CODE = "284913";

function AuthHeader() {
  return (
    <header style={{ height: 72, background: "var(--surface-card)", borderBottom: "1px solid var(--border-default)" }}>
      <div style={{ maxWidth: 1200, margin: "0 auto", height: "100%", padding: "0 32px", display: "flex", alignItems: "center" }}>
        <a href="index.html"><img src={(window.__resources && window.__resources.logoLockup) || "../assets/logo-lockup.svg"} alt="헬스키퍼" height="34" /></a>
      </div>
    </header>
  );
}

function Stepper({ step }) {
  // step: 0 이메일 인증, 1 기본 정보, 2 완료
  const items = [["이메일 인증", "mail"], ["기본 정보", "user-round"], ["완료", "check"]];
  return (
    <div style={{ display: "flex", alignItems: "center", justifyContent: "center", gap: 0, marginBottom: 28 }}>
      {items.map(([label, icon], i) => {
        const done = i < step, active = i === step;
        return (
          <React.Fragment key={label}>
            <div style={{ display: "flex", alignItems: "center", gap: 9 }}>
              <div style={{ width: 30, height: 30, borderRadius: 999, display: "flex", alignItems: "center", justifyContent: "center",
                background: done ? "var(--color-success)" : active ? "var(--color-signal-blue)" : "var(--color-fog)",
                color: (done || active) ? "#fff" : "var(--color-steel-blue)", fontWeight: 700, fontSize: 13 }}>
                {done ? <Icon name="check" size={16} color="#fff" /> : i + 1}
              </div>
              <span style={{ fontSize: 14, fontWeight: 600, color: active ? "var(--color-midnight-navy)" : done ? "var(--color-success)" : "var(--text-muted)" }}>{label}</span>
            </div>
            {i < items.length - 1 && <div style={{ width: 36, height: 2, background: i < step ? "var(--color-success)" : "var(--border-default)", margin: "0 12px" }} />}
          </React.Fragment>
        );
      })}
    </div>
  );
}

function Page() {
  const { Button, Input, Select, Card, Alert, Badge } = window[NS];
  const [step, setStep] = useState(0);

  // step 0 — email verify
  const [email, setEmail] = useState("");
  const [sent, setSent] = useState(false);
  const [code, setCode] = useState("");
  const [codeOk, setCodeOk] = useState(false);
  const [emailErr, setEmailErr] = useState(null);
  const [codeErr, setCodeErr] = useState(null);

  // step 1 — basic info
  const [name, setName] = useState("");
  const [dept, setDept] = useState("");
  const [pos, setPos] = useState("");
  const [pw, setPw] = useState("");
  const [pw2, setPw2] = useState("");
  const [infoErr, setInfoErr] = useState({});

  const sendCode = () => {
    if (!/^[^@\s]+@[^@\s]+\.[^@\s]+$/.test(email)) { setEmailErr("올바른 이메일 형식이 아닙니다."); return; }
    if (email.trim().toLowerCase() === "minsu.kim@ibank.co.kr") { setEmailErr("이미 가입된 이메일입니다."); return; }
    setEmailErr(null); setSent(true); setCode(""); setCodeOk(false); setCodeErr(null);
  };
  const verifyCode = () => {
    if (code.trim() === DEMO_CODE) { setCodeOk(true); setCodeErr(null); }
    else setCodeErr("인증코드가 일치하지 않습니다. 메일을 다시 확인해 주세요.");
  };
  const submitInfo = () => {
    const e = {};
    if (!name.trim()) e.name = "이름을 입력하세요.";
    if (!dept) e.dept = "부서를 선택하세요.";
    if (!pos) e.pos = "직급을 선택하세요.";
    if (pw.length < 8) e.pw = "비밀번호는 8자 이상이어야 합니다.";
    if (pw2 !== pw) e.pw2 = "비밀번호가 일치하지 않습니다.";
    setInfoErr(e);
    if (Object.keys(e).length === 0) setStep(2);
  };

  return (
    <>
      <AuthHeader />
      <main style={{ display: "flex", justifyContent: "center", padding: "48px 24px 72px" }}>
        <div style={{ width: 460 }}>
          <div style={{ textAlign: "center", marginBottom: 24 }}>
            <img src={(window.__resources && window.__resources.logoMark) || "../assets/logo-mark.svg"} alt="" width="50" height="50" />
            <h1 style={{ fontSize: 27, marginTop: 14, marginBottom: 6 }}>회원가입</h1>
            <p style={{ fontSize: 15, color: "var(--text-secondary)", margin: 0 }}>이메일 인증 후 기본 정보를 입력하면 가입이 완료됩니다.</p>
          </div>

          <Stepper step={step} />

          {/* ===== STEP 0 : 이메일 인증 ===== */}
          {step === 0 && (
            <Card padded>
              <div style={{ display: "flex", flexDirection: "column", gap: 16 }}>
                <div style={{ display: "flex", gap: 8, alignItems: "flex-end" }}>
                  <div style={{ flex: 1 }}>
                    <Input label="이메일" type="email" placeholder="name@ibank.co.kr" required value={email}
                      onChange={e => { setEmail(e.target.value); setEmailErr(null); }} error={emailErr}
                      hint={emailErr ? undefined : "회사 이메일로 인증코드가 발송됩니다."} disabled={codeOk} />
                  </div>
                  <div style={{ paddingBottom: emailErr || (!emailErr) ? 22 : 0 }}>
                    <Button variant={sent ? "secondary" : "primary"} onClick={sendCode} disabled={codeOk}>{sent ? "재발송" : "인증코드 발송"}</Button>
                  </div>
                </div>

                {sent && !codeOk && (
                  <>
                    <Alert variant="info" title="인증코드를 메일로 보냈어요">
                      <b>{email}</b> 로 발송된 6자리 코드를 입력해 주세요. (5분 이내 유효) <a href="../이메일/01-이메일인증.html" target="_blank" style={{ color: "var(--color-info-blue)", fontWeight: 700 }}>메일 미리보기</a>
                    </Alert>
                    <div style={{ display: "flex", gap: 8, alignItems: "flex-end" }}>
                      <div style={{ flex: 1 }}>
                        <Input label="인증코드" placeholder="6자리 숫자" inputMode="numeric" maxLength={6} value={code}
                          onChange={e => { setCode(e.target.value.replace(/[^0-9]/g, "")); setCodeErr(null); }} error={codeErr}
                          hint={codeErr ? undefined : `데모 코드: ${DEMO_CODE}`} />
                      </div>
                      <div style={{ paddingBottom: 22 }}>
                        <Button variant="primary" onClick={verifyCode} disabled={code.length !== 6}>인증 확인</Button>
                      </div>
                    </div>
                  </>
                )}

                {codeOk && (
                  <Alert variant="success" title="이메일 인증이 완료되었습니다">
                    <b>{email}</b> 인증을 마쳤어요. 다음 단계에서 기본 정보를 입력해 주세요.
                  </Alert>
                )}

                <Button variant="primary" block size="lg" disabled={!codeOk} onClick={() => setStep(1)}
                  iconRight={<Icon name="arrow-right" size={18} color="#fff" />}>다음 단계</Button>
              </div>
            </Card>
          )}

          {/* ===== STEP 1 : 기본 정보 ===== */}
          {step === 1 && (
            <Card padded>
              <div style={{ display: "flex", alignItems: "center", gap: 8, marginBottom: 16, padding: "10px 12px", background: "var(--color-success-soft)", borderRadius: "var(--radius-sm)" }}>
                <Icon name="circle-check-big" size={16} color="var(--color-success)" />
                <span style={{ fontSize: 13.5, color: "var(--color-midnight-navy)" }}><b>{email}</b> 인증 완료</span>
              </div>
              <div style={{ display: "flex", flexDirection: "column", gap: 16 }}>
                <Input label="이름" placeholder="홍길동" required value={name} onChange={e => setName(e.target.value)} error={infoErr.name} />
                <div style={{ display: "grid", gridTemplateColumns: "1fr 1fr", gap: 12 }}>
                  <Select label="부서" required value={dept} onChange={e => setDept(e.target.value)} error={infoErr.dept}
                    options={[{ value: "", label: "선택" }, { value: "경영지원실", label: "경영지원실" }, { value: "IT개발팀", label: "IT개발팀" },
                      { value: "인사팀", label: "인사팀" }, { value: "마케팅팀", label: "마케팅팀" }, { value: "영업팀", label: "영업팀" },
                      { value: "리스크관리팀", label: "리스크관리팀" }, { value: "재무팀", label: "재무팀" }]} />
                  <Select label="직급" required value={pos} onChange={e => setPos(e.target.value)} error={infoErr.pos}
                    options={[{ value: "", label: "선택" }, { value: "사원", label: "사원" }, { value: "대리", label: "대리" },
                      { value: "과장", label: "과장" }, { value: "차장", label: "차장" }, { value: "부장", label: "부장" }, { value: "팀장", label: "팀장" }]} />
                </div>
                <Input label="비밀번호" type="password" placeholder="••••••••" required value={pw} onChange={e => setPw(e.target.value)}
                  hint={infoErr.pw ? undefined : "영문·숫자·특수문자 조합 8자 이상"} error={infoErr.pw} />
                <Input label="비밀번호 확인" type="password" placeholder="••••••••" required value={pw2} onChange={e => setPw2(e.target.value)} error={infoErr.pw2} />
                <div style={{ display: "flex", gap: 10 }}>
                  <Button variant="secondary" onClick={() => setStep(0)} iconLeft={<Icon name="arrow-left" size={16} color="var(--color-midnight-navy)" />}>이전</Button>
                  <Button variant="primary" block size="lg" onClick={submitInfo}>가입 완료</Button>
                </div>
              </div>
            </Card>
          )}

          {/* ===== STEP 2 : 완료 ===== */}
          {step === 2 && (
            <Card padded>
              <div style={{ textAlign: "center" }}>
                <div style={{ width: 64, height: 64, borderRadius: 999, background: "var(--color-success-soft)", display: "inline-flex", alignItems: "center", justifyContent: "center", marginBottom: 18 }}>
                  <Icon name="party-popper" size={30} color="var(--color-success)" />
                </div>
                <h2 style={{ fontSize: 24, margin: "0 0 10px" }}>가입이 완료되었습니다</h2>
                <p style={{ fontSize: 15.5, color: "var(--text-secondary)", lineHeight: 1.65, margin: "0 0 20px" }}>
                  <b style={{ color: "var(--color-midnight-navy)" }}>{name}님</b> ({dept} · {pos}), 환영합니다.<br />이제 로그인하고 헬스키퍼 예약을 신청할 수 있어요.
                </p>
                <div style={{ display: "flex", flexDirection: "column", gap: 10 }}>
                  <a href="로그인.html"><Button variant="primary" block size="lg">로그인하러 가기</Button></a>
                  <a href="예약하기.html"><Button variant="ghost" block>예약 화면 둘러보기</Button></a>
                </div>
              </div>
            </Card>
          )}

          {step < 2 && (
            <div style={{ textAlign: "center", marginTop: 18, fontSize: 14, color: "var(--text-secondary)" }}>
              이미 계정이 있으신가요? <a href="로그인.html" style={{ color: "var(--color-signal-blue)", fontWeight: 700, textDecoration: "none" }}>로그인</a>
            </div>
          )}
        </div>
      </main>
    </>
  );
}
boot(() => <Page />);
</script>
</body>
</html>
