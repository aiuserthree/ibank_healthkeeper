<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>헬스키퍼 — 예약하기</title>
<script src="https://unpkg.com/react@18.3.1/umd/react.development.js" integrity="sha384-hD6/rw4ppMLGNu3tX5cjIb+uRZ7UkRJ6BPkLpg4hAu/6onKUg4lLsHAs9EBPT82L" crossorigin="anonymous"></script>
<script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.development.js" integrity="sha384-u6aeetuaXnQ38mYT8rp6sbXaQe3NL9t+IBXmnYxwkUI2Hw4bsp2Wvmx4yRQF1uAm" crossorigin="anonymous"></script>
<script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js" integrity="sha384-m08KidiNqLdpJqLq95G/LEi8Qvjl/xUYll3QILypMoQ65QorJ9Lvtp2RXYGBFj1y" crossorigin="anonymous"></script>
<script src="https://unpkg.com/lucide@0.460.0/dist/umd/lucide.min.js"></script>
<script>
(function(){ if (window.ReactDOM && ReactDOM.createRoot && !ReactDOM.__hkPatched) { var o = ReactDOM.createRoot.bind(ReactDOM); ReactDOM.createRoot = function (c, p) { if (!c || (c.id === "root" && !window.__hkReady)) return { render:function(){}, unmount:function(){} }; return o(c, p); }; ReactDOM.__hkPatched = true; } })();
</script>
<link rel="stylesheet" href="../_ds/healthkeeper-ds-31e44bd2-68dd-4c55-91c3-7ca10811b6be/styles.css">
<script src="../_ds/healthkeeper-ds-31e44bd2-68dd-4c55-91c3-7ca10811b6be/_ds_bundle.js"></script>
<link rel="stylesheet" href="../_shared/responsive.css">
<meta name="ext-resource-dependency" content="../assets/logo-lockup.svg" data-resource-id="logoLockup" />
<meta name="ext-resource-dependency" content="../assets/logo-mark.svg" data-resource-id="logoMark" />
<style>
  html,body{height:100%}
  body{margin:0;background:var(--surface-canvas,#f8f9fb);color:var(--text-body,#0a0a0a)}
</style>
</head>
<body>
<template id="__bundler_thumbnail" data-bg-color="#0b3558"><svg viewBox="0 0 1200 800" xmlns="http://www.w3.org/2000/svg"><rect width="1200" height="800" fill="#0b3558"></rect><circle cx="600" cy="356" r="150" fill="none" stroke="#ffffff" stroke-width="28"></circle><path d="M538 360 L585 407 L672 308" fill="none" stroke="#ffffff" stroke-width="34" stroke-linecap="round" stroke-linejoin="round"></path><circle cx="726" cy="242" r="38" fill="#006bff"></circle></svg></template>
<div id="root"></div>
<script type="text/babel" src="../_shared/member-shell.js" data-presets="react"></script>
<script type="text/babel" data-presets="react">
const NS = "HealthkeeperDS_31e44b";
const { Icon, Header, Footer, boot, TIMES, DAYS, addMin, STATE_BANNER } = window.MemberUI;
const { useState } = React;

// 동일 슬롯에 다른 신청자가 있는 경우 (중복 신청 — 우선권 경합) "di-time": 신청자 수
const CONTESTED = { "0-13:30": 2, "0-15:30": 1, "1-14:30": 1, "3-16:30": 2 };

function StateToggle({ value, onChange }) {
  const opts = [["OPEN", "예약 가능"], ["BEFORE_OPEN", "오픈 전"], ["REAPPLY", "재신청 기간"], ["CLOSED", "마감"]];
  return (
    <div style={{ display: "flex", gap: 6, flexWrap: "wrap" }}>
      <span style={{ fontSize: 12, color: "var(--text-muted)", alignSelf: "center", marginRight: 2 }}>데모 상태</span>
      {opts.map(([k, l]) => (
        <button key={k} onClick={() => onChange(k)} style={{
          padding: "6px 12px", borderRadius: 999, cursor: "pointer", font: "inherit", fontSize: 12.5, fontWeight: 600,
          border: "1px solid " + (value === k ? "var(--color-signal-blue)" : "var(--border-default)"),
          background: value === k ? "var(--color-signal-blue-soft)" : "var(--surface-card)",
          color: value === k ? "var(--color-info-blue)" : "var(--color-slate-blue)" }}>{l}</button>
      ))}
    </div>
  );
}

function Page() {
  const { Button, Card, Badge, Alert, SlotButton, Dialog, Toast } = window[NS];
  const [sysState, setSysState] = useState("OPEN");
  const [sel, setSel] = useState(null);
  const [confirm, setConfirm] = useState(false);
  const [toast, setToast] = useState(null);

  const isOpen = sysState === "OPEN";
  const banner = STATE_BANNER[sysState];

  const slotState = (di, t) => {
    if (DAYS[di].off) return "disabled";
    if (!isOpen) return "disabled";
    if (sel && sel.day === di && sel.time === t) return "selected";
    return "available";
  };
  const submit = () => {
    setConfirm(false);
    setSel(null);
    setToast("예약 신청이 접수되었습니다 · 마이페이지에서 확인하세요");
    setTimeout(() => setToast(null), 3400);
  };
  const selContested = sel && CONTESTED[`${sel.day}-${sel.time}`];

  return (
    <>
      <Header active="reserve" loggedIn={true} />
      <main style={{ maxWidth: 1200, margin: "0 auto", padding: "36px 32px 72px" }}>
        <div style={{ display: "flex", alignItems: "flex-end", justifyContent: "space-between", gap: 16, flexWrap: "wrap", marginBottom: 16 }}>
          <div style={{ display: "flex", alignItems: "baseline", gap: 12 }}>
            <h1 style={{ fontSize: 34, margin: 0 }}>차주 예약</h1>
            <span style={{ fontSize: 16, color: "var(--text-secondary)" }}>6/22(월) – 6/26(금)</span>
          </div>
          <StateToggle value={sysState} onChange={(s) => { setSysState(s); setSel(null); }} />
        </div>

        <div style={{ marginBottom: 20, maxWidth: 760 }}>
          <Alert variant={banner.variant} title={banner.title}>{banner.body}</Alert>
        </div>

        {sysState === "REAPPLY" && (
          <div style={{ marginBottom: 20, maxWidth: 760 }}>
            <Card padded flat style={{ background: "var(--color-warning-soft)", borderColor: "transparent" }}>
              <div style={{ display: "flex", alignItems: "center", gap: 12 }}>
                <Icon name="info" size={20} color="var(--color-warning)" />
                <span style={{ fontSize: 14.5, color: "var(--color-midnight-navy)" }}>탈락하신 경우 전용 재신청 화면에서 빈 슬롯을 선착순으로 신청할 수 있어요.</span>
                <div style={{ flex: 1 }} />
                <a href="재신청.html"><Button variant="primary" size="sm">재신청 화면으로</Button></a>
              </div>
            </Card>
          </div>
        )}

        <div style={{ display: "grid", gridTemplateColumns: "1fr 300px", gap: 24, alignItems: "start" }}>
          {/* 주간 그리드 */}
          <Card padded>
            <div style={{ display: "grid", gridTemplateColumns: "repeat(5,1fr)", gap: 12 }}>
              {DAYS.map((day, di) => (
                <div key={di}>
                  <div style={{ textAlign: "center", marginBottom: 10 }}>
                    <div style={{ fontSize: 15, fontWeight: 700, color: day.off ? "var(--text-muted)" : "var(--color-midnight-navy)" }}>{day.d}</div>
                    <div style={{ fontSize: 12, color: "var(--text-muted)" }}>{day.date}</div>
                  </div>
                  <div style={{ display: "flex", flexDirection: "column", gap: 8 }}>
                    {day.off
                      ? <div style={{ textAlign: "center", padding: "30px 0", border: "1.5px dashed var(--border-default)", borderRadius: "var(--radius-sm)", color: "var(--text-muted)", fontSize: 13 }}>
                          <Icon name="palmtree" size={18} color="var(--color-steel-blue)" /><div style={{ marginTop: 4 }}>휴가</div>
                        </div>
                      : TIMES.map(t => {
                          const c = CONTESTED[`${di}-${t}`];
                          return (
                            <SlotButton key={t} time={t} state={slotState(di, t)}
                              meta={isOpen ? (c ? `신청자 ${c}명` : "예약 가능") : "신청 불가"}
                              onClick={() => isOpen && setSel({ day: di, time: t })} style={{ width: "100%" }} />
                          );
                        })}
                  </div>
                </div>
              ))}
            </div>
            <div style={{ display: "flex", gap: 18, marginTop: 16, paddingTop: 14, borderTop: "1px solid var(--color-mist)", flexWrap: "wrap" }}>
              <Legend color="var(--surface-card)" border="var(--border-default)" label="예약 가능" />
              <Legend color="var(--color-signal-blue)" border="var(--color-signal-blue)" label="선택" />
              <Legend dashed label="휴가 · 신청 불가" />
              <span style={{ fontSize: 12.5, color: "var(--text-secondary)", display: "flex", alignItems: "center", gap: 6 }}>
                <Icon name="users" size={14} color="var(--color-warning)" /> 신청자 n명 = 우선권 경합
              </span>
            </div>
          </Card>

          {/* 선택 요약 */}
          <Card padded style={{ position: "sticky", top: 96 }}>
            <div style={{ fontSize: 13, fontWeight: 700, letterSpacing: "0.05em", textTransform: "uppercase", color: "var(--text-muted)", marginBottom: 14 }}>선택한 예약</div>
            {sel ? (
              <>
                <div style={{ display: "flex", alignItems: "center", gap: 10, marginBottom: 8 }}>
                  <Icon name="calendar-days" size={20} color="var(--color-signal-blue)" />
                  <span style={{ fontSize: 18, fontWeight: 700, color: "var(--color-midnight-navy)" }}>{DAYS[sel.day].date} ({DAYS[sel.day].d})</span>
                </div>
                <div style={{ display: "flex", alignItems: "center", gap: 10, marginBottom: 18 }}>
                  <Icon name="clock" size={20} color="var(--color-signal-blue)" />
                  <span style={{ fontSize: 18, fontWeight: 700, color: "var(--color-midnight-navy)" }}>{sel.time} – {addMin(sel.time)}</span>
                </div>
                {selContested && (
                  <div style={{ marginBottom: 16 }}>
                    <Alert variant="warning" title={`다른 신청자 ${selContested}명`}>
                      마감 시점에 <b>우선권(마지막 이용일)</b>에 따라 확정됩니다.
                    </Alert>
                  </div>
                )}
                <Button variant="primary" block onClick={() => setConfirm(true)}>예약 신청하기</Button>
                <p style={{ fontSize: 12, color: "var(--text-muted)", marginTop: 12, lineHeight: 1.5, marginBottom: 0 }}>
                  신청은 마감(수 17:00) 전까지 취소할 수 있어요. <b>신청 ≠ 확정</b> — 관리자 확정 후 완료됩니다.
                </p>
              </>
            ) : (
              <div style={{ color: "var(--text-secondary)", fontSize: 14, lineHeight: 1.6, padding: "8px 0 4px" }}>
                {isOpen ? "왼쪽 캘린더에서 원하는 날짜·시간을 선택하세요." : "현재 예약 신청 기간이 아닙니다. 수요일 09:00에 오픈됩니다."}
              </div>
            )}
          </Card>
        </div>
      </main>
      <Footer />

      <Dialog open={confirm} title="예약을 신청할까요?" confirmLabel="신청하기" onConfirm={submit} onCancel={() => setConfirm(false)}>
        {sel && <>{DAYS[sel.day].date}({DAYS[sel.day].d}) <b>{sel.time} – {addMin(sel.time)}</b> 타임으로 신청합니다. 확정은 관리자 처리 후 완료되며, 완료 메일을 보내드려요.</>}
      </Dialog>

      {toast && (
        <div style={{ position: "fixed", bottom: 28, left: "50%", transform: "translateX(-50%)", zIndex: 200 }}>
          <Toast variant="success">{toast}</Toast>
        </div>
      )}
    </>
  );
}

function Legend({ color, border, dashed, label }) {
  return (
    <span style={{ fontSize: 12.5, color: "var(--text-secondary)", display: "flex", alignItems: "center", gap: 6 }}>
      <span style={{ width: 14, height: 14, borderRadius: 4, background: dashed ? "transparent" : color, border: dashed ? "1.5px dashed var(--border-default)" : `1px solid ${border}` }} />
      {label}
    </span>
  );
}
boot(() => <Page />);
</script>
</body>
</html>
