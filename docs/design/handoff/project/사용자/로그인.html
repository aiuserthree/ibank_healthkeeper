<link rel="stylesheet" href="../_ds/healthkeeper-ds-31e44bd2-68dd-4c55-91c3-7ca10811b6be/styles.css">
<script src="../_ds/healthkeeper-ds-31e44bd2-68dd-4c55-91c3-7ca10811b6be/_ds_bundle.js"></script>
<link rel="stylesheet" href="../_shared/responsive.css">
<meta name="ext-resource-dependency" content="../assets/logo-lockup.svg" data-resource-id="logoLockup" />
<meta name="ext-resource-dependency" content="../assets/logo-mark.svg" data-resource-id="logoMark" />
<style>
  html,body{height:100%}
  body{margin:0;background:var(--surface-canvas,#f8f9fb);color:var(--text-body,#0a0a0a)}
  .hk-sso-btn:hover{background:var(--color-mist);border-color:var(--color-steel-blue);box-shadow:var(--shadow-xs)}
  .hk-sso-btn:active{transform:translateY(.5px)}
  .hk-spin{animation:hkspin .8s linear infinite}
  @keyframes hkspin{to{transform:rotate(360deg)}}
</style>
</head>
<body>
<template id="__bundler_thumbnail" data-bg-color="#0b3558"><svg viewBox="0 0 1200 800" xmlns="http://www.w3.org/2000/svg"><rect width="1200" height="800" fill="#0b3558"></rect><circle cx="600" cy="356" r="150" fill="none" stroke="#ffffff" stroke-width="28"></circle><path d="M538 360 L585 407 L672 308" fill="none" stroke="#ffffff" stroke-width="34" stroke-linecap="round" stroke-linejoin="round"></path><circle cx="726" cy="242" r="38" fill="#006bff"></circle></svg></template>
<div id="root"></div>
<script type="text/babel" src="../_shared/member-shell.js" data-presets="react"></script>
<script type="text/babel" data-presets="react">
const NS = "HealthkeeperDS_31e44b";
const { Icon, boot } = window.MemberUI;
const { useState } = React;

function AuthHeader() {
  return (
    <header style={{ height: 72, background: "var(--surface-card)", borderBottom: "1px solid var(--border-default)" }}>
      <div style={{ maxWidth: 1200, margin: "0 auto", height: "100%", padding: "0 32px", display: "flex", alignItems: "center" }}>
        <a href="index.html"><img src={(window.__resources && window.__resources.logoLockup) || "../assets/logo-lockup.svg"} alt="헬스키퍼" height="34" /></a>
      </div>
    </header>
  );
}

// Microsoft 4색 스퀘어 로고 (SSO 표준 마크)
function MsLogo({ size = 20 }) {
  const g = size * 0.46, gap = size * 0.08;
  return (
    <span style={{ display: "inline-grid", gridTemplateColumns: `${g}px ${g}px`, gridTemplateRows: `${g}px ${g}px`, gap }}>
      <span style={{ background: "#F25022" }} />
      <span style={{ background: "#7FBA00" }} />
      <span style={{ background: "#00A4EF" }} />
      <span style={{ background: "#FFB900" }} />
    </span>
  );
}

function Page() {
  const { Card, Alert } = window[NS];
  const [phase, setPhase] = useState("idle");   // idle | connecting

  const login = () => {
    setPhase("connecting");
    setTimeout(() => { window.location.href = "예약하기.html"; }, 1600);
  };

  return (
    <>
      <AuthHeader />
      <main style={{ display: "flex", justifyContent: "center", padding: "64px 24px 72px" }}>
        <div style={{ width: 420 }}>
          <div style={{ textAlign: "center", marginBottom: 26 }}>
            <img src={(window.__resources && window.__resources.logoMark) || "../assets/logo-mark.svg"} alt="" width="52" height="52" />
            <h1 style={{ fontSize: 28, marginTop: 16, marginBottom: 6 }}>로그인</h1>
            <p style={{ fontSize: 15, color: "var(--text-secondary)", margin: 0, lineHeight: 1.6 }}>사내 메신저 <b style={{ color: "var(--color-midnight-navy)" }}>Microsoft Teams</b> 계정으로<br />로그인하고 헬스키퍼 예약을 진행하세요.</p>
          </div>

          <Card padded>
            {phase === "connecting" ? (
              <div style={{ padding: "20px 4px", textAlign: "center" }}>
                <span className="hk-spin" style={{ display: "inline-block", width: 34, height: 34, border: "3px solid var(--color-mist)", borderTopColor: "#6264A7", borderRadius: "999px" }} />
                <p style={{ fontSize: 15, fontWeight: 600, color: "var(--color-midnight-navy)", margin: "16px 0 4px" }}>Teams 계정으로 인증 중…</p>
                <p style={{ fontSize: 13.5, color: "var(--text-secondary)", margin: 0 }}>Microsoft 인증 창에서 계정을 확인해 주세요.</p>
              </div>
            ) : (
              <>
                <button onClick={login} className="hk-sso-btn" style={{
                  width: "100%", display: "flex", alignItems: "center", justifyContent: "center", gap: 12,
                  height: 52, borderRadius: "var(--radius-sm)", border: "1px solid var(--border-default)",
                  background: "var(--surface-card)", cursor: "pointer", font: "inherit", fontSize: 15.5, fontWeight: 700,
                  color: "var(--color-midnight-navy)", transition: "background .15s, border-color .15s, box-shadow .15s", whiteSpace: "nowrap",
                }}>
                  <MsLogo size={20} />
                  Microsoft Teams로 로그인
                </button>
              </>
            )}
          </Card>

          <div style={{ marginTop: 18 }}>
            <Alert variant="info" title="처음 이용하시나요?">
              사내 Teams 계정으로 첫 로그인하면 자동으로 가입이 완료됩니다. 별도 회원가입이 필요하지 않아요.
            </Alert>
          </div>
        </div>
      </main>
    </>
  );
}
boot(() => <Page />);
</script>
</body>
</html>
