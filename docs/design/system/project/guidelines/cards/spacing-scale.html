<!-- @dsCard group="Spacing" viewport="700x190" name="Spacing scale" subtitle="8px base · comfortable density" -->
<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="utf-8">
<link rel="stylesheet" href="../../styles.css">
<style>
  body { margin: 0; padding: 22px; background: var(--surface-card); display:flex; flex-direction:column; gap:10px; }
  .row { display:flex; align-items:center; gap:14px; }
  .lbl { width: 64px; font-family: var(--font-mono); font-size: 11px; color: var(--text-muted); text-align:right; }
  .bar { height: 14px; background: var(--color-signal-blue); border-radius: 3px; }
</style>
</head>
<body>
  <div class="row"><span class="lbl">8</span><div class="bar" style="width:8px"></div></div>
  <div class="row"><span class="lbl">16</span><div class="bar" style="width:16px"></div></div>
  <div class="row"><span class="lbl">24</span><div class="bar" style="width:24px"></div></div>
  <div class="row"><span class="lbl">32</span><div class="bar" style="width:32px"></div></div>
  <div class="row"><span class="lbl">48</span><div class="bar" style="width:48px"></div></div>
  <div class="row"><span class="lbl">64</span><div class="bar" style="width:64px"></div></div>
  <div class="row"><span class="lbl">96</span><div class="bar" style="width:96px"></div></div>
</body>
</html>
