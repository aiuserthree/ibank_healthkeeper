<!DOCTYPE html>
<html lang="ko">
<head>

<link rel="stylesheet" href="../../styles.css">

  .line { display: flex; align-items: baseline; gap: 16px; }
  .spec { font-family: var(--font-mono); font-size: 11px; color: var(--text-muted); white-space: nowrap; width: 96px; flex-shrink: 0; }

</head>
<body>
  <div class="stack">
    <div class="line"><span class="spec">subheading 24</span><span class="t" style="font-size:24px;font-weight:600;color:var(--text-heading)">매주 수요일 예약 오픈</span></div>

  </div>

</html>
