<!-- @dsCard group="Spacing" viewport="700x170" name="Elevation" subtitle="Blue-tinted shadows — never neutral gray" -->
<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="utf-8">
<link rel="stylesheet" href="../../styles.css">
<style>
  body { margin: 0; padding: 26px 22px; background: var(--surface-canvas); }
  .row { display: grid; grid-template-columns: repeat(4, 1fr); gap: 22px; }
  .g { display:flex; flex-direction:column; gap:12px; align-items:center; }
  .box { width: 100%; height: 64px; background: var(--surface-card); border-radius: var(--radius-md); }
  .lbl { font-size: 12px; font-weight:600; color: var(--text-heading); font-family: var(--font-mono); }
</style>
</head>
<body>
  <div class="row">
    <div class="g"><div class="box" style="box-shadow:var(--shadow-xs)"></div><span class="lbl">xs</span></div>
    <div class="g"><div class="box" style="box-shadow:var(--shadow-sm)"></div><span class="lbl">sm</span></div>
    <div class="g"><div class="box" style="box-shadow:var(--shadow-md)"></div><span class="lbl">md</span></div>
    <div class="g"><div class="box" style="box-shadow:var(--shadow-lg)"></div><span class="lbl">lg</span></div>
  </div>
</body>
</html>
