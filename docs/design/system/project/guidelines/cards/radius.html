<!-- @dsCard group="Spacing" viewport="700x150" name="Border radius" subtitle="4 buttons · 8 cards · 16 mockups · pill badges" -->
<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="utf-8">
<link rel="stylesheet" href="../../styles.css">
<style>
  body { margin: 0; padding: 22px; background: var(--surface-card); }
  .row { display: grid; grid-template-columns: repeat(5, 1fr); gap: 16px; align-items:end; }
  .g { display:flex; flex-direction:column; gap:10px; align-items:center; }
  .box { width: 84px; height: 60px; background: var(--color-fog); border: 1.5px solid var(--color-mist-border); }
  .lbl { font-size: 12px; font-weight:600; color: var(--text-heading); }
  .sub { font-size: 11px; color: var(--text-muted); }
</style>
</head>
<body>
  <div class="row">
    <div class="g"><div class="box" style="border-radius:var(--radius-sm)"></div><span class="lbl">sm · 4</span><span class="sub">버튼·입력</span></div>
    <div class="g"><div class="box" style="border-radius:var(--radius-md)"></div><span class="lbl">md · 8</span><span class="sub">카드</span></div>
    <div class="g"><div class="box" style="border-radius:var(--radius-lg)"></div><span class="lbl">lg · 12</span><span class="sub">패널</span></div>
    <div class="g"><div class="box" style="border-radius:var(--radius-xl)"></div><span class="lbl">xl · 16</span><span class="sub">목업</span></div>
    <div class="g"><div class="box" style="border-radius:var(--radius-full);width:60px"></div><span class="lbl">full</span><span class="sub">뱃지·아바타</span></div>
  </div>
</body>
</html>
