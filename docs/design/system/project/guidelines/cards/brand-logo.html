<!-- @dsCard group="Brand" viewport="700x170" name="Logo" subtitle="Mark + lockup · on light and navy" -->
<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="utf-8">
<link rel="stylesheet" href="../../styles.css">
<style>
  body { margin: 0; padding: 0; background: var(--surface-card); }
  .grid { display: grid; grid-template-columns: 1fr 1fr; height: 170px; }
  .cell { display:flex; align-items:center; justify-content:center; gap: 18px; }
  .light { background: var(--surface-card); border-right: 1px solid var(--border-default); }
  .navy { background: var(--color-midnight-navy); }
  .navy img { filter: brightness(0) invert(1); }
  .navy .word { color:#fff; }
  .lock { display:flex; align-items:center; gap:14px; }
  .word b { font-family: var(--font-display); font-weight:700; font-size:24px; color: var(--text-heading); letter-spacing:-0.02em; display:block; }
  .word span { font-family: var(--font-display); font-size:10px; font-weight:600; letter-spacing:1.5px; color: var(--text-secondary); }
</style>
</head>
<body>
  <div class="grid">
    <div class="cell light"><img src="../../assets/logo-lockup.svg" alt="헬스키퍼" height="48"></div>
    <div class="cell navy">
      <img src="../../assets/logo-mark.svg" alt="" width="52" height="52">
      <div class="word"><b style="color:#fff">헬스키퍼</b><span style="color:#a6bbd1">IBANK HEALTHKEEPER</span></div>
    </div>
  </div>
</body>
</html>
