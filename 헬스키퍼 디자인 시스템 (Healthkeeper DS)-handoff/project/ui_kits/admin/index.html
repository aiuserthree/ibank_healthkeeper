<!-- @dsCard group="관리자 콘솔" viewport="1280x820" name="관리자 콘솔" subtitle="대시보드 · 예약 관리(우선권) · 휴가 관리" -->
<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>헬스키퍼 — 관리자</title>
<link rel="stylesheet" href="../../styles.css">
<style>
  html, body { height: 100%; }
  body { margin: 0; background: var(--surface-canvas); }
  #root { min-height: 100%; }
</style>
</head>
<body>
  <div id="root"></div>
  <script src="https://unpkg.com/react@18.3.1/umd/react.development.js" integrity="sha384-hD6/rw4ppMLGNu3tX5cjIb+uRZ7UkRJ6BPkLpg4hAu/6onKUg4lLsHAs9EBPT82L" crossorigin="anonymous"></script>
  <script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.development.js" integrity="sha384-u6aeetuaXnQ38mYT8rp6sbXaQe3NL9t+IBXmnYxwkUI2Hw4bsp2Wvmx4yRQF1uAm" crossorigin="anonymous"></script>
  <script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js" integrity="sha384-m08KidiNqLdpJqLq95G/LEi8Qvjl/xUYll3QILypMoQ65QorJ9Lvtp2RXYGBFj1y" crossorigin="anonymous"></script>
  <script src="https://unpkg.com/lucide@0.460.0/dist/umd/lucide.min.js"></script>
  <script src="../../_ds_bundle.js"></script>
  <script type="text/babel" data-presets="react">
  /* 헬스키퍼 — 관리자 콘솔 (admin console). Inlined so the compiler does not bundle it. */
  (function () {
  const DS = window.HealthkeeperDS_31e44b;
  const { Button, IconButton, Input, Switch, Card, Avatar, Badge, StatusBadge, Alert, Toast, Dialog, Tabs, EmptyState } = DS;
  const { useState, useEffect } = React;

  function Icon({ name, size = 18, color, style }) {
    return <i data-lucide={name} style={{ width: size, height: size, color, display: "inline-flex", ...style }} />;
  }
  function useIcons() { useEffect(() => { window.lucide && window.lucide.createIcons(); }); }

  const DAYS = [
    { d: "월", date: "6/22" }, { d: "화", date: "6/23" }, { d: "수", date: "6/24" },
    { d: "목", date: "6/25" }, { d: "금", date: "6/26" },
  ];
  const TIMES = ["13:30", "14:30", "15:30", "16:30"];

  const SEED = {
    "6/22-13:30": [
      { name: "김민수", email: "minsu.kim@ibank.co.kr", applied: "09:02", lastUse: "2025.03.11", priority: true },
      { name: "이서연", email: "seoyeon.lee@ibank.co.kr", applied: "09:05", lastUse: "2025.05.20", priority: false },
    ],
    "6/22-14:30": [
      { name: "박지훈", email: "jihoon.park@ibank.co.kr", applied: "09:01", lastUse: "이력 없음", priority: true },
    ],
    "6/22-15:30": [
      { name: "최유진", email: "yujin.choi@ibank.co.kr", applied: "09:33", lastUse: "2025.04.02", priority: true },
      { name: "정현우", email: "hyunwoo.jung@ibank.co.kr", applied: "10:11", lastUse: "2025.04.28", priority: false },
      { name: "강다은", email: "daeun.kang@ibank.co.kr", applied: "11:40", lastUse: "2025.06.01", priority: false },
    ],
    "6/22-16:30": [],
  };

  function Sidebar({ route, go }) {
    useIcons();
    const items = [
      { k: "dashboard", label: "대시보드", icon: "layout-dashboard" },
      { k: "reservations", label: "예약 관리", icon: "calendar-check" },
      { k: "vacation", label: "휴가 관리", icon: "palmtree" },
      { k: "settings", label: "운영 설정", icon: "settings" },
    ];
    return (
      <aside style={{ width: 240, background: "var(--surface-card)", borderRight: "1px solid var(--border-default)", display: "flex", flexDirection: "column", position: "sticky", top: 0, height: "100vh" }}>
        <div style={{ padding: "22px 20px", display: "flex", alignItems: "center", gap: 10, borderBottom: "1px solid var(--border-default)" }}>
          <img src="../../assets/logo-mark.svg" width="34" height="34" alt="" />
          <div>
            <div style={{ fontSize: 15, fontWeight: 700, color: "var(--color-midnight-navy)", lineHeight: 1.1 }}>헬스키퍼</div>
            <div style={{ fontSize: 11, color: "var(--text-muted)", letterSpacing: "0.04em" }}>ADMIN</div>
          </div>
        </div>
        <nav style={{ padding: 12, display: "flex", flexDirection: "column", gap: 2, flex: 1 }}>
          {items.map(it => {
            const active = route === it.k;
            return (
              <button key={it.k} onClick={() => go(it.k)}
                style={{ display: "flex", alignItems: "center", gap: 12, padding: "11px 14px", borderRadius: "var(--radius-sm)", border: "none", cursor: "pointer", textAlign: "left", font: "inherit", fontSize: 15, fontWeight: 600, background: active ? "var(--color-signal-blue-soft)" : "transparent", color: active ? "var(--color-info-blue)" : "var(--color-slate-blue)" }}>
                <Icon name={it.icon} size={19} color={active ? "var(--color-signal-blue)" : "var(--color-slate-blue)"} />
                {it.label}
              </button>
            );
          })}
        </nav>
        <div style={{ padding: 16, borderTop: "1px solid var(--border-default)", display: "flex", alignItems: "center", gap: 10 }}>
          <Avatar name="관리자" size="sm" />
          <div style={{ flex: 1 }}>
            <div style={{ fontSize: 13, fontWeight: 700, color: "var(--color-midnight-navy)" }}>운영 관리자</div>
            <div style={{ fontSize: 11, color: "var(--text-muted)" }}>admin@ibank.co.kr</div>
          </div>
          <IconButton label="로그아웃"><Icon name="log-out" size={18} /></IconButton>
        </div>
      </aside>
    );
  }

  function PageHead({ title, sub, right }) {
    return (
      <div style={{ display: "flex", alignItems: "flex-end", justifyContent: "space-between", marginBottom: 24 }}>
        <div>
          <h1 style={{ fontSize: 30 }}>{title}</h1>
          {sub && <p style={{ fontSize: 15, color: "var(--text-secondary)", marginTop: 6 }}>{sub}</p>}
        </div>
        {right}
      </div>
    );
  }

  function Stat({ icon, tint, n, label }) {
    return (
      <Card padded>
        <div style={{ display: "flex", alignItems: "center", gap: 14 }}>
          <div style={{ width: 46, height: 46, borderRadius: 11, background: tint.bg, display: "flex", alignItems: "center", justifyContent: "center" }}>
            <Icon name={icon} size={22} color={tint.fg} />
          </div>
          <div>
            <div style={{ fontSize: 28, fontWeight: 700, color: "var(--color-midnight-navy)", lineHeight: 1 }}>{n}</div>
            <div style={{ fontSize: 13, color: "var(--text-secondary)", marginTop: 4 }}>{label}</div>
          </div>
        </div>
      </Card>
    );
  }

  function Dashboard({ go }) {
    useIcons();
    const pending = [
      { slot: "6/22(월) 15:30", count: 3 },
      { slot: "6/22(월) 13:30", count: 2 },
      { slot: "6/23(화) 14:30", count: 2 },
    ];
    return (
      <>
        <PageHead title="대시보드" sub="이번 주 예약 현황 요약 · 6/22(월) – 6/26(금)" />
        <Alert variant="warning" title="확정 대기 중인 신청이 있습니다">
          마감(수요일 17:00) 전까지 우선권을 확인하고 예약을 확정해 주세요.
        </Alert>
        <div style={{ display: "grid", gridTemplateColumns: "repeat(4,1fr)", gap: 16, margin: "20px 0 28px" }}>
          <Stat icon="inbox" n="24" label="이번 주 신청" tint={{ bg: "var(--color-signal-blue-soft)", fg: "var(--color-signal-blue)" }} />
          <Stat icon="circle-check-big" n="9" label="확정 완료" tint={{ bg: "var(--color-success-soft)", fg: "var(--color-success)" }} />
          <Stat icon="hourglass" n="7" label="확정 대기" tint={{ bg: "var(--color-warning-soft)", fg: "var(--color-warning)" }} />
          <Stat icon="user-x" n="8" label="탈락" tint={{ bg: "var(--color-danger-soft)", fg: "var(--color-danger)" }} />
        </div>
        <Card padded>
          <div style={{ display: "flex", justifyContent: "space-between", alignItems: "center", marginBottom: 16 }}>
            <h2 style={{ fontSize: 20 }}>확정 대기 슬롯</h2>
            <Button variant="secondary" size="sm" onClick={() => go("reservations")}
              iconRight={<Icon name="arrow-right" size={16} color="var(--color-midnight-navy)" />}>예약 관리로 이동</Button>
          </div>
          <div style={{ display: "flex", flexDirection: "column", gap: 10 }}>
            {pending.map((p, i) => (
              <div key={i} style={{ display: "flex", alignItems: "center", gap: 14, padding: "12px 16px", border: "1px solid var(--border-default)", borderRadius: "var(--radius-sm)" }}>
                <Icon name="clock" size={18} color="var(--color-slate-blue)" />
                <span style={{ fontSize: 15, fontWeight: 700, color: "var(--color-midnight-navy)" }}>{p.slot}</span>
                <Badge variant="warning">중복 신청 {p.count}명</Badge>
                <div style={{ flex: 1 }} />
                <Button variant="ghost" size="sm" onClick={() => go("reservations")}>우선권 확인</Button>
              </div>
            ))}
          </div>
        </Card>
      </>
    );
  }

  function Reservations() {
    useIcons();
    const [date, setDate] = useState("6/22");
    const [data, setData] = useState(SEED);
    const [toast, setToast] = useState(null);
    const [dialog, setDialog] = useState(null);
    const flash = (m) => { setToast(m); setTimeout(() => setToast(null), 2800); };
    const confirmApplicant = () => {
      const { key, idx } = dialog;
      setData(d => {
        const list = d[key].map((a, i) => ({ ...a, status: i === idx ? "확정" : (a.status === "확정" ? "확정" : "탈락") }));
        return { ...d, [key]: list };
      });
      flash(`${dialog.name}님 예약을 확정했습니다 · 완료 메일 발송`);
      setDialog(null);
    };
    return (
      <>
        <PageHead title="예약 관리" sub="날짜별 신청 현황 · 우선권을 확인하고 확정하세요"
          right={<Button variant="secondary" size="sm" iconLeft={<Icon name="mail" size={16} color="var(--color-midnight-navy)" />}>탈락자 재신청 안내 메일</Button>} />
        <div style={{ display: "flex", gap: 8, marginBottom: 20 }}>
          {DAYS.map(dy => (
            <button key={dy.date} onClick={() => setDate(dy.date)}
              style={{ padding: "10px 16px", borderRadius: "var(--radius-sm)", cursor: "pointer", font: "inherit", border: "1px solid " + (date === dy.date ? "var(--color-signal-blue)" : "var(--border-default)"), background: date === dy.date ? "var(--color-signal-blue)" : "var(--surface-card)", color: date === dy.date ? "#fff" : "var(--color-midnight-navy)", fontWeight: 600, fontSize: 14 }}>
              {dy.d} {dy.date}
            </button>
          ))}
        </div>
        <div style={{ display: "flex", flexDirection: "column", gap: 16 }}>
          {TIMES.map(t => {
            const key = `${date}-${t}`;
            const list = (data[key] || []).slice().sort((a, b) => {
              if (a.lastUse === "이력 없음") return -1;
              if (b.lastUse === "이력 없음") return 1;
              return a.lastUse < b.lastUse ? -1 : 1;
            });
            const confirmed = list.find(a => a.status === "확정");
            return (
              <Card key={t} padded>
                <div style={{ display: "flex", alignItems: "center", gap: 12, marginBottom: list.length ? 16 : 0 }}>
                  <Icon name="clock" size={18} color="var(--color-signal-blue)" />
                  <span style={{ fontSize: 17, fontWeight: 700, color: "var(--color-midnight-navy)" }}>{t} – {endT(t)}</span>
                  {list.length > 1 && <Badge variant="warning">중복 {list.length}명</Badge>}
                  {confirmed && <Badge variant="success" dot>확정 완료</Badge>}
                  <div style={{ flex: 1 }} />
                  {!list.length && <span style={{ fontSize: 13, color: "var(--text-muted)" }}>신청 없음</span>}
                </div>
                {list.length > 0 && (
                  <div>
                    <Row head />
                    {list.map((a, i) => (
                      <Row key={a.email} a={a} rank={i} confirmedExists={!!confirmed}
                        onConfirm={() => setDialog({ key, idx: data[key].indexOf(a), name: a.name })} />
                    ))}
                  </div>
                )}
              </Card>
            );
          })}
        </div>
        <Dialog open={!!dialog} title="예약을 확정할까요?" confirmLabel="확정하기" onConfirm={confirmApplicant} onCancel={() => setDialog(null)}>
          {dialog && <><b>{dialog.name}</b>님을 확정합니다. 같은 슬롯의 다른 신청자는 <b>탈락</b> 처리되며, 확정자에게 완료 메일이 발송됩니다.</>}
        </Dialog>
        {toast && (
          <div style={{ position: "fixed", bottom: 28, left: "calc(50% + 120px)", transform: "translateX(-50%)", zIndex: 200 }}>
            <Toast variant="success">{toast}</Toast>
          </div>
        )}
      </>
    );
  }

  function Row({ head, a, rank, confirmedExists, onConfirm }) {
    const grid = "28px minmax(140px,1.4fr) 76px 104px 92px 78px 88px";
    if (head) {
      return (
        <div style={{ display: "grid", gridTemplateColumns: grid, gap: 12, padding: "0 8px 10px", borderBottom: "1px solid var(--border-default)" }}>
          {["", "신청자", "신청 시각", "마지막 이용", "우선권", "상태", ""].map((h, i) => (
            <div key={i} style={{ fontSize: 12, fontWeight: 700, color: "var(--text-muted)", letterSpacing: "0.03em" }}>{h}</div>
          ))}
        </div>
      );
    }
    const status = a.status || "신청";
    return (
      <div style={{ display: "grid", gridTemplateColumns: grid, gap: 12, padding: "12px 8px", alignItems: "center", borderBottom: "1px solid var(--color-mist)" }}>
        <div style={{ fontSize: 13, fontWeight: 700, color: rank === 0 ? "var(--color-signal-blue)" : "var(--text-muted)" }}>{rank + 1}</div>
        <div style={{ display: "flex", alignItems: "center", gap: 10, minWidth: 0 }}>
          <Avatar name={a.name} size="sm" />
          <div style={{ minWidth: 0 }}>
            <div style={{ fontSize: 14, fontWeight: 700, color: "var(--color-midnight-navy)" }}>{a.name}</div>
            <div style={{ fontSize: 12, color: "var(--text-muted)", overflow: "hidden", textOverflow: "ellipsis", whiteSpace: "nowrap" }}>{a.email}</div>
          </div>
        </div>
        <div style={{ fontSize: 14, color: "var(--text-secondary)", fontVariantNumeric: "tabular-nums" }}>{a.applied}</div>
        <div style={{ fontSize: 13, color: a.lastUse === "이력 없음" ? "var(--color-warning)" : "var(--text-secondary)", fontWeight: a.lastUse === "이력 없음" ? 700 : 400 }}>{a.lastUse}</div>
        <div>{a.priority ? <Badge variant="info">우선권 O</Badge> : <Badge variant="neutral">X</Badge>}</div>
        <div><StatusBadge status={status} /></div>
        <div>
          {status === "확정" ? <span style={{ fontSize: 13, color: "var(--color-success)", fontWeight: 700 }}>완료</span>
            : status === "탈락" ? <span style={{ fontSize: 13, color: "var(--text-muted)" }}>—</span>
            : <Button variant="primary" size="sm" onClick={onConfirm}>확정</Button>}
        </div>
      </div>
    );
  }
  function endT(t) { const [h, m] = t.split(":").map(Number); return `${String(h + (m + 30 >= 60 ? 1 : 0)).padStart(2, "0")}:${String((m + 30) % 60).padStart(2, "0")}`; }

  function Vacation() {
    useIcons();
    const [off, setOff] = useState({ "6/24": true });
    const toggle = (d) => setOff(o => ({ ...o, [d]: !o[d] }));
    return (
      <>
        <PageHead title="휴가 관리" sub="예약 오픈(수요일 09:00) 전에만 안마사 휴가를 지정할 수 있어요" />
        <Alert variant="info" title="차주 일정 · 6/22(월) – 6/26(금)">
          휴가로 지정한 날짜는 회원 예약 화면에서 <b>예약 불가</b>로 표시됩니다. 오픈 후에는 수정할 수 없습니다.
        </Alert>
        <div style={{ display: "grid", gridTemplateColumns: "repeat(5,1fr)", gap: 16, marginTop: 24 }}>
          {DAYS.map(dy => {
            const isOff = !!off[dy.date];
            return (
              <Card key={dy.date} padded style={{ borderColor: isOff ? "var(--color-danger)" : "var(--border-default)", background: isOff ? "var(--color-danger-soft)" : "var(--surface-card)" }}>
                <div style={{ textAlign: "center" }}>
                  <div style={{ fontSize: 22, fontWeight: 700, color: "var(--color-midnight-navy)" }}>{dy.d}</div>
                  <div style={{ fontSize: 13, color: "var(--text-muted)", marginBottom: 16 }}>{dy.date}</div>
                  {isOff ? <Badge variant="danger" dot>휴가</Badge> : <Badge variant="success" dot>운영</Badge>}
                  <div style={{ marginTop: 18, display: "flex", justifyContent: "center" }}>
                    <Switch checked={isOff} onChange={() => toggle(dy.date)} />
                  </div>
                </div>
              </Card>
            );
          })}
        </div>
        <div style={{ marginTop: 28, display: "flex", gap: 10 }}>
          <Button variant="primary">휴가 저장</Button>
          <Button variant="secondary">변경 취소</Button>
        </div>
      </>
    );
  }

  function Settings() {
    useIcons();
    return (
      <>
        <PageHead title="운영 설정" sub="운영 시간 · 오픈/마감 · 메일 템플릿 (확장)" />
        <div style={{ display: "grid", gridTemplateColumns: "1fr 1fr", gap: 16, maxWidth: 760 }}>
          <Card padded>
            <h2 style={{ fontSize: 18, marginBottom: 16 }}>운영 시간</h2>
            <div style={{ display: "flex", flexDirection: "column", gap: 12 }}>
              <Input label="운영 시작" defaultValue="13:30" />
              <Input label="운영 종료" defaultValue="17:00" />
              <Input label="타임 길이 (분)" defaultValue="30" />
            </div>
          </Card>
          <Card padded>
            <h2 style={{ fontSize: 18, marginBottom: 16 }}>오픈 / 마감</h2>
            <div style={{ display: "flex", flexDirection: "column", gap: 14 }}>
              <Input label="예약 오픈" defaultValue="수요일 09:00" />
              <Input label="예약 마감" defaultValue="수요일 17:00" />
              <Switch label="예약 완료 메일 자동 발송" defaultChecked />
              <Switch label="탈락자 재신청 안내 자동 발송" defaultChecked />
            </div>
          </Card>
        </div>
      </>
    );
  }

  function App() {
    const [route, setRoute] = useState("reservations");
    const go = (r) => setRoute(r);
    useEffect(() => { window.lucide && window.lucide.createIcons(); });
    return (
      <div style={{ display: "flex", minHeight: "100vh" }}>
        <Sidebar route={route} go={go} />
        <main style={{ flex: 1, padding: "32px 40px", maxWidth: 1100 }}>
          {route === "dashboard" && <Dashboard go={go} />}
          {route === "reservations" && <Reservations />}
          {route === "vacation" && <Vacation />}
          {route === "settings" && <Settings />}
        </main>
      </div>
    );
  }

  ReactDOM.createRoot(document.getElementById("root")).render(<App />);
  })();
  </script>
</body>
</html>
