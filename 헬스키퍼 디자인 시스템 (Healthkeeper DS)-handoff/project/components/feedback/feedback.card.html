<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="utf-8">
<link rel="stylesheet" href="../../styles.css">
<style>
  body { margin: 0; padding: 24px; background: var(--surface-card); }
  .wrap { display: flex; flex-direction: column; gap: 20px; }
  .group { display: flex; flex-wrap: wrap; gap: 10px; align-items: center; }
  .lab { font-size: 11px; font-weight: 700; letter-spacing: 0.06em; text-transform: uppercase; color: var(--text-muted); margin-bottom: 10px; }
  .alerts { display: grid; grid-template-columns: 1fr 1fr; gap: 12px; }
</style>
</head>
<body>
  <div id="root" class="wrap"></div>
  <script src="https://unpkg.com/react@18.3.1/umd/react.development.js" integrity="sha384-hD6/rw4ppMLGNu3tX5cjIb+uRZ7UkRJ6BPkLpg4hAu/6onKUg4lLsHAs9EBPT82L" crossorigin="anonymous"></script>
  <script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.development.js" integrity="sha384-u6aeetuaXnQ38mYT8rp6sbXaQe3NL9t+IBXmnYxwkUI2Hw4bsp2Wvmx4yRQF1uAm" crossorigin="anonymous"></script>
  <script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js" integrity="sha384-m08KidiNqLdpJqLq95G/LEi8Qvjl/xUYll3QILypMoQ65QorJ9Lvtp2RXYGBFj1y" crossorigin="anonymous"></script>
  <script src="../../_ds_bundle.js"></script>
  <script type="text/babel" data-presets="react">
    const { Badge, StatusBadge, Alert, Toast, Dialog, Button } = window.HealthkeeperDS_31e44b;
    function Demo() {
      const [open, setOpen] = React.useState(false);
      return (
        <>
          <div>
            <div className="lab">Status · Badges</div>
            <div className="group">
              <StatusBadge status="신청" />
              <StatusBadge status="확정" />
              <StatusBadge status="탈락" />
              <StatusBadge status="취소" />
              <StatusBadge status="재신청" />
              <Badge variant="soft">일반 신청</Badge>
              <Badge variant="info">우선권 O</Badge>
            </div>
          </div>
          <div>
            <div className="lab">Alerts</div>
            <div className="alerts">
              <Alert variant="info" title="예약은 신청 후 확정됩니다">관리자 확정 처리 후 완료 메일이 발송됩니다.</Alert>
              <Alert variant="warning">실제 신청은 16:59까지, 17:00 정각 마감됩니다.</Alert>
            </div>
          </div>
          <div>
            <div className="lab">Toast · Dialog</div>
            <div className="group">
              <Toast variant="success">예약 신청이 접수되었습니다</Toast>
              <Button variant="secondary" size="sm" onClick={() => setOpen(true)}>다이얼로그 열기</Button>
            </div>
          </div>
          <Dialog open={open} title="예약을 신청할까요?" confirmLabel="신청하기"
                  onConfirm={() => setOpen(false)} onCancel={() => setOpen(false)}>
            6월 17일(화) 14:30 타임으로 신청합니다. 확정은 관리자 처리 후 완료됩니다.
          </Dialog>
        </>
      );
    }
    ReactDOM.createRoot(document.getElementById("root")).render(<Demo />);
  </script>
</body>
</html>
