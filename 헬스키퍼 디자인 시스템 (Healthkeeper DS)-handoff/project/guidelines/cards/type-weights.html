<!-- @dsCard group="Type" viewport="700x150" name="Weights & numerals" subtitle="400 · 500 · 600 · 700 — geometric authority" -->
<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="utf-8">
<link rel="stylesheet" href="../../styles.css">
<style>
  body { margin: 0; padding: 22px; background: var(--surface-card); display:flex; flex-direction:column; gap:18px; }
  .weights { display: grid; grid-template-columns: repeat(4, 1fr); gap: 14px; }
  .w { display:flex; flex-direction:column; gap:4px; }
  .big { font-size: 30px; color: var(--text-heading); line-height:1; }
  .lbl { font-size: 11px; color: var(--text-muted); font-family: var(--font-mono); }
  .num { font-size: 26px; font-weight: 700; color: var(--color-signal-blue); letter-spacing:-0.01em; font-variant-numeric: tabular-nums; }
</style>
</head>
<body>
  <div class="weights">
    <div class="w"><span class="big" style="font-weight:400">헬스키퍼 Aa</span><span class="lbl">Regular 400</span></div>
    <div class="w"><span class="big" style="font-weight:500">헬스키퍼 Aa</span><span class="lbl">Medium 500</span></div>
    <div class="w"><span class="big" style="font-weight:600">헬스키퍼 Aa</span><span class="lbl">Semibold 600</span></div>
    <div class="w"><span class="big" style="font-weight:700">헬스키퍼 Aa</span><span class="lbl">Bold 700</span></div>
  </div>
  <div class="num">13:30 · 14:30 · 15:30 · 16:30 &nbsp; — &nbsp; 0123456789</div>
</body>
</html>
