<!-- @dsCard group="Colors" viewport="700x170" name="Decorative gradients" subtitle="Atmospheric blobs behind product cards — never on UI chrome" -->
<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="utf-8">
<link rel="stylesheet" href="../../styles.css">
<style>
  body { margin: 0; padding: 20px; background: var(--surface-card); }
  .row { display: grid; grid-template-columns: repeat(4, 1fr); gap: 16px; }
  .grp { display: flex; flex-direction: column; gap: 8px; align-items: center; }
  .blob { width: 100%; height: 90px; border-radius: var(--radius-xl); filter: blur(2px); }
  .name { font-size: 12px; font-weight: 600; color: var(--text-heading); }
  .note { grid-column: 1 / -1; font-size: 12px; color: var(--text-muted); margin-top: 2px; }
</style>
</head>
<body>
  <div class="row">
    <div class="grp"><div class="blob" style="background:var(--blob-sunrise)"></div><div class="name">Sunrise</div></div>
    <div class="grp"><div class="blob" style="background:var(--blob-calm)"></div><div class="name">Calm</div></div>
    <div class="grp"><div class="blob" style="background:var(--blob-skyfire)"></div><div class="name">Skyfire</div></div>
    <div class="grp"><div class="blob" style="background:var(--blob-amber)"></div><div class="name">Amber</div></div>
    <div class="note">⚠ 분위기 연출 전용 — 텍스트·버튼·UI 요소에는 절대 사용하지 않음. 제품 목업 카드 뒤에만 흐릿하게 배치.</div>
  </div>
</body>
</html>
