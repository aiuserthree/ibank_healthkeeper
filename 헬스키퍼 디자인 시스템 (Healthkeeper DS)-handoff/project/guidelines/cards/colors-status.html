<!-- @dsCard group="Colors" viewport="700x150" name="Status colors" subtitle="Booking lifecycle: 신청 · 확정 · 탈락/취소" -->
<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="utf-8">
<link rel="stylesheet" href="../../styles.css">
<style>
  body { margin: 0; padding: 20px; background: var(--surface-card); }
  .row { display: grid; grid-template-columns: repeat(3, 1fr); gap: 16px; }
  .grp { display: flex; flex-direction: column; gap: 8px; }
  .bars { display: flex; gap: 6px; }
  .solid { height: 56px; flex: 2; border-radius: var(--radius-md); display: flex; align-items: center; justify-content: center; color: #fff; font-size: 13px; font-weight: 700; }
  .soft { height: 56px; flex: 1; border-radius: var(--radius-md); }
  .name { font-size: 12.5px; font-weight: 600; color: var(--text-heading); }
  .hex { font-size: 11px; color: var(--text-secondary); font-family: var(--font-mono); }
</style>
</head>
<body>
  <div class="row">
    <div class="grp"><div class="bars"><div class="solid" style="background:var(--color-warning)">신청</div><div class="soft" style="background:var(--color-warning-soft)"></div></div><div class="name">Warning · 신청/대기</div><div class="hex">#c2780c</div></div>
    <div class="grp"><div class="bars"><div class="solid" style="background:var(--color-success)">확정</div><div class="soft" style="background:var(--color-success-soft)"></div></div><div class="name">Success · 확정/완료</div><div class="hex">#1f8a5b</div></div>
    <div class="grp"><div class="bars"><div class="solid" style="background:var(--color-danger)">탈락</div><div class="soft" style="background:var(--color-danger-soft)"></div></div><div class="name">Danger · 탈락/취소</div><div class="hex">#d23f3f</div></div>
  </div>
</body>
</html>
