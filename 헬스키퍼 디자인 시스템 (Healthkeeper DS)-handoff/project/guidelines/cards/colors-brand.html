<!-- @dsCard group="Colors" viewport="700x150" name="Brand palette" subtitle="Navy voice · signal blue action · slate text" -->
<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="utf-8">
<link rel="stylesheet" href="../../styles.css">
<style>
  body { margin: 0; padding: 20px; background: var(--surface-card); }
  .row { display: grid; grid-template-columns: repeat(4, 1fr); gap: 14px; }
  .sw { display: flex; flex-direction: column; gap: 8px; }
  .chip { height: 64px; border-radius: var(--radius-md); border: 1px solid rgba(11,53,88,0.08); }
  .name { font-size: 13px; font-weight: 600; color: var(--text-heading); }
  .hex { font-size: 12px; color: var(--text-secondary); font-family: var(--font-mono); letter-spacing: 0.02em; }
  .role { font-size: 11px; color: var(--text-muted); }
</style>
</head>
<body>
  <div class="row">
    <div class="sw"><div class="chip" style="background:var(--color-midnight-navy)"></div><div class="name">Midnight Navy</div><div class="hex">#0b3558</div><div class="role">헤드라인 · 브랜드 보이스</div></div>
    <div class="sw"><div class="chip" style="background:var(--color-signal-blue)"></div><div class="name">Signal Blue</div><div class="hex">#006bff</div><div class="role">기본 액션 · CTA · 활성</div></div>
    <div class="sw"><div class="chip" style="background:var(--color-slate-blue)"></div><div class="name">Slate Blue</div><div class="hex">#476788</div><div class="role">보조 텍스트 · 아이콘</div></div>
    <div class="sw"><div class="chip" style="background:var(--color-carbon)"></div><div class="name">Carbon</div><div class="hex">#0a0a0a</div><div class="role">본문 텍스트</div></div>
  </div>
</body>
</html>
