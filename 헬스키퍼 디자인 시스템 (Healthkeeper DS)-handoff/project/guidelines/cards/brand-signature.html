<!-- @dsCard group="Brand" viewport="700x260" name="Signature: product card on gradient" subtitle="White product mockup floats over a soft gradient blob" -->
<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="utf-8">
<link rel="stylesheet" href="../../styles.css">
<style>
  body { margin: 0; padding: 0; background: var(--surface-canvas); }
  .stage { position: relative; height: 260px; display:flex; align-items:center; justify-content:center; overflow:hidden; }
  .blob { position:absolute; width: 360px; height: 300px; background: var(--blob-sunrise); filter: blur(36px); opacity: 0.85; top: -40px; right: 120px; }
  .blob2 { position:absolute; width: 280px; height: 260px; background: var(--blob-calm); filter: blur(40px); opacity: 0.7; bottom: -60px; left: 150px; }
  .card { position: relative; width: 380px; background: var(--surface-card); border-radius: var(--radius-xl); box-shadow: var(--shadow-lg); padding: 20px; }
  .head { display:flex; align-items:center; justify-content:space-between; margin-bottom: 14px; }
  .head b { font-size: 15px; color: var(--text-heading); font-weight:700; white-space:nowrap; }
  .head .wk { font-size: 12px; color: var(--text-muted); white-space:nowrap; }
  .slots { display:grid; grid-template-columns: repeat(4,1fr); gap: 8px; }
  .slot { font-size:12px; text-align:center; padding: 10px 0; border-radius: var(--radius-sm); border:1px solid var(--border-default); color: var(--text-secondary); }
  .slot.on { background: var(--color-signal-blue); color:#fff; border-color: var(--color-signal-blue); font-weight:600; }
  .slot.off { background: var(--color-fog); color: var(--text-muted); }
</style>
</head>
<body>
  <div class="stage">
    <div class="blob"></div>
    <div class="blob2"></div>
    <div class="card">
      <div class="head"><b>6월 17일 (화)</b><span class="wk">차주 예약</span></div>
      <div class="slots">
        <div class="slot off">13:30</div>
        <div class="slot on">14:30</div>
        <div class="slot">15:30</div>
        <div class="slot">16:30</div>
      </div>
    </div>
  </div>
</body>
</html>
