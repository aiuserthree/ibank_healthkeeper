<!-- @dsCard group="Type" viewport="700x230" name="Display & headings" subtitle="Pretendard 700 · navy · tight leading" -->
<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="utf-8">
<link rel="stylesheet" href="../../styles.css">
<style>
  body { margin: 0; padding: 24px; background: var(--surface-card); }
  .stack { display: flex; flex-direction: column; gap: 14px; }
  .line { display: flex; align-items: baseline; gap: 16px; }
  .spec { font-family: var(--font-mono); font-size: 11px; color: var(--text-muted); white-space: nowrap; width: 96px; flex-shrink: 0; }
  .d { font-family: var(--font-display); color: var(--text-heading); font-weight: 700; letter-spacing: -0.02em; line-height: 1.1; }
</style>
</head>
<body>
  <div class="stack">
    <div class="line"><span class="spec">display 68</span><span class="d" style="font-size:54px">예약을 더 쉽게</span></div>
    <div class="line"><span class="spec">heading-lg 50</span><span class="d" style="font-size:42px">헬스키퍼 예약</span></div>
    <div class="line"><span class="spec">heading 38</span><span class="d" style="font-size:34px">이번 주 신청 현황</span></div>
    <div class="line"><span class="spec">heading-sm 28</span><span class="d" style="font-size:26px;font-weight:600">신청자 상세 정보</span></div>
  </div>
</body>
</html>
