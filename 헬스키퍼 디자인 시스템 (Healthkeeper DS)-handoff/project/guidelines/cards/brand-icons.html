<!-- @dsCard group="Brand" viewport="700x150" name="Iconography (Lucide)" subtitle="1.75px stroke · 24px · navy/slate — flat single-color" -->
<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="utf-8">
<link rel="stylesheet" href="../../styles.css">
<style>
  body { margin: 0; padding: 24px; background: var(--surface-card); }
  .row { display:flex; flex-wrap:wrap; gap: 18px 22px; align-items:center; }
  .ic { display:flex; flex-direction:column; align-items:center; gap:8px; width: 64px; }
  .ic svg { width: 26px; height: 26px; color: var(--color-midnight-navy); stroke-width: 1.75; }
  .ic .accent { color: var(--color-signal-blue); }
  .ic span { font-size: 10.5px; color: var(--text-muted); font-family: var(--font-mono); }
</style>
</head>
<body>
  <div class="row">
    <div class="ic"><i data-lucide="calendar-days" class="accent"></i><span>calendar</span></div>
    <div class="ic"><i data-lucide="clock"></i><span>clock</span></div>
    <div class="ic"><i data-lucide="circle-check-big" class="accent"></i><span>confirm</span></div>
    <div class="ic"><i data-lucide="user-round"></i><span>user</span></div>
    <div class="ic"><i data-lucide="bell"></i><span>bell</span></div>
    <div class="ic"><i data-lucide="mail"></i><span>mail</span></div>
    <div class="ic"><i data-lucide="hourglass"></i><span>pending</span></div>
    <div class="ic"><i data-lucide="ban"></i><span>blocked</span></div>
    <div class="ic"><i data-lucide="chevron-right"></i><span>chevron</span></div>
    <div class="ic"><i data-lucide="settings"></i><span>settings</span></div>
  </div>
  <script src="https://unpkg.com/lucide@0.460.0/dist/umd/lucide.min.js"></script>
  <script>lucide.createIcons();</script>
</body>
</html>
