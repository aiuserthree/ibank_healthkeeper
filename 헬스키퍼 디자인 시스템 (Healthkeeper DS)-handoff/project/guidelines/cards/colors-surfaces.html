<!-- @dsCard group="Colors" viewport="700x150" name="Surfaces & lines" subtitle="Canvas, card, soft fills, hairline borders" -->
<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="utf-8">
<link rel="stylesheet" href="../../styles.css">
<style>
  body { margin: 0; padding: 20px; background: var(--surface-card); }
  .row { display: grid; grid-template-columns: repeat(5, 1fr); gap: 12px; }
  .sw { display: flex; flex-direction: column; gap: 8px; }
  .chip { height: 60px; border-radius: var(--radius-md); border: 1px solid var(--border-default); }
  .name { font-size: 12.5px; font-weight: 600; color: var(--text-heading); }
  .hex { font-size: 11px; color: var(--text-secondary); font-family: var(--font-mono); }
</style>
</head>
<body>
  <div class="row">
    <div class="sw"><div class="chip" style="background:var(--color-mist)"></div><div class="name">Mist</div><div class="hex">#f8f9fb</div></div>
    <div class="sw"><div class="chip" style="background:var(--color-paper)"></div><div class="name">Paper</div><div class="hex">#ffffff</div></div>
    <div class="sw"><div class="chip" style="background:var(--color-fog)"></div><div class="name">Fog</div><div class="hex">#e7edf6</div></div>
    <div class="sw"><div class="chip" style="background:var(--color-mist-border)"></div><div class="name">Mist Border</div><div class="hex">#d4e0ed</div></div>
    <div class="sw"><div class="chip" style="background:var(--color-silver)"></div><div class="name">Silver</div><div class="hex">#e6e6e6</div></div>
  </div>
</body>
</html>
