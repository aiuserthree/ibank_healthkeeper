<!-- @template name="회원 예약 페이지" description="헬스키퍼 차주 예약 캘린더 — 헤더 + 주간 슬롯 + 선택 요약. 회원용 예약 화면의 시작점." -->
<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>회원 예약 페이지 — 헬스키퍼</title>
<script src="https://unpkg.com/react@18.3.1/umd/react.development.js" integrity="sha384-hD6/rw4ppMLGNu3tX5cjIb+uRZ7UkRJ6BPkLpg4hAu/6onKUg4lLsHAs9EBPT82L" crossorigin="anonymous"></script>
<script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.development.js" integrity="sha384-u6aeetuaXnQ38mYT8rp6sbXaQe3NL9t+IBXmnYxwkUI2Hw4bsp2Wvmx4yRQF1uAm" crossorigin="anonymous"></script>
<script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js" integrity="sha384-m08KidiNqLdpJqLq95G/LEi8Qvjl/xUYll3QILypMoQ65QorJ9Lvtp2RXYGBFj1y" crossorigin="anonymous"></script>
<script src="https://unpkg.com/lucide@0.460.0/dist/umd/lucide.min.js"></script>
<script src="./ds-base.js"></script>
<style>
  html, body { height: 100%; }
  body { margin: 0; background: var(--surface-canvas, #f8f9fb); }
</style>
</head>
<body>
  <div id="root"></div>
  <script type="text/babel" data-presets="react">
    const NS = "HealthkeeperDS_31e44b";
    function start() {
      const { Button, Card, Avatar, SlotButton, Badge, Alert, Dialog, Toast } = window[NS];
      const { useState, useEffect } = React;
      const TIMES = ["13:30", "14:30", "15:30", "16:30"];
      const DAYS = [
        { d: "월", date: "6/22" }, { d: "화", date: "6/23" },
        { d: "수", date: "6/24", off: true }, { d: "목", date: "6/25" }, { d: "금", date: "6/26" },
      ];
      const CONFIRMED = new Set(["0-16:30", "3-13:30"]);
      const end = (t) => { const [h,m]=t.split(":").map(Number); const d=new Date(0,0,1,h,m+30); return `${String(d.getHours()).padStart(2,"0")}:${String(d.getMinutes()).padStart(2,"0")}`; };

      function Page() {
        const [sel, setSel] = useState(null);
        const [open, setOpen] = useState(false);
        const [toast, setToast] = useState(null);
        useEffect(() => { window.lucide && window.lucide.createIcons(); });
        const st = (di, t) => DAYS[di].off ? "disabled" : CONFIRMED.has(`${di}-${t}`) ? "confirmed"
          : (sel && sel.day===di && sel.time===t) ? "selected" : "available";
        const submit = () => { setOpen(false); setSel(null); setToast("예약 신청이 접수되었습니다"); setTimeout(()=>setToast(null), 3000); };
        return (
          <>
            <header style={{ height:72, background:"var(--surface-card)", borderBottom:"1px solid var(--border-default)", display:"flex", alignItems:"center" }}>
              <div style={{ maxWidth:1080, margin:"0 auto", width:"100%", padding:"0 32px", display:"flex", alignItems:"center" }}>
                <img src="../../assets/logo-lockup.svg" alt="헬스키퍼" height="34" />
                <div style={{ flex:1 }} />
                <Avatar name="김민수" size="sm" />
              </div>
            </header>
            <main style={{ maxWidth:1080, margin:"0 auto", padding:"40px 32px 80px" }}>
              <div style={{ display:"flex", alignItems:"baseline", gap:12, marginBottom:16 }}>
                <h1 style={{ fontSize:34, margin:0 }}>차주 예약</h1>
                <span style={{ fontSize:16, color:"var(--text-secondary)" }}>6/22(월) – 6/26(금)</span>
              </div>
              <div style={{ maxWidth:720, marginBottom:20 }}>
                <Alert variant="info" title="예약 가능 · 오늘 16:59 마감">신청은 접수 후 관리자 확정으로 완료됩니다.</Alert>
              </div>
              <div style={{ display:"grid", gridTemplateColumns:"1fr 300px", gap:24, alignItems:"start" }}>
                <Card padded>
                  <div style={{ display:"grid", gridTemplateColumns:"repeat(5,1fr)", gap:12 }}>
                    {DAYS.map((day, di) => (
                      <div key={di}>
                        <div style={{ textAlign:"center", marginBottom:10 }}>
                          <div style={{ fontSize:15, fontWeight:700, color: day.off ? "var(--text-muted)" : "var(--color-midnight-navy)" }}>{day.d}</div>
                          <div style={{ fontSize:12, color:"var(--text-muted)" }}>{day.date}</div>
                        </div>
                        <div style={{ display:"flex", flexDirection:"column", gap:8 }}>
                          {day.off
                            ? <div style={{ textAlign:"center", padding:"28px 0", border:"1.5px dashed var(--border-default)", borderRadius:"var(--radius-sm)", color:"var(--text-muted)", fontSize:13 }}>휴가</div>
                            : TIMES.map(t => <SlotButton key={t} time={t} state={st(di,t)} meta={CONFIRMED.has(`${di}-${t}`)?"마감":undefined} onClick={() => setSel({day:di, time:t})} style={{ width:"100%" }} />)}
                        </div>
                      </div>
                    ))}
                  </div>
                </Card>
                <Card padded>
                  <div style={{ fontSize:13, fontWeight:700, letterSpacing:"0.05em", textTransform:"uppercase", color:"var(--text-muted)", marginBottom:14 }}>선택한 예약</div>
                  {sel ? (
                    <>
                      <div style={{ fontSize:18, fontWeight:700, color:"var(--color-midnight-navy)", marginBottom:6 }}>{DAYS[sel.day].date} ({DAYS[sel.day].d})</div>
                      <div style={{ fontSize:18, fontWeight:700, color:"var(--color-midnight-navy)", marginBottom:20 }}>{sel.time} – {end(sel.time)}</div>
                      <Button variant="primary" block onClick={() => setOpen(true)}>예약 신청하기</Button>
                    </>
                  ) : <div style={{ color:"var(--text-secondary)", fontSize:14, lineHeight:1.6 }}>왼쪽에서 날짜·시간을 선택하세요.</div>}
                </Card>
              </div>
            </main>
            <Dialog open={open} title="예약을 신청할까요?" confirmLabel="신청하기" onConfirm={submit} onCancel={() => setOpen(false)}>
              {sel && <>{DAYS[sel.day].date}({DAYS[sel.day].d}) <b>{sel.time}</b> 타임으로 신청합니다.</>}
            </Dialog>
            {toast && <div style={{ position:"fixed", bottom:28, left:"50%", transform:"translateX(-50%)" }}><Toast variant="success">{toast}</Toast></div>}
          </>
        );
      }
      ReactDOM.createRoot(document.getElementById("root")).render(<Page />);
    }
    (function wait(){ window[NS] ? start() : setTimeout(wait, 40); })();
  </script>
</body>
</html>
