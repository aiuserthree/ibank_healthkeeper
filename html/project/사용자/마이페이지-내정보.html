<body>
<template id="__bundler_thumbnail" data-bg-color="#0b3558"><svg viewBox="0 0 1200 800" xmlns="http://www.w3.org/2000/svg"><rect width="1200" height="800" fill="#0b3558"></rect><circle cx="600" cy="356" r="150" fill="none" stroke="#ffffff" stroke-width="28"></circle><path d="M538 360 L585 407 L672 308" fill="none" stroke="#ffffff" stroke-width="34" stroke-linecap="round" stroke-linejoin="round"></path><circle cx="726" cy="242" r="38" fill="#006bff"></circle></svg></template>
<div id="root"></div>
<script type="text/babel" src="../_shared/member-shell.js" data-presets="react"></script>
<script type="text/babel" data-presets="react">
const NS = "HealthkeeperDS_31e44b";
const { Icon, Header, Footer, boot } = window.MemberUI;
function SubNav({ active }) {
  const items = [["res", "예약 내역", "마이페이지-예약내역.html"], ["profile", "계정", "마이페이지-내정보.html"]];
  return (
    <div style={{ display: "flex", gap: 4, borderBottom: "1px solid var(--border-default)", marginBottom: 28 }}>
      {items.map(([k, l, href]) => (
        <a key={k} href={href} style={{ padding: "12px 4px", marginRight: 20, textDecoration: "none", fontSize: 15.5, fontWeight: 600,
          color: active === k ? "var(--color-signal-blue)" : "var(--text-secondary)",
          borderBottom: "2px solid " + (active === k ? "var(--color-signal-blue)" : "transparent"), marginBottom: -1 }}>{l}</a>
      ))}
    </div>
  );
}

function MsLogo({ size = 16 }) {
  const g = size * 0.46, gap = size * 0.08;
  return (
    <span style={{ display: "inline-grid", gridTemplateColumns: `${g}px ${g}px`, gridTemplateRows: `${g}px ${g}px`, gap }}>
      <span style={{ background: "#F25022" }} />
      <span style={{ background: "#7FBA00" }} />
      <span style={{ background: "#00A4EF" }} />
      <span style={{ background: "#FFB900" }} />
    </span>
  );
}

function ReadField({ label, value }) {
  return (
    <div>
      <div style={{ fontSize: 12.5, color: "var(--text-muted)", marginBottom: 5 }}>{label}</div>
      <div style={{ fontSize: 16, fontWeight: 600, color: "var(--color-midnight-navy)" }}>{value}</div>
    </div>
  );
}

function Page() {
  const { Card, Avatar } = window[NS];

  return (
    <>
      <Header active="mypage" loggedIn={true} />
      <main style={{ maxWidth: 880, margin: "0 auto", padding: "40px 32px 72px" }}>
        <h1 style={{ fontSize: 34, marginBottom: 4 }}>마이페이지</h1>
        <p style={{ fontSize: 16, color: "var(--text-secondary)", marginTop: 0, marginBottom: 24 }}>회원 정보를 확인하세요.</p>
        <SubNav active="profile" />

        {/* 기본 정보 — Teams 계정 연동 (읽기 전용) */}
        <Card padded>
          <div style={{ display: "flex", alignItems: "center", justifyContent: "space-between", marginBottom: 18, gap: 12, flexWrap: "wrap" }}>
            <h2 style={{ fontSize: 18, margin: 0 }}>기본 정보</h2>
            <span style={{ display: "inline-flex", alignItems: "center", gap: 7, padding: "5px 11px", background: "var(--color-mist)", borderRadius: 999, fontSize: 12.5, fontWeight: 600, color: "var(--color-slate-blue)" }}>
              <MsLogo size={14} /> Microsoft Teams 계정 연동
            </span>
          </div>
          <div style={{ display: "flex", alignItems: "center", gap: 16, paddingBottom: 18, marginBottom: 18, borderBottom: "1px solid var(--color-mist)" }}>
            <Avatar name="김민수" size="lg" />
            <div>
              <div style={{ fontSize: 19, fontWeight: 700, color: "var(--color-midnight-navy)" }}>김민수 <span style={{ fontSize: 14, fontWeight: 500, color: "var(--text-secondary)" }}>대리</span></div>
              <div style={{ fontSize: 14, color: "var(--text-secondary)", marginTop: 2 }}>디지털플랫폼부 · ibank</div>
            </div>
          </div>
          <div style={{ display: "grid", gridTemplateColumns: "1fr 1fr", gap: "20px 32px" }}>
            <ReadField label="이름" value="김민수" />
            <ReadField label="이메일" value="minsu.kim@ibank.co.kr" />
            <ReadField label="부서" value="디지털플랫폼부" />
            <ReadField label="직급" value="대리" />
          </div>
        </Card>

        {/* 이용 정보 */}
        <Card padded flat style={{ marginTop: 16, background: "var(--color-mist)" }}>
          <div style={{ display: "flex", gap: 48, flexWrap: "wrap" }}>
            <KV k="최근 로그인" v="2025.06.15" />
            <KV k="마지막 이용일" v="2025.04.18" />
            <KV k="누적 이용" v="6회" />
          </div>
        </Card>
      </main>
      <Footer />
    </>
  );
}
function KV({ k, v }) {
  return (
    <div>
      <div style={{ fontSize: 12, color: "var(--text-muted)", marginBottom: 6 }}>{k}</div>
      <div style={{ fontSize: 16, fontWeight: 700, color: "var(--color-midnight-navy)" }}>{v}</div>
    </div>
  );
}
boot(() => <Page />);
</script>
