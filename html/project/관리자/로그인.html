(function(){ if (window.ReactDOM && ReactDOM.createRoot && !ReactDOM.__hkPatched) { var o = ReactDOM.createRoot.bind(ReactDOM); ReactDOM.createRoot = function (c, p) { if (!c || (c.id === "root" && !window.__hkReady)) return { render:function(){}, unmount:function(){} }; return o(c, p); }; ReactDOM.__hkPatched = true; } })();

<link rel="stylesheet" href="../_ds/healthkeeper-ds-31e44bd2-68dd-4c55-91c3-7ca10811b6be/styles.css">
<script src="../_ds/healthkeeper-ds-31e44bd2-68dd-4c55-91c3-7ca10811b6be/_ds_bundle.js"></script>
<link rel="stylesheet" href="../_shared/responsive.css">

<style>
  html,body{height:100%}
  body{margin:0;background:var(--surface-canvas,#f8f9fb);color:var(--text-body,#0a0a0a)}
</style>
</head>
<body>
<template id="__bundler_thumbnail" data-bg-color="#0b3558"><svg viewBox="0 0 1200 800" xmlns="http://www.w3.org/2000/svg"><rect width="1200" height="800" fill="#0b3558"></rect><circle cx="600" cy="356" r="150" fill="none" stroke="#ffffff" stroke-width="28"></circle><path d="M538 360 L585 407 L672 308" fill="none" stroke="#ffffff" stroke-width="34" stroke-linecap="round" stroke-linejoin="round"></path><circle cx="726" cy="242" r="38" fill="#006bff"></circle></svg></template>
<div id="root"></div>
<script type="text/babel" src="../_shared/admin-shell.js" data-presets="react"></script>
<script type="text/babel" data-presets="react">
const NS = "HealthkeeperDS_31e44b";
const { Icon, boot } = window.AdminUI;
const { useState } = React;

function Page() {
  const { Button, Input, Card, Alert } = window[NS];
  const [id, setId] = useState("");
  const [pw, setPw] = useState("");
  const [err, setErr] = useState(false);

  const submit = () => {
    if (id.trim().toLowerCase() === "admin@ibank.co.kr" && pw === "admin123") window.location.href = "대시보드.html";
    else setErr(true);
  };

  return (
    <div style={{ minHeight: "100vh", display: "flex", alignItems: "center", justifyContent: "center", padding: "24px" }}>
      <div style={{ width: 420 }}>
        <div style={{ textAlign: "center", marginBottom: 24 }}>
          <img src={(window.__resources && window.__resources.logoMark) || "../assets/logo-mark.svg"} alt="" width="54" height="54" />
          <div style={{ display: "flex", alignItems: "center", justifyContent: "center", gap: 8, marginTop: 14 }}>
            <h1 style={{ fontSize: 26, margin: 0 }}>헬스키퍼 관리자</h1>
          </div>
          <p style={{ fontSize: 14, color: "var(--text-muted)", margin: "6px 0 0", letterSpacing: "0.06em" }}>ADMIN CONSOLE</p>
        </div>

        {err && <div style={{ marginBottom: 16 }}><Alert variant="danger" title="로그인에 실패했습니다">관리자 계정 정보를 확인해 주세요.</Alert></div>}

        <Card padded>
          <div style={{ display: "flex", flexDirection: "column", gap: 16 }}>
            <Input label="관리자 이메일" type="email" placeholder="admin@ibank.co.kr" value={id} onChange={e => setId(e.target.value)} />
            <Input label="비밀번호" type="password" placeholder="••••••••" value={pw} onChange={e => setPw(e.target.value)} />
            <Button variant="primary" block size="lg" onClick={submit}>로그인</Button>
          </div>
          <div style={{ marginTop: 14, padding: "12px 14px", background: "var(--color-mist)", borderRadius: "var(--radius-sm)", fontSize: 12.5, color: "var(--text-secondary)", lineHeight: 1.6 }}>
            <Icon name="shield" size={14} color="var(--color-slate-blue)" style={{ marginRight: 6, verticalAlign: "-2px" }} />
            데모 계정 — <b>admin@ibank.co.kr</b> / <b>admin123</b>
          </div>
        </Card>
        <div style={{ textAlign: "center", marginTop: 18, fontSize: 13.5, color: "var(--text-secondary)" }}>
          <a href="../사용자/index.html" style={{ color: "var(--color-slate-blue)", textDecoration: "none" }}>← 회원 화면으로 이동</a>
        </div>
      </div>
    </div>
  );
}
boot(() => <Page />);
</script>
</body>
</html>
