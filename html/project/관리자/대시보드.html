<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>헬스키퍼 관리자 — 대시보드</title>
<script src="https://unpkg.com/react@18.3.1/umd/react.development.js" integrity="sha384-hD6/rw4ppMLGNu3tX5cjIb+uRZ7UkRJ6BPkLpg4hAu/6onKUg4lLsHAs9EBPT82L" crossorigin="anonymous"></script>
<script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.development.js" integrity="sha384-u6aeetuaXnQ38mYT8rp6sbXaQe3NL9t+IBXmnYxwkUI2Hw4bsp2Wvmx4yRQF1uAm" crossorigin="anonymous"></script>
<script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js" integrity="sha384-m08KidiNqLdpJqLq95G/LEi8Qvjl/xUYll3QILypMoQ65QorJ9Lvtp2RXYGBFj1y" crossorigin="anonymous"></script>
<script src="https://unpkg.com/lucide@0.460.0/dist/umd/lucide.min.js"></script>
<script>
(function(){ if (window.ReactDOM && ReactDOM.createRoot && !ReactDOM.__hkPatched) { var o = ReactDOM.createRoot.bind(ReactDOM); ReactDOM.createRoot = function (c, p) { if (!c || (c.id === "root" && !window.__hkReady)) return { render:function(){}, unmount:function(){} }; return o(c, p); }; ReactDOM.__hkPatched = true; } })();
</script>
<link rel="stylesheet" href="../_ds/healthkeeper-ds-31e44bd2-68dd-4c55-91c3-7ca10811b6be/styles.css">
<script src="../_ds/healthkeeper-ds-31e44bd2-68dd-4c55-91c3-7ca10811b6be/_ds_bundle.js"></script>
<link rel="stylesheet" href="../_shared/responsive.css">
<meta name="ext-resource-dependency" content="../assets/logo-mark.svg" data-resource-id="logoMark" />
<style>
  html,body{height:100%}
  body{margin:0;background:var(--surface-canvas,#f8f9fb);color:var(--text-body,#0a0a0a)}
</style>
</head>
<body>
<template id="__bundler_thumbnail" data-bg-color="#0b3558"><svg viewBox="0 0 1200 800" xmlns="http://www.w3.org/2000/svg"><rect width="1200" height="800" fill="#0b3558"></rect><circle cx="600" cy="356" r="150" fill="none" stroke="#ffffff" stroke-width="28"></circle><path d="M538 360 L585 407 L672 308" fill="none" stroke="#ffffff" stroke-width="34" stroke-linecap="round" stroke-linejoin="round"></path><circle cx="726" cy="242" r="38" fill="#006bff"></circle></svg></template>
<div id="root"></div>
<script type="text/babel" src="../_shared/admin-shell.js" data-presets="react"></script>
<script type="text/babel" data-presets="react">
const NS = "HealthkeeperDS_31e44b";
const { Icon, PageHead, Shell, boot } = window.AdminUI;

function Stat({ icon, tint, n, label }) {
  const { Card } = window[NS];
  return (
    <Card padded>
      <div style={{ display: "flex", alignItems: "center", gap: 14 }}>
        <div style={{ width: 46, height: 46, borderRadius: 11, background: tint.bg, display: "flex", alignItems: "center", justifyContent: "center" }}>
          <Icon name={icon} size={22} color={tint.fg} />
        </div>
        <div>
          <div style={{ fontSize: 28, fontWeight: 700, color: "var(--color-midnight-navy)", lineHeight: 1 }}>{n}</div>
          <div style={{ fontSize: 13, color: "var(--text-secondary)", marginTop: 4 }}>{label}</div>
        </div>
      </div>
    </Card>
  );
}

function Page() {
  const { Button, Card, Badge, Alert } = window[NS];
  const pending = [
    { slot: "6/22(월) 15:30", count: 3, noHistory: true },
    { slot: "6/22(월) 13:30", count: 2, noHistory: false },
    { slot: "6/23(화) 14:30", count: 2, noHistory: false },
  ];
  const mails = [
    { label: "예약 완료 메일 (일반)", sent: 9, fail: 0 },
    { label: "탈락/재신청 안내 메일", sent: 8, fail: 1 },
    { label: "이메일 인증 메일", sent: 24, fail: 0 },
  ];
  return (
    <Shell active="dashboard">
      <PageHead title="대시보드"
        sub="이번 주 예약 현황 요약 · 6/22(월) – 6/26(금)"
        right={<Badge variant="info" dot>현재 상태 · 예약 가능(OPEN)</Badge>} />

      <Alert variant="warning" title="확정 대기 중인 신청이 있습니다">
        마감(수요일 17:00) 전까지 우선권을 확인하고 예약을 확정해 주세요. 이력 없는 신청자는 수동 확정이 필요합니다.
      </Alert>

      <div style={{ display: "grid", gridTemplateColumns: "repeat(4,1fr)", gap: 16, margin: "20px 0 28px" }}>
        <Stat icon="inbox" n="24" label="이번 주 신청" tint={{ bg: "var(--color-signal-blue-soft)", fg: "var(--color-signal-blue)" }} />
        <Stat icon="circle-check-big" n="9" label="확정 완료" tint={{ bg: "var(--color-success-soft)", fg: "var(--color-success)" }} />
        <Stat icon="hourglass" n="7" label="확정 대기" tint={{ bg: "var(--color-warning-soft)", fg: "var(--color-warning)" }} />
        <Stat icon="user-x" n="8" label="탈락" tint={{ bg: "var(--color-danger-soft)", fg: "var(--color-danger)" }} />
      </div>

      <div style={{ display: "grid", gridTemplateColumns: "1.5fr 1fr", gap: 16, alignItems: "start" }}>
        {/* 확정 대기 슬롯 */}
        <Card padded>
          <div style={{ display: "flex", justifyContent: "space-between", alignItems: "center", marginBottom: 16 }}>
            <h2 style={{ fontSize: 20, margin: 0 }}>확정 대기 슬롯</h2>
            <a href="예약관리.html"><Button variant="secondary" size="sm" iconRight={<Icon name="arrow-right" size={16} color="var(--color-midnight-navy)" />}>예약 관리로</Button></a>
          </div>
          <div style={{ display: "flex", flexDirection: "column", gap: 10 }}>
            {pending.map((p, i) => (
              <div key={i} style={{ display: "flex", alignItems: "center", gap: 12, padding: "12px 16px", border: "1px solid var(--border-default)", borderRadius: "var(--radius-sm)", flexWrap: "wrap" }}>
                <Icon name="clock" size={18} color="var(--color-slate-blue)" />
                <span style={{ fontSize: 15, fontWeight: 700, color: "var(--color-midnight-navy)" }}>{p.slot}</span>
                <Badge variant="warning">중복 {p.count}명</Badge>
                {p.noHistory && <Badge variant="danger">이력 없음 · 수동</Badge>}
                <div style={{ flex: 1 }} />
                <a href="신청자상세.html"><Button variant="ghost" size="sm">우선권 확인</Button></a>
              </div>
            ))}
          </div>
        </Card>

        {/* 메일 발송 상태 */}
        <Card padded>
          <h2 style={{ fontSize: 20, margin: "0 0 16px" }}>메일 발송 상태</h2>
          <div style={{ display: "flex", flexDirection: "column", gap: 12 }}>
            {mails.map((m, i) => (
              <div key={i} style={{ display: "flex", alignItems: "center", gap: 10 }}>
                <Icon name="mail" size={16} color="var(--color-slate-blue)" />
                <span style={{ fontSize: 13.5, color: "var(--color-midnight-navy)", flex: 1 }}>{m.label}</span>
                <Badge variant="success">발송 {m.sent}</Badge>
                {m.fail > 0 ? <Badge variant="danger">실패 {m.fail}</Badge> : <Badge variant="soft">실패 0</Badge>}
              </div>
            ))}
          </div>
          <div style={{ marginTop: 16, paddingTop: 14, borderTop: "1px solid var(--color-mist)" }}>
            <a href="재신청메일.html"><Button variant="secondary" size="sm" block>재발송 / 안내 메일 관리</Button></a>
          </div>
        </Card>
      </div>
    </Shell>
  );
}
boot(() => <Page />);
</script>
</body>
</html>
