<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>헬스키퍼 — 탈락자 재신청</title>
<script src="https://unpkg.com/react@18.3.1/umd/react.development.js" integrity="sha384-hD6/rw4ppMLGNu3tX5cjIb+uRZ7UkRJ6BPkLpg4hAu/6onKUg4lLsHAs9EBPT82L" crossorigin="anonymous"></script>
<script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.development.js" integrity="sha384-u6aeetuaXnQ38mYT8rp6sbXaQe3NL9t+IBXmnYxwkUI2Hw4bsp2Wvmx4yRQF1uAm" crossorigin="anonymous"></script>
<script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js" integrity="sha384-m08KidiNqLdpJqLq95G/LEi8Qvjl/xUYll3QILypMoQ65QorJ9Lvtp2RXYGBFj1y" crossorigin="anonymous"></script>
<script src="https://unpkg.com/lucide@0.460.0/dist/umd/lucide.min.js"></script>
<script>
(function(){ if (window.ReactDOM && ReactDOM.createRoot && !ReactDOM.__hkPatched) { var o = ReactDOM.createRoot.bind(ReactDOM); ReactDOM.createRoot = function (c, p) { if (!c || (c.id === "root" && !window.__hkReady)) return { render:function(){}, unmount:function(){} }; return o(c, p); }; ReactDOM.__hkPatched = true; } })();
</script>
<link rel="stylesheet" href="../_ds/healthkeeper-ds-31e44bd2-68dd-4c55-91c3-7ca10811b6be/styles.css">
<script src="../_ds/healthkeeper-ds-31e44bd2-68dd-4c55-91c3-7ca10811b6be/_ds_bundle.js"></script>
<link rel="stylesheet" href="../_shared/responsive.css">
<meta name="ext-resource-dependency" content="../assets/logo-lockup.svg" data-resource-id="logoLockup" />
<meta name="ext-resource-dependency" content="../assets/logo-mark.svg" data-resource-id="logoMark" />
<style>
  html,body{height:100%}
  body{margin:0;background:var(--surface-canvas,#f8f9fb);color:var(--text-body,#0a0a0a)}
</style>
</head>
<body>
<template id="__bundler_thumbnail" data-bg-color="#0b3558"><svg viewBox="0 0 1200 800" xmlns="http://www.w3.org/2000/svg"><rect width="1200" height="800" fill="#0b3558"></rect><circle cx="600" cy="356" r="150" fill="none" stroke="#ffffff" stroke-width="28"></circle><path d="M538 360 L585 407 L672 308" fill="none" stroke="#ffffff" stroke-width="34" stroke-linecap="round" stroke-linejoin="round"></path><circle cx="726" cy="242" r="38" fill="#006bff"></circle></svg></template>
<div id="root"></div>
<script type="text/babel" src="../_shared/member-shell.js" data-presets="react"></script>
<script type="text/babel" data-presets="react">
const NS = "HealthkeeperDS_31e44b";
const { Icon, Header, Footer, boot, addMin } = window.MemberUI;
const { useState } = React;

// 마감 후 비어있는(미확정) 슬롯들. taken=true 인 슬롯은 클릭 순간 이미 확정된 충돌 케이스 데모.
const INIT_SLOTS = [
  { id: "s1", day: "화 6/23", time: "13:30" },
  { id: "s2", day: "화 6/23", time: "15:30" },
  { id: "s3", day: "목 6/25", time: "14:30" },
  { id: "s4", day: "목 6/25", time: "16:30", taken: true },
  { id: "s5", day: "금 6/26", time: "13:30" },
  { id: "s6", day: "금 6/26", time: "15:30" },
];

function AccessToggle({ value, onChange }) {
  const opts = [["eligible", "탈락자 (대상)"], ["ineligible", "비대상자"], ["closed", "기간 종료"]];
  return (
    <div style={{ display: "flex", gap: 6, flexWrap: "wrap" }}>
      <span style={{ fontSize: 12, color: "var(--text-muted)", alignSelf: "center", marginRight: 2 }}>데모 접근</span>
      {opts.map(([k, l]) => (
        <button key={k} onClick={() => onChange(k)} style={{
          padding: "6px 12px", borderRadius: 999, cursor: "pointer", font: "inherit", fontSize: 12.5, fontWeight: 600,
          border: "1px solid " + (value === k ? "var(--color-signal-blue)" : "var(--border-default)"),
          background: value === k ? "var(--color-signal-blue-soft)" : "var(--surface-card)",
          color: value === k ? "var(--color-info-blue)" : "var(--color-slate-blue)" }}>{l}</button>
      ))}
    </div>
  );
}

function Blocked({ icon, title, desc, cta }) {
  const { Card, EmptyState } = window[NS];
  return (
    <Card padded>
      <EmptyState icon={<Icon name={icon} />} title={title} description={desc} action={cta} />
    </Card>
  );
}

function Page() {
  const { Button, Card, Badge, Alert, Dialog, Toast } = window[NS];
  const [access, setAccess] = useState("eligible");
  const [slots, setSlots] = useState(INIT_SLOTS);
  const [confirmed, setConfirmed] = useState({});   // id -> true
  const [dialog, setDialog] = useState(null);        // slot to confirm
  const [conflict, setConflict] = useState(null);    // slot that's already taken
  const [toast, setToast] = useState(null);

  const click = (s) => {
    if (confirmed[s.id]) return;
    if (s.taken) { setConflict(s); return; }
    setDialog(s);
  };
  const doConfirm = () => {
    setConfirmed(c => ({ ...c, [dialog.id]: true }));
    setToast(`${dialog.day} ${dialog.time} 예약이 확정되었습니다 · 완료 메일 발송 (취소 불가)`);
    setDialog(null);
    setTimeout(() => setToast(null), 3600);
  };

  return (
    <>
      <Header active="reserve" loggedIn={true} />
      <main style={{ maxWidth: 920, margin: "0 auto", padding: "36px 32px 72px" }}>
        <div style={{ display: "flex", alignItems: "flex-end", justifyContent: "space-between", gap: 16, flexWrap: "wrap", marginBottom: 16 }}>
          <div>
            <div style={{ display: "flex", alignItems: "center", gap: 10 }}>
              <h1 style={{ fontSize: 32, margin: 0 }}>탈락자 재신청</h1>
              <Badge variant="info">선착순 · 즉시 확정</Badge>
            </div>
            <p style={{ fontSize: 15, color: "var(--text-secondary)", margin: "6px 0 0" }}>마감 후 비어있는 슬롯을 선착순으로 신청하세요.</p>
          </div>
          <AccessToggle value={access} onChange={setAccess} />
        </div>

        {access === "ineligible" && (
          <Blocked icon="ban" title="재신청 대상이 아닙니다"
            desc="재신청은 이번 주차 우선권 경합에서 탈락한 회원만 신청할 수 있어요."
            cta={<a href="마이페이지-예약내역.html"><Button variant="primary">내 예약 내역 보기</Button></a>} />
        )}
        {access === "closed" && (
          <Blocked icon="clock-x" title="재신청 기간이 종료되었습니다"
            desc="재신청 창은 목요일 17:00에 마감되었습니다. 다음 차주 일정은 다음 주 수요일 09:00에 새로 오픈됩니다."
            cta={<a href="index.html"><Button variant="secondary">서비스 소개로</Button></a>} />
        )}

        {access === "eligible" && (
          <>
            <div style={{ marginBottom: 20 }}>
              <Alert variant="warning" title="재신청 안내 · 내일(목) 17:00까지">
                재신청은 <b>선착순으로 즉시 확정</b>되며, <b>취소할 수 없습니다.</b> 이미 확정된 슬롯은 신청이 거절됩니다.
              </Alert>
            </div>

            <div style={{ display: "flex", alignItems: "center", gap: 8, marginBottom: 14 }}>
              <Icon name="calendar-search" size={18} color="var(--color-slate-blue)" />
              <h2 style={{ fontSize: 18, margin: 0 }}>비어있는 슬롯</h2>
              <Badge variant="soft">{slots.filter(s => !confirmed[s.id]).length}개 남음</Badge>
            </div>

            <div style={{ display: "grid", gridTemplateColumns: "repeat(2,1fr)", gap: 12 }}>
              {slots.map(s => {
                const done = confirmed[s.id];
                return (
                  <Card key={s.id} padded hover={!done} style={{ borderColor: done ? "var(--color-success)" : "var(--border-default)", background: done ? "var(--color-success-soft)" : "var(--surface-card)" }}>
                    <div style={{ display: "flex", alignItems: "center", gap: 14 }}>
                      <div style={{ width: 46, height: 46, borderRadius: 11, background: done ? "var(--color-success)" : "var(--color-signal-blue-soft)", display: "flex", alignItems: "center", justifyContent: "center", flexShrink: 0 }}>
                        <Icon name={done ? "check" : "clock"} size={22} color={done ? "#fff" : "var(--color-signal-blue)"} />
                      </div>
                      <div style={{ flex: 1, minWidth: 0 }}>
                        <div style={{ fontSize: 16, fontWeight: 700, color: "var(--color-midnight-navy)" }}>{s.day}</div>
                        <div style={{ fontSize: 14, color: "var(--text-secondary)" }}>{s.time} – {addMin(s.time)}</div>
                      </div>
                      {done
                        ? <Badge variant="success" dot>확정 완료</Badge>
                        : <Button variant="primary" size="sm" onClick={() => click(s)}>재신청</Button>}
                    </div>
                  </Card>
                );
              })}
            </div>
          </>
        )}
      </main>
      <Footer />

      <Dialog open={!!dialog} title="즉시 확정됩니다" confirmLabel="재신청 확정" onConfirm={doConfirm} onCancel={() => setDialog(null)}>
        {dialog && <>{dialog.day} <b>{dialog.time} – {addMin(dialog.time)}</b> 타임으로 재신청합니다. 재신청은 <b>신청 즉시 확정</b>되고 <b>취소할 수 없습니다.</b></>}
      </Dialog>

      <Dialog open={!!conflict} title="이미 예약이 완료되었습니다" confirmLabel="다른 슬롯 보기" confirmVariant="primary" hideCancel
        onConfirm={() => setConflict(null)} onCancel={() => setConflict(null)}>
        {conflict && <>{conflict.day} {conflict.time} 타임은 방금 다른 분이 확정했습니다. <b>이미 예약이 완료된 날짜 및 시간대입니다.</b> 다른 빈 슬롯을 선택해 주세요.</>}
      </Dialog>

      {toast && (
        <div style={{ position: "fixed", bottom: 28, left: "50%", transform: "translateX(-50%)", zIndex: 200 }}>
          <Toast variant="success">{toast}</Toast>
        </div>
      )}
    </>
  );
}
boot(() => <Page />);
</script>
</body>
</html>
