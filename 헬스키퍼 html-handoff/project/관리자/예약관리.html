<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>헬스키퍼 관리자 — 예약 관리</title>
<script src="https://unpkg.com/react@18.3.1/umd/react.development.js" integrity="sha384-hD6/rw4ppMLGNu3tX5cjIb+uRZ7UkRJ6BPkLpg4hAu/6onKUg4lLsHAs9EBPT82L" crossorigin="anonymous"></script>
<script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.development.js" integrity="sha384-u6aeetuaXnQ38mYT8rp6sbXaQe3NL9t+IBXmnYxwkUI2Hw4bsp2Wvmx4yRQF1uAm" crossorigin="anonymous"></script>
<script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js" integrity="sha384-m08KidiNqLdpJqLq95G/LEi8Qvjl/xUYll3QILypMoQ65QorJ9Lvtp2RXYGBFj1y" crossorigin="anonymous"></script>

<script>
(function(){ if (window.ReactDOM && ReactDOM.createRoot && !ReactDOM.__hkPatched) { var o = ReactDOM.createRoot.bind(ReactDOM); ReactDOM.createRoot = function (c, p) { if (!c || (c.id === "root" && !window.__hkReady)) return { render:function(){}, unmount:function(){} }; return o(c, p); }; ReactDOM.__hkPatched = true; } })();
</script>
<link rel="stylesheet" href="../_ds/healthkeeper-ds-31e44bd2-68dd-4c55-91c3-7ca10811b6be/styles.css">
<script src="../_ds/healthkeeper-ds-31e44bd2-68dd-4c55-91c3-7ca10811b6be/_ds_bundle.js"></script>
<link rel="stylesheet" href="../_shared/responsive.css">
<meta name="ext-resource-dependency" content="../assets/logo-mark.svg" data-resource-id="logoMark" />
<style>
  html,body{height:100%}
  body{margin:0;background:var(--surface-canvas,#f8f9fb);color:var(--text-body,#0a0a0a)}
</style>
</head>
<body>
<template id="__bundler_thumbnail" data-bg-color="#0b3558"><svg viewBox="0 0 1200 800" xmlns="http://www.w3.org/2000/svg"><rect width="1200" height="800" fill="#0b3558"></rect><circle cx="600" cy="356" r="150" fill="none" stroke="#ffffff" stroke-width="28"></circle><path d="M538 360 L585 407 L672 308" fill="none" stroke="#ffffff" stroke-width="34" stroke-linecap="round" stroke-linejoin="round"></path><circle cx="726" cy="242" r="38" fill="#006bff"></circle></svg></template>
<div id="root"></div>
<script type="text/babel" src="../_shared/admin-shell.js" data-presets="react"></script>
<script type="text/babel" data-presets="react">
const NS = "HealthkeeperDS_31e44b";
const { Icon, PageHead, Shell, boot, DAYS, TIMES, endT } = window.AdminUI;
const { useState } = React;

// applications keyed by "date-time"
const SEED = {
  "6/22-13:30": [
    { name: "김민수", dept: "IT개발팀", pos: "대리", email: "minsu.kim@ibank.co.kr", applied: "09:02", lastUse: "2025.03.11", priority: true, kind: "일반", status: "신청" },
    { name: "이서연", dept: "마케팅팀", pos: "사원", email: "seoyeon.lee@ibank.co.kr", applied: "09:05", lastUse: "2025.05.20", priority: false, kind: "일반", status: "신청" },
  ],
  "6/22-14:30": [
    { name: "박지훈", dept: "인사팀", pos: "과장", email: "jihoon.park@ibank.co.kr", applied: "09:01", lastUse: "이력 없음", priority: true, kind: "일반", status: "확정" },
  ],
  "6/22-15:30": [
    { name: "최유진", dept: "영업팀", pos: "대리", email: "yujin.choi@ibank.co.kr", applied: "09:33", lastUse: "2025.04.02", priority: true, kind: "일반", status: "신청" },
    { name: "정현우", dept: "재무팀", pos: "사원", email: "hyunwoo.jung@ibank.co.kr", applied: "10:11", lastUse: "2025.04.28", priority: false, kind: "일반", status: "신청" },
    { name: "강다은", dept: "경영지원실", pos: "과장", email: "daeun.kang@ibank.co.kr", applied: "11:40", lastUse: "2025.06.01", priority: false, kind: "일반", status: "신청" },
  ],
  "6/22-16:30": [],
  "6/23-13:30": [{ name: "한지민", dept: "리스크관리팀", pos: "대리", email: "jimin.han@ibank.co.kr", applied: "14:05", lastUse: "2025.02.10", priority: true, kind: "재신청", status: "확정" }],
  "6/23-14:30": [
    { name: "오세훈", dept: "IT개발팀", pos: "차장", email: "sehoon.oh@ibank.co.kr", applied: "09:12", lastUse: "2025.05.01", priority: true, kind: "일반", status: "신청" },
    { name: "윤아름", dept: "마케팅팀", pos: "대리", email: "areum.yoon@ibank.co.kr", applied: "09:40", lastUse: "2025.05.03", priority: false, kind: "일반", status: "신청" },
  ],
  "6/23-15:30": [], "6/23-16:30": [],
};

const FILTERS = [["all", "전체"], ["신청", "신청"], ["확정", "확정"], ["탈락", "탈락"], ["취소", "취소"]];

function Page() {
  const { Button, Card, Badge, StatusBadge, Avatar } = window[NS];
  const [date, setDate] = useState("6/22");
  const [filter, setFilter] = useState("all");

  return (
    <Shell active="reservations">
      <PageHead title="예약 관리" sub="날짜별 신청 현황 · 일반/재신청 구분 · 우선권을 확인하고 확정하세요"
        right={<a href="재신청메일.html"><Button variant="secondary" size="sm" iconLeft={<Icon name="mail" size={16} color="var(--color-midnight-navy)" />}>탈락자 안내 메일</Button></a>} />

      {/* date selector */}
      <div style={{ display: "flex", gap: 8, marginBottom: 16, flexWrap: "wrap" }}>
        {DAYS.map(dy => (
          <button key={dy.date} onClick={() => setDate(dy.date)} disabled={dy.off}
            style={{ padding: "10px 16px", borderRadius: "var(--radius-sm)", cursor: dy.off ? "not-allowed" : "pointer", font: "inherit",
              border: "1px solid " + (date === dy.date ? "var(--color-signal-blue)" : "var(--border-default)"),
              background: dy.off ? "var(--color-mist)" : (date === dy.date ? "var(--color-signal-blue)" : "var(--surface-card)"),
              color: dy.off ? "var(--text-muted)" : (date === dy.date ? "#fff" : "var(--color-midnight-navy)"), fontWeight: 600, fontSize: 14 }}>
            {dy.d} {dy.date}{dy.off ? " · 휴가" : ""}
          </button>
        ))}
      </div>

      {/* status filter */}
      <div style={{ display: "flex", gap: 6, marginBottom: 20 }}>
        {FILTERS.map(([k, l]) => (
          <button key={k} onClick={() => setFilter(k)} style={{ padding: "7px 14px", borderRadius: 999, cursor: "pointer", font: "inherit", fontSize: 13, fontWeight: 600,
            border: "1px solid " + (filter === k ? "var(--color-signal-blue)" : "var(--border-default)"),
            background: filter === k ? "var(--color-signal-blue-soft)" : "var(--surface-card)",
            color: filter === k ? "var(--color-info-blue)" : "var(--color-slate-blue)" }}>{l}</button>
        ))}
      </div>

      <div style={{ display: "flex", flexDirection: "column", gap: 16 }}>
        {TIMES.map(t => {
          const key = `${date}-${t}`;
          const all = (SEED[key] || []);
          const list = all.slice().filter(a => filter === "all" || a.status === filter).sort((a, b) => {
            if (a.lastUse === "이력 없음") return -1;
            if (b.lastUse === "이력 없음") return 1;
            return a.lastUse < b.lastUse ? -1 : 1;
          });
          const confirmed = all.find(a => a.status === "확정");
          const reapply = all.some(a => a.kind === "재신청");
          return (
            <Card key={t} padded>
              <div style={{ display: "flex", alignItems: "center", gap: 12, marginBottom: list.length ? 16 : 0, flexWrap: "wrap" }}>
                <Icon name="clock" size={18} color="var(--color-signal-blue)" />
                <span style={{ fontSize: 17, fontWeight: 700, color: "var(--color-midnight-navy)" }}>{t} – {endT(t)}</span>
                {all.length > 1 && <Badge variant="warning">중복 {all.length}명</Badge>}
                {reapply && <Badge variant="info">재신청 포함</Badge>}
                {confirmed && <Badge variant="success" dot>확정 완료</Badge>}
                <div style={{ flex: 1 }} />
                {all.length > 1 && !confirmed && <a href="신청자상세.html"><Button variant="primary" size="sm">우선권 확인 · 확정</Button></a>}
                {!all.length && <span style={{ fontSize: 13, color: "var(--text-muted)" }}>신청 없음</span>}
              </div>
              {list.length > 0 && (
                <div style={{ overflowX: "auto" }}>
                  <Row head />
                  {list.map((a, i) => <Row key={a.email} a={a} rank={i} confirmed={confirmed} />)}
                </div>
              )}
              {all.length > 0 && list.length === 0 && <div style={{ fontSize: 13, color: "var(--text-muted)", paddingTop: 6 }}>이 필터에 해당하는 신청이 없습니다.</div>}
            </Card>
          );
        })}
      </div>
    </Shell>
  );
}

function Row({ head, a, rank, confirmed }) {
  const { Badge, StatusBadge, Avatar } = window[NS];
  const grid = "28px minmax(150px,1.5fr) 84px 110px 78px 78px 84px";
  if (head) {
    return (
      <div style={{ display: "grid", gridTemplateColumns: grid, gap: 12, minWidth: 660, padding: "0 8px 10px", borderBottom: "1px solid var(--border-default)" }}>
        {["", "신청자", "신청 시각", "마지막 이용", "구분", "우선권", "상태"].map((h, i) => (
          <div key={i} style={{ fontSize: 12, fontWeight: 700, color: "var(--text-muted)", letterSpacing: "0.03em" }}>{h}</div>
        ))}
      </div>
    );
  }
  const isTop = rank === 0 && !confirmed;
  return (
    <div style={{ display: "grid", gridTemplateColumns: grid, gap: 12, minWidth: 660, padding: "12px 8px", alignItems: "center", borderBottom: "1px solid var(--color-mist)" }}>
      <div style={{ fontSize: 13, fontWeight: 700, color: isTop ? "var(--color-signal-blue)" : "var(--text-muted)" }}>{rank + 1}</div>
      <div style={{ display: "flex", alignItems: "center", gap: 10, minWidth: 0 }}>
        <Avatar name={a.name} size="sm" />
        <div style={{ minWidth: 0 }}>
          <div style={{ fontSize: 14, fontWeight: 700, color: "var(--color-midnight-navy)" }}>{a.name} <span style={{ fontSize: 12, fontWeight: 600, color: "var(--color-slate-blue)" }}>{a.pos}</span></div>
          <div style={{ fontSize: 12, color: "var(--text-muted)", overflow: "hidden", textOverflow: "ellipsis", whiteSpace: "nowrap" }}>{a.dept} · {a.email}</div>
        </div>
      </div>
      <div style={{ fontSize: 14, color: "var(--text-secondary)", fontVariantNumeric: "tabular-nums" }}>{a.applied}</div>
      <div style={{ fontSize: 13, color: a.lastUse === "이력 없음" ? "var(--color-warning)" : "var(--text-secondary)", fontWeight: a.lastUse === "이력 없음" ? 700 : 400 }}>{a.lastUse}</div>
      <div>{a.kind === "재신청" ? <Badge variant="info">재신청</Badge> : <Badge variant="soft">일반</Badge>}</div>
      <div>{a.priority ? <Badge variant="info">O</Badge> : <Badge variant="neutral">X</Badge>}</div>
      <div><StatusBadge status={a.status} /></div>
    </div>
  );
}
boot(() => <Page />);
</script>
</body>
</html>
