<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <link rel="icon" href="/assets/logo-mark.svg" type="image/svg+xml">
  <link rel="apple-touch-icon" href="/assets/logo-mark.svg">
  <title>헬스키퍼 — 회원가입</title>
  <link rel="stylesheet" href="/_ds/healthkeeper-ds-31e44bd2-68dd-4c55-91c3-7ca10811b6be/styles.css">
  <link rel="stylesheet" href="/_shared/responsive.css">
  <link rel="stylesheet" href="/_shared/app.css">
  <script src="/_shared/ui.js"></script>
  <script src="/_shared/api.js"></script>
  <script src="/_shared/member-shell.js"></script>
</head>
<body>
  <div id="app"></div>
  <script>
    const DEMO_CODE = "284913";
    const DEPTS = ["", "경영지원실", "IT개발팀", "인사팀", "마케팅팀", "영업팀", "리스크관리팀", "재무팀"];
    const POS = ["", "사원", "대리", "과장", "차장", "부장", "팀장"];

    const state = {
      step: 0,
      email: "", sent: false, code: "", codeOk: false, emailErr: null, codeErr: null,
      name: "", dept: "", pos: "", pw: "", pw2: "", infoErr: {},
    };

    function renderStep0() {
      return `<div class="hk-card hk-card--pad">
        <div style="display:flex;flex-direction:column;gap:16px">
          <div style="display:flex;gap:8px;align-items:flex-end">
            <div style="flex:1">${HKUI.fieldInput("이메일", "email", { type: "email", placeholder: "name@ibank.co.kr", required: true, value: state.email, error: state.emailErr, hint: state.emailErr ? undefined : "회사 이메일로 인증코드가 발송됩니다.", disabled: state.codeOk })}</div>
            <div style="padding-bottom:22px">
              <button type="button" class="hk-btn ${state.sent ? "hk-btn--secondary" : "hk-btn--primary"}" id="send-code" ${state.codeOk ? "disabled" : ""}>${state.sent ? "재발송" : "인증코드 발송"}</button>
            </div>
          </div>
          ${state.sent && !state.codeOk ? `
            ${HKUI.alertBox("info", "인증코드를 메일로 보냈어요", `<b>${HKUI.escapeHtml(state.email)}</b> 로 발송된 6자리 코드를 입력해 주세요. (5분 이내 유효) <a href="/이메일/01-이메일인증.html" target="_blank" style="color:var(--color-info-blue);font-weight:700">메일 미리보기</a>`)}
            <div style="display:flex;gap:8px;align-items:flex-end">
              <div style="flex:1">${HKUI.fieldInput("인증코드", "code", { placeholder: "6자리 숫자", inputMode: "numeric", maxLength: 6, value: state.code, error: state.codeErr, hint: state.codeErr ? undefined : `데모 코드: ${DEMO_CODE}` })}</div>
              <div style="padding-bottom:22px">
                <button type="button" class="hk-btn hk-btn--primary" id="verify-code" ${state.code.length !== 6 ? "disabled" : ""}>인증 확인</button>
              </div>
            </div>` : ""}
          ${state.codeOk ? HKUI.alertBox("success", "이메일 인증이 완료되었습니다", `<b>${HKUI.escapeHtml(state.email)}</b> 인증을 마쳤어요. 다음 단계에서 기본 정보를 입력해 주세요.`) : ""}
          <button type="button" class="hk-btn hk-btn--primary hk-btn--block hk-btn--lg" id="next-step" ${!state.codeOk ? "disabled" : ""}>다음 단계 ${HKUI.icon("arrow-right", 18, "#fff")}</button>
        </div>
      </div>`;
    }

    function renderStep1() {
      return `<div class="hk-card hk-card--pad">
        <div style="display:flex;align-items:center;gap:8px;margin-bottom:16px;padding:10px 12px;background:var(--color-success-soft);border-radius:var(--radius-sm)">
          ${HKUI.icon("circle-check-big", 16, "var(--color-success)")}
          <span style="font-size:13.5px;color:var(--color-midnight-navy)"><b>${HKUI.escapeHtml(state.email)}</b> 인증 완료</span>
        </div>
        <div style="display:flex;flex-direction:column;gap:16px">
          ${HKUI.fieldInput("이름", "name", { placeholder: "홍길동", required: true, value: state.name, error: state.infoErr.name })}
          <div style="display:grid;grid-template-columns:1fr 1fr;gap:12px">
            ${HKUI.fieldSelect("부서", "dept", DEPTS.map((d) => [d, d || "선택"]), { required: true, value: state.dept, error: state.infoErr.dept })}
            ${HKUI.fieldSelect("직급", "pos", POS.map((p) => [p, p || "선택"]), { required: true, value: state.pos, error: state.infoErr.pos })}
          </div>
          ${HKUI.fieldInput("비밀번호", "pw", { type: "password", placeholder: "••••••••", required: true, value: state.pw, error: state.infoErr.pw, hint: state.infoErr.pw ? undefined : "영문·숫자·특수문자 조합 8자 이상" })}
          ${HKUI.fieldInput("비밀번호 확인", "pw2", { type: "password", placeholder: "••••••••", required: true, value: state.pw2, error: state.infoErr.pw2 })}
          <div style="display:flex;gap:10px">
            <button type="button" class="hk-btn hk-btn--secondary" id="prev-step">${HKUI.icon("arrow-left", 16, "var(--color-midnight-navy)")} 이전</button>
            <button type="button" class="hk-btn hk-btn--primary hk-btn--block hk-btn--lg" id="submit-info">가입 완료</button>
          </div>
        </div>
      </div>`;
    }

    function renderStep2() {
      return `<div class="hk-card hk-card--pad">
        <div style="text-align:center">
          <div style="width:64px;height:64px;border-radius:999px;background:var(--color-success-soft);display:inline-flex;align-items:center;justify-content:center;margin-bottom:18px">
            ${HKUI.icon("party-popper", 30, "var(--color-success)")}
          </div>
          <h2 style="font-size:24px;margin:0 0 10px">가입이 완료되었습니다</h2>
          <p style="font-size:15.5px;color:var(--text-secondary);line-height:1.65;margin:0 0 20px">
            <b style="color:var(--color-midnight-navy)">${HKUI.escapeHtml(state.name)}님</b> (${HKUI.escapeHtml(state.dept)} · ${HKUI.escapeHtml(state.pos)}), 환영합니다.<br>
            이제 로그인하고 헬스키퍼 예약을 신청할 수 있어요.
          </p>
          <div style="display:flex;flex-direction:column;gap:10px">
            <a href="${HKRoutes.login}"><button type="button" class="hk-btn hk-btn--primary hk-btn--block hk-btn--lg">로그인하러 가기</button></a>
            <a href="${HKRoutes.reserve}"><button type="button" class="hk-btn hk-btn--ghost hk-btn--block">예약 화면 둘러보기</button></a>
          </div>
        </div>
      </div>`;
    }

    function renderBody() {
      const steps = [renderStep0, renderStep1, renderStep2];
      return `<main style="display:flex;justify-content:center;padding:48px 24px 72px">
        <div style="width:460px">
          <div style="text-align:center;margin-bottom:24px">
            <img src="/assets/logo-mark.svg" alt="" width="50" height="50">
            <h1 style="font-size:27px;margin:14px 0 6px">회원가입</h1>
            <p style="font-size:15px;color:var(--text-secondary);margin:0">이메일 인증 후 기본 정보를 입력하면 가입이 완료됩니다.</p>
          </div>
          ${`<div id="stepper-wrap">${HKUI.stepper(state.step)}</div>`}
          <div id="step-content">${steps[state.step]()}</div>
          ${state.step < 2 ? `<div id="signup-login-link" style="text-align:center;margin-top:18px;font-size:14px;color:var(--text-secondary)">이미 계정이 있으신가요? <a href="${HKRoutes.login}" style="color:var(--color-signal-blue);font-weight:700;text-decoration:none">로그인</a></div>` : ""}
        </div>
      </main>`;
    }

    function bindStep() {
      if (state.step === 0) {
        document.getElementById("email")?.addEventListener("input", (e) => { state.email = e.target.value; state.emailErr = null; });
        document.getElementById("code")?.addEventListener("input", (e) => { state.code = e.target.value.replace(/[^0-9]/g, ""); state.codeErr = null; e.target.value = state.code; });
        document.getElementById("send-code")?.addEventListener("click", () => {
          if (!/^[^@\s]+@[^@\s]+\.[^@\s]+$/.test(state.email)) { state.emailErr = "올바른 이메일 형식이 아닙니다."; paint(); return; }
          if (state.email.trim().toLowerCase() === "minsu.kim@ibank.co.kr") { state.emailErr = "이미 가입된 이메일입니다."; paint(); return; }
          state.emailErr = null; state.sent = true; state.code = ""; state.codeOk = false; state.codeErr = null; paint();
        });
        document.getElementById("verify-code")?.addEventListener("click", () => {
          if (state.code.trim() === DEMO_CODE) { state.codeOk = true; state.codeErr = null; }
          else state.codeErr = "인증코드가 일치하지 않습니다. 메일을 다시 확인해 주세요.";
          paint();
        });
        document.getElementById("next-step")?.addEventListener("click", () => { state.step = 1; paint(); });
      } else if (state.step === 1) {
        ["name", "pw", "pw2"].forEach((id) => {
          document.getElementById(id)?.addEventListener("input", (e) => { state[id === "name" ? "name" : id] = e.target.value; });
        });
        document.getElementById("dept")?.addEventListener("change", (e) => { state.dept = e.target.value; });
        document.getElementById("pos")?.addEventListener("change", (e) => { state.pos = e.target.value; });
        document.getElementById("prev-step")?.addEventListener("click", () => { state.step = 0; paint(); });
        document.getElementById("submit-info")?.addEventListener("click", () => {
          const e = {};
          if (!state.name.trim()) e.name = "이름을 입력하세요.";
          if (!state.dept) e.dept = "부서를 선택하세요.";
          if (!state.pos) e.pos = "직급을 선택하세요.";
          if (state.pw.length < 8) e.pw = "비밀번호는 8자 이상이어야 합니다.";
          if (state.pw2 !== state.pw) e.pw2 = "비밀번호가 일치하지 않습니다.";
          state.infoErr = e;
          if (Object.keys(e).length === 0) { state.step = 2; paint(); }
          else paint();
        });
      }
      HKUI.refreshIcons();
    }

    function paint() {
      document.getElementById("stepper-wrap").innerHTML = HKUI.stepper(state.step);
      document.getElementById("step-content").innerHTML = [renderStep0, renderStep1, renderStep2][state.step]();
      const loginLink = document.getElementById("signup-login-link");
      if (loginLink) loginLink.style.display = state.step < 2 ? "block" : "none";
      bindStep();
    }

    HKMember.mountPage({
      authPage: true,
      render: renderBody,
      afterMount: bindStep,
    });
  </script>
</body>
</html>
