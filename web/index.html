<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>헬스키퍼 — 서비스 소개</title>
  <link rel="stylesheet" href="/_ds/healthkeeper-ds-31e44bd2-68dd-4c55-91c3-7ca10811b6be/styles.css">
  <link rel="stylesheet" href="/_shared/responsive.css">
  <link rel="stylesheet" href="/_shared/app.css">
  <script src="/_shared/ui.js"></script>
  <script src="/_shared/api.js"></script>
  <script src="/_shared/member-shell.js"></script>
</head>
<body>
  <div id="app"></div>
  <script>
    const features = [
      ["calendar-days", "수요일에 신청", "매주 수요일 09:00~16:59 동안 차주(월~금)<br>예약을 신청합니다."],
      ["scale", "우선권 배분", "같은 시간에 몰리면 마지막 이용일이 가장 오래된<br>분께 우선권이 돌아갑니다."],
      ["bell-ring", "재신청 안내", "탈락하면 다음날 17시까지 빈 슬롯에 선착순으로<br>재신청할 수 있어요."],
    ];
    const steps = [
      ["1", "예약 오픈", "수 09:00", "차주 월~금 일정이 열립니다.<br>휴가일은 예약 불가로 표시돼요."],
      ["2", "신청 마감", "수 17:00", "16:59까지 접수. 마감 시점에 우선권으로 확정·탈락이 정렬됩니다."],
      ["3", "재신청 창", "목 09:00 ~ 17:00", "탈락자 한정 선착순·즉시 확정.<br>재신청은 취소할 수 없어요."],
      ["4", "다음 사이클", "다음 주 수 09:00", "목 17:00 이후 모든 신청이 종료<br>되고 다음 주에 새로 오픈합니다."],
    ];
    const policies = [
      ["신청 ≠ 확정", "일반 신청은 관리자 확정 후 예약이 완료됩니다.<br>확정 시 완료 메일을 보내드려요."],
      ["우선권 기준", "마지막 이용일이 오래된 순 → 동률이면 먼저 신청한 분이 우선입니다.<br>이용 이력이 없으면 최우선이에요."],
      ["취소 규칙", "일반 신청은 마감(수 17:00) 전까지 취소할 수 있어요.<br>취소는 우선권에 영향을 주지 않습니다."],
      ["재신청 규칙", "재신청은 선착순·즉시 확정되며 취소할 수 없습니다.<br>이미 확정된 슬롯은 신청이 거절돼요."],
    ];

    function featureCard([ic, t, d]) {
      return `<div style="display:flex;gap:16px">
        <div style="flex-shrink:0;width:44px;height:44px;border-radius:10px;background:var(--color-signal-blue-soft);display:flex;align-items:center;justify-content:center">${HKUI.icon(ic, 22, "var(--color-signal-blue)")}</div>
        <div><div style="font-size:18px;font-weight:700;color:var(--color-midnight-navy);margin-bottom:4px">${t}</div><div style="font-size:15px;color:var(--text-secondary);line-height:1.6">${d}</div></div>
      </div>`;
    }

    function stepDesc(text) {
      if (!text.includes("<br>")) return text;
      return text.split("<br>").map((line) => `<span style="display:block">${line}</span>`).join("");
    }

    function stepCard([n, t, time, d]) {
      return `<div style="display:flex;gap:16px;align-items:flex-start">
        <div style="flex-shrink:0;width:36px;height:36px;border-radius:999px;background:var(--color-midnight-navy);color:#fff;font-weight:700;font-size:16px;display:flex;align-items:center;justify-content:center">${n}</div>
        <div><div style="font-size:17px;font-weight:700;color:var(--color-midnight-navy)">${t}</div><div style="font-size:13px;font-weight:600;color:var(--color-signal-blue);margin:2px 0 4px">${time}</div><div style="font-size:15px;color:var(--text-secondary);line-height:1.65">${stepDesc(d)}</div></div>
      </div>`;
    }

    HKMember.mountPage({
      active: "home",
      auth: false,
      landing: true,
      render(profile) {
        const R = HKRoutes;
        const loggedIn = !!profile;
        const ctaPrimary = loggedIn
          ? `<a href="${R.reserve}"><button type="button" class="hk-btn hk-btn--primary hk-btn--lg">예약하기 ${HKUI.icon("arrow-right", 18, "#fff")}</button></a>`
          : `<a href="${R.login}"><button type="button" class="hk-btn hk-btn--primary hk-btn--lg">로그인하고 시작하기 ${HKUI.icon("arrow-right", 18, "#fff")}</button></a>`;
        return `<main>
          <section style="max-width:1200px;margin:0 auto;padding:64px 32px 48px;display:grid;grid-template-columns:1fr 1fr;gap:48px;align-items:center">
            <div>
              <span class="hk-badge hk-badge--soft">사내 복지 · 안마서비스</span>
              <h1 style="font-size:52px;line-height:1.1;letter-spacing:-0.02em;margin:20px 0 16px">마음까지 풀리는<br>헬스키퍼 예약</h1>
              <p style="font-size:19px;line-height:1.64;color:var(--text-secondary);max-width:460px;margin:0 0 24px">매주 수요일, 차주 안마서비스를 신청하세요.<br>— 오래 기다린 분께 우선권을 드립니다.</p>
              <div style="max-width:460px;margin-bottom:28px">${HKUI.alertBox("info", "차주 예약 신청이 가능합니다 · 오늘 17:00 마감", "수요일 09:00~16:59 동안 차주(월~금) 예약을 신청할 수 있어요.")}</div>
              <div style="display:flex;gap:12px;flex-wrap:wrap">${ctaPrimary}</div>
            </div>
            <div style="position:relative;display:flex;justify-content:center">
              <div style="position:absolute;width:340px;height:300px;background:var(--blob-sunrise);filter:blur(40px);opacity:0.8;top:-30px;right:40px"></div>
              <div style="position:absolute;width:260px;height:240px;background:var(--blob-calm);filter:blur(44px);opacity:0.7;bottom:-40px;left:30px"></div>
              <div class="hk-card hk-card--pad" style="width:360px;position:relative;z-index:2">
                <div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:14px">
                  <b style="font-size:15px;color:var(--color-midnight-navy)">이번 주 예약</b>
                  <span class="hk-badge hk-badge--success"><span class="hk-badge__dot"></span>예약 가능</span>
                </div>
                <div style="display:grid;grid-template-columns:repeat(4,1fr);gap:8px">
                  <button type="button" class="hk-slot" disabled><span class="hk-slot__time">13:30</span><span class="hk-slot__meta">가능</span></button>
                  <button type="button" class="hk-slot hk-slot--selected"><span class="hk-slot__time">14:30</span><span class="hk-slot__meta">선택</span></button>
                  <button type="button" class="hk-slot" disabled><span class="hk-slot__time">15:30</span><span class="hk-slot__meta">가능</span></button>
                  <button type="button" class="hk-slot hk-slot--confirmed"><span class="hk-slot__time">16:30</span><span class="hk-slot__meta">완료</span></button>
                </div>
                <p style="margin-top:14px;font-size:13px;color:var(--text-secondary);display:flex;align-items:center;gap:6px">${HKUI.icon("clock", 15, "var(--color-slate-blue)")} 매일 13:30 – 17:00 · 하루 4타임</p>
              </div>
            </div>
          </section>
          <section style="border-top:1px solid var(--border-default);border-bottom:1px solid var(--border-default);background:var(--surface-card)">
            <div style="max-width:1200px;margin:0 auto;padding:28px 32px;display:flex;gap:64px;flex-wrap:wrap">
              ${[["주 20타임", "월~금 · 하루 4타임"], ["1명", "전담 안마사"], ["수요일 9시", "차주 예약 오픈"], ["30분", "타임당 서비스"]]
                .map(([n, l]) => `<div><div style="font-size:32px;font-weight:700;color:var(--color-midnight-navy);letter-spacing:-0.01em">${n}</div><div style="font-size:14px;color:var(--text-secondary);margin-top:2px">${l}</div></div>`).join("")}
            </div>
          </section>
          <section style="max-width:1200px;margin:0 auto;padding:64px 32px 24px">
            <h2 style="font-size:34px;margin-bottom:8px">예약은 이렇게 진행돼요</h2>
            <p style="font-size:17px;color:var(--text-secondary);margin-bottom:40px">신청 → 확정 → 안내 메일까지, 공정하고 투명하게.</p>
            <div style="display:grid;grid-template-columns:repeat(3,1fr);gap:32px">${features.map(featureCard).join("")}</div>
          </section>
          <section style="max-width:1200px;margin:0 auto;padding:48px 32px 24px">
            <div class="hk-card hk-card--pad hk-card--flat" style="background:var(--color-mist)">
              <h2 style="font-size:26px;margin-bottom:28px">매주 운영 사이클</h2>
              <div class="hk-cycle-steps" style="display:grid;grid-template-columns:repeat(4,1fr);gap:28px">${steps.map(stepCard).join("")}</div>
            </div>
          </section>
          <section style="max-width:1200px;margin:0 auto;padding:32px 32px 72px">
            <h2 style="font-size:26px;margin-bottom:20px">꼭 알아두세요</h2>
            <div style="display:grid;grid-template-columns:repeat(2,1fr);gap:16px">${policies.map(([t, d]) => `<div class="hk-card hk-card--pad"><div style="display:flex;gap:12px;align-items:flex-start">${HKUI.icon("circle-check-big", 20, "var(--color-signal-blue)", "margin-top:2px;flex-shrink:0")}<div><div style="font-size:16px;font-weight:700;color:var(--color-midnight-navy);margin-bottom:4px">${t}</div><div style="font-size:14.5px;color:var(--text-secondary);line-height:1.6">${d}</div></div></div></div>`).join("")}</div>
            <div style="margin-top:36px;text-align:center"><a href="${loggedIn ? R.reserve : R.login}"><button type="button" class="hk-btn hk-btn--primary hk-btn--lg">${loggedIn ? "예약하기" : "로그인하고 예약하기"} ${HKUI.icon("arrow-right", 18, "#fff")}</button></a></div>
          </section>
        </main>`;
      },
    });
  </script>
</body>
</html>
