<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>헬스키퍼 — 예약하기</title>
  <link rel="stylesheet" href="/_ds/healthkeeper-ds-31e44bd2-68dd-4c55-91c3-7ca10811b6be/styles.css">
  <link rel="stylesheet" href="/_shared/responsive.css">
  <link rel="stylesheet" href="/_shared/app.css">
  <script src="/_shared/ui.js"></script>
  <script src="/_shared/api.js"></script>
  <script src="/_shared/member-shell.js"></script>
  <script src="/reserve.js"></script>
</head>
<body>
  <div id="app"></div>
  <script>
    HKMember.mountPage({
      active: "reserve",
      auth: true,
      mainStyle: "max-width:1200px;margin:0 auto;padding:36px 32px 72px",
      render() {
        return `
          <div style="display:flex;align-items:flex-end;justify-content:space-between;gap:16px;flex-wrap:wrap;margin-bottom:16px">
            <div style="display:flex;align-items:baseline;gap:12px">
              <h1 style="font-size:34px;margin:0">차주 예약</h1>
              <span id="week-label" style="font-size:16px;color:var(--text-secondary)"></span>
            </div>
          </div>
          <div id="state-banner" style="margin-bottom:20px;max-width:760px"></div>
          <div id="reapply-link" style="display:none;margin-bottom:20px;max-width:760px">
            <div class="hk-card hk-card--pad" style="background:var(--color-warning-soft);border-color:transparent">
              <div style="display:flex;align-items:center;gap:12px;flex-wrap:wrap">
                ${HKUI.icon("info", 20, "var(--color-warning)")}
                <span style="font-size:14.5px;color:var(--color-midnight-navy)">탈락하신 경우 전용 재신청 화면에서 빈 슬롯을 선착순으로 신청할 수 있어요.</span>
                <div style="flex:1"></div>
                <a href="${HKRoutes.reapply}"><button type="button" class="hk-btn hk-btn--primary hk-btn--sm">재신청 화면으로</button></a>
              </div>
            </div>
          </div>
          <div style="display:grid;grid-template-columns:1fr 300px;gap:24px;align-items:start">
            <div class="hk-card hk-card--pad" id="calendar-grid"></div>
            <div class="hk-card hk-card--pad" style="position:sticky;top:96px">
              <div style="font-size:13px;font-weight:700;letter-spacing:.05em;text-transform:uppercase;color:var(--text-muted);margin-bottom:14px">선택한 예약</div>
              <div id="summary"></div>
            </div>
          </div>`;
      },
      afterMount: () => HKReservePage.init(),
    });
  </script>
</body>
</html>
