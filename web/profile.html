<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <link rel="icon" href="/assets/logo-mark.svg" type="image/svg+xml">
  <link rel="apple-touch-icon" href="/assets/logo-mark.svg">
  <title>헬스키퍼 — 마이페이지 · 내 정보</title>
  <link rel="stylesheet" href="/_ds/healthkeeper-ds-31e44bd2-68dd-4c55-91c3-7ca10811b6be/styles.css">
  <link rel="stylesheet" href="/_shared/responsive.css">
  <link rel="stylesheet" href="/_shared/app.css">
  <script src="/_shared/ui.js?v=20260619"></script>
  <script src="/_shared/api.js?v=20260619"></script>
  <script src="/_shared/member-shell.js?v=20260619"></script>
</head>
<body>
  <div id="app"></div>
  <script>
    const USAGE_HISTORY_PAGE_SIZE = 10;

    function fetchUsageHistory(page, pageSize) {
      if (typeof HKApi.myUsageHistory === "function") return HKApi.myUsageHistory(page, pageSize);
      if (typeof HKApi.myLegacyUsages === "function") return HKApi.myLegacyUsages(page, pageSize);
      return HKApi.get(`/me/usage-history?page=${page}&pageSize=${pageSize}`);
    }

    function openUsageHistoryModal(initialPage = 1) {
      HKUI.layerModal("과거 이용 내역", async (bodyEl, footerEl) => {
        let page = initialPage;
        let meta = { page: initialPage, pageSize: USAGE_HISTORY_PAGE_SIZE, total: 0, totalPages: 0 };

        async function load(pageNum) {
          page = pageNum;
          bodyEl.innerHTML = `<div style="text-align:center;padding:32px"><span class="hk-spin"></span></div>`;
          footerEl.innerHTML = "";
          try {
            const data = await fetchUsageHistory(pageNum, USAGE_HISTORY_PAGE_SIZE);
            meta = {
              page: data.page || pageNum,
              pageSize: data.pageSize || USAGE_HISTORY_PAGE_SIZE,
              total: data.total ?? 0,
              totalPages: data.totalPages ?? 0,
            };
            const items = data.items || [];
            if (!meta.total) {
              bodyEl.innerHTML = `<div class="hk-empty" style="padding:24px 8px;text-align:center;color:var(--text-secondary)">이용 내역이 없습니다.</div>`;
              return;
            }
            if (!items.length) {
              if (meta.totalPages > 0 && pageNum > meta.totalPages) {
                return load(meta.totalPages);
              }
              bodyEl.innerHTML = `<div class="hk-empty" style="padding:24px 8px;text-align:center;color:var(--text-secondary)">표시할 내역이 없습니다.</div>`;
              return;
            }
            bodyEl.innerHTML = `<div style="display:flex;flex-direction:column;gap:10px">${items.map((r) => HKUI.legacyUsageCard(r)).join("")}</div>`;
            footerEl.innerHTML = HKUI.paginationBar(meta);
            HKUI.bindPagination(footerEl, meta, load);
            bodyEl.scrollTop = 0;
            HKUI.refreshIcons();
          } catch (e) {
            bodyEl.innerHTML = `<div class="hk-empty" style="padding:24px 8px;text-align:center">${HKUI.escapeHtml(e.message)}</div>`;
          }
        }

        await load(initialPage);
      }, { fixedHeight: true });
    }

    HKMember.mountPage({
      active: "mypage",
      auth: true,
      mainStyle: "max-width:1200px;margin:0 auto;padding:36px 32px 72px",
      render() {
        return `
          <h1 style="font-size:34px;margin-bottom:4px">마이페이지</h1>
          <p style="font-size:16px;color:var(--text-secondary);margin:0 0 24px">회원 정보를 확인하세요.</p>
          ${HKUI.subNav("profile")}
          <div class="hk-card hk-card--pad" id="profile-card"></div>
          <div class="hk-card hk-card--pad hk-card--flat" style="margin-top:16px;background:var(--color-mist)" id="usage-card"></div>`;
      },
      afterMount: async (profile) => {
        const pos = profile.position || profile.jobTitle || "";
        const dept = profile.department || profile.dept || "-";
        const hasUsageHistory = (profile.usageHistoryTotal ?? 0) > 0;
        document.getElementById("profile-card").innerHTML = `
          <div style="display:flex;align-items:center;justify-content:space-between;margin-bottom:18px;gap:12px;flex-wrap:wrap">
            <h2 style="font-size:18px;margin:0">기본 정보</h2>
            ${HKUI.teamsBadge()}
          </div>
          <div style="display:flex;align-items:center;gap:16px;padding-bottom:18px;margin-bottom:18px;border-bottom:1px solid var(--color-mist)">
            ${HKUI.avatar(profile.name, "lg")}
            <div>
              <div style="font-size:19px;font-weight:700;color:var(--color-midnight-navy)">${HKUI.escapeHtml(profile.name)} ${pos ? `<span style="font-size:14px;font-weight:500;color:var(--text-secondary)">${HKUI.escapeHtml(pos)}</span>` : ""}</div>
              <div style="font-size:14px;color:var(--text-secondary);margin-top:2px">${HKUI.escapeHtml(dept)} · ibank</div>
            </div>
          </div>
          <div style="display:grid;grid-template-columns:1fr 1fr;gap:20px 32px">
            ${HKUI.readField("이름", profile.name)}
            ${HKUI.readField("이메일", profile.email || "-")}
            ${HKUI.readField("부서", dept)}
            ${HKUI.readField("직급", pos || "-")}
          </div>`;
        document.getElementById("usage-card").innerHTML = `<div style="display:flex;align-items:flex-end;justify-content:space-between;gap:20px;flex-wrap:wrap">
          <div style="display:flex;gap:48px;flex-wrap:wrap;align-items:flex-end;flex:1;min-width:0">
            ${HKUI.kv("최근 로그인", profile.lastLoginAt ? HKUI.formatDateTimeKst(profile.lastLoginAt) : "-")}
            ${HKUI.kv("마지막 이용일", profile.lastUsedDate ? profile.lastUsedDate.replace(/-/g, ".") : "-")}
            ${HKUI.kvTooltip(
              "누적 이용",
              profile.totalUses != null ? `${profile.totalUses}회` : "-",
              HKUI.USAGE_TOTAL_TOOLTIP_HTML
            )}
          </div>
          ${hasUsageHistory ? `<button type="button" class="hk-btn hk-btn--secondary hk-btn--sm" id="usage-history-btn" style="flex-shrink:0;margin-left:auto">이용 내역 보기</button>` : ""}
        </div>`;
        HKUI.bindTooltips(document.getElementById("usage-card"));
        HKUI.refreshIcons();
        const historyBtn = document.getElementById("usage-history-btn");
        if (historyBtn) historyBtn.onclick = () => openUsageHistoryModal(1);
      },
    });
  </script>
</body>
</html>
