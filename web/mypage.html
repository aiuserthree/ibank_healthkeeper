<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <link rel="icon" href="/assets/logo-mark.svg" type="image/svg+xml">
  <link rel="apple-touch-icon" href="/assets/logo-mark.svg">
  <title>헬스키퍼 — 마이페이지 · 예약 내역</title>
  <link rel="stylesheet" href="/_ds/healthkeeper-ds-31e44bd2-68dd-4c55-91c3-7ca10811b6be/styles.css">
  <link rel="stylesheet" href="/_shared/responsive.css">
  <link rel="stylesheet" href="/_shared/app.css">
  <script src="/_shared/ui.js"></script>
  <script src="/_shared/api.js"></script>
  <script src="/_shared/member-shell.js"></script>
</head>
<body>
  <div id="app"></div>
  <script>
    const PAGE_SIZE = 10;

    HKMember.mountPage({
      active: "mypage",
      auth: true,
      mainStyle: "max-width:1200px;margin:0 auto;padding:36px 32px 72px",
      render(profile) {
        return `
          <h1 style="font-size:34px;margin-bottom:4px">마이페이지</h1>
          <p style="font-size:16px;color:var(--text-secondary);margin:0 0 24px">${HKUI.escapeHtml(profile.name)}님의 예약 신청 내역입니다.</p>
          ${HKUI.subNav("res")}
          <div class="hk-card hk-card--pad hk-card--flat" style="margin-bottom:20px;background:var(--color-mist)" id="stats"></div>
          <div style="margin-bottom:18px">${HKUI.alertBox("info", "예약 상태 안내", "<b>신청</b>은 관리자 확정 후 완료됩니다. 일반 신청은 마감(수 17:00) 전까지 취소할 수 있고, <b>재신청 확정 건은 취소할 수 없어요.</b> 확정 후 못 가시면 <b>목 17:00 이후</b> 다른 회원에게 바로 양도할 수 있습니다.")}</div>
          <div id="list"></div>
          <div id="pager"></div>`;
      },
      afterMount: async (profile) => {
        const statsEl = document.getElementById("stats");
        const lastUsed = profile.lastUsedDate ? profile.lastUsedDate.replace(/-/g, ".") : "-";
        const applyTotal = profile.applyTotal != null ? profile.applyTotal : profile.totalUses;
        statsEl.innerHTML = `<div style="display:flex;gap:48px;flex-wrap:wrap">
          ${HKUI.kv("마지막 이용일", lastUsed)}
          ${HKUI.kvTooltip("우선권", HKUI.badge(profile.lastUsedDate ? "이용 이력 있음" : "이력 없음 · 최우선", "info"), HKUI.PRIORITY_TOOLTIP_HTML)}
          <div id="total-count">${HKUI.kvTooltip("누적 신청", applyTotal != null ? `${applyTotal}건` : "…", HKUI.APPLY_TOTAL_TOOLTIP_HTML)}</div>
        </div>`;
        HKUI.bindTooltips(statsEl);
        HKUI.refreshIcons();

        const listEl = document.getElementById("list");
        const pagerEl = document.getElementById("pager");
        let currentPage = 1;
        let listMeta = { page: 1, pageSize: PAGE_SIZE, total: 0, totalPages: 0 };

        function bindCancelButtons(items) {
          listEl.querySelectorAll("[data-cancel]").forEach((btn) => {
            btn.onclick = async () => {
              const r = items.find((x) => x.id === Number(btn.dataset.cancel));
              const d = new Date(r.slotDate + "T12:00:00");
              const dow = ["일","월","화","수","목","금","토"][d.getDay()];
              const dateLabel = `${HKUI.formatDateShort(r.slotDate)}(${dow})`;
              const ok = await HKUI.confirmDialog("신청을 취소할까요?", `${dateLabel} <b>${r.startTime}</b> 신청을 취소합니다. 마감 전 취소는 <b>우선권에 영향을 주지 않습니다.</b>`, { confirmLabel: "취소하기", confirmVariant: "danger" });
              if (!ok) return;
              try {
                await HKApi.cancelReservation(Number(btn.dataset.cancel));
                HKUI.toast("신청이 취소되었습니다 · 우선권에는 영향이 없습니다");
                await loadPage(currentPage);
              } catch (e) {
                HKUI.toast(e.message, "danger");
              }
            };
          });
        }

        function renderRecipientList(members, selectedId) {
          if (!members.length) {
            return `<div style="font-size:14px;color:var(--text-muted);padding:16px 0;text-align:center">양도 가능한 회원이 없습니다.</div>`;
          }
          return `<div style="display:flex;flex-direction:column;gap:8px">${members.map((m) => {
            const dept = m.department ? `${HKUI.escapeHtml(m.department)} · ` : "";
            const selected = selectedId === m.id;
            return `<button type="button" class="hk-card hk-card--pad" data-recipient-id="${m.id}" style="text-align:left;cursor:pointer;border:1px solid ${selected ? "var(--color-signal-blue)" : "var(--border-default)"};background:${selected ? "var(--color-signal-blue-soft)" : "var(--surface-card)"};width:100%">
              <div style="display:flex;align-items:center;gap:12px">
                ${HKUI.avatar(m.name, "sm", m.avatarUrl || "")}
                <div style="min-width:0;flex:1">
                  <div style="font-size:15px;font-weight:700;color:var(--color-midnight-navy)">${HKUI.escapeHtml(m.name)}${m.position ? ` <span style="font-size:12px;font-weight:600;color:var(--color-slate-blue)">${HKUI.escapeHtml(m.position)}</span>` : ""}</div>
                  <div style="font-size:12px;color:var(--text-muted)">${dept}${HKUI.escapeHtml(m.email || "")}</div>
                </div>
                ${selected ? HKUI.badge("선택됨", "info") : ""}
              </div>
            </button>`;
          }).join("")}</div>`;
        }

        function closeTransferModal() {
          const el = document.getElementById("transfer-modal-overlay");
          if (el) el.remove();
        }

        async function openTransferModal(reservationId, items) {
          closeTransferModal();
          const r = items.find((x) => x.id === reservationId);
          if (!r) return;
          const d = new Date(r.slotDate + "T12:00:00");
          const dow = ["일","월","화","수","목","금","토"][d.getDay()];
          const dateLabel = `${HKUI.formatDateShort(r.slotDate)}(${dow})`;

          const overlay = document.createElement("div");
          overlay.id = "transfer-modal-overlay";
          overlay.className = "hk-dialog__overlay";
          overlay.innerHTML = `<div class="hk-dialog" role="dialog" style="max-width:560px;max-height:min(90dvh,90vh);width:calc(100% - 32px);overflow:hidden;display:flex;flex-direction:column;padding:0">
            <div style="padding:20px 24px;border-bottom:1px solid var(--border-default);display:flex;align-items:center;justify-content:space-between;gap:12px;flex-shrink:0">
              <div>
                <div style="font-size:20px;font-weight:700;color:var(--color-midnight-navy)">예약 양도</div>
                <div style="font-size:13px;color:var(--text-secondary);margin-top:4px">${dateLabel} ${r.startTime} – ${r.endTime}</div>
              </div>
              <button type="button" class="hk-btn hk-btn--ghost hk-btn--sm" data-modal-close aria-label="닫기">${HKUI.icon("x", 18, "var(--color-slate-blue)")}</button>
            </div>
            <div style="padding:20px 24px;overflow-y:auto;flex:1">
              <div style="margin-bottom:16px">${HKUI.alertBox("info", "즉시 양도 완료", "양도받을 분을 선택한 뒤 양도하면 <b>바로 완료</b>됩니다. 본인 예약은 취소되고 양수인에게 예약이 이전됩니다.")}</div>
              <label style="display:block;font-size:13px;font-weight:600;color:var(--color-midnight-navy);margin-bottom:8px">양도받을 회원 (Teams 로그인 회원)</label>
              <input type="search" class="hk-input" id="transfer-member-search" placeholder="이름, 이메일, 부서로 검색" style="width:100%;margin-bottom:16px">
              <div id="transfer-member-list"><div style="font-size:14px;color:var(--text-muted);padding:16px 0;text-align:center"><span class="hk-spin"></span></div></div>
            </div>
            <div style="padding:16px 24px;border-top:1px solid var(--border-default);display:flex;justify-content:flex-end;gap:10px;flex-shrink:0">
              <button type="button" class="hk-btn hk-btn--secondary" data-modal-close>닫기</button>
              <button type="button" class="hk-btn hk-btn--primary" id="transfer-submit-btn" disabled>양도하기</button>
            </div>
          </div>`;
          overlay.addEventListener("click", (e) => { if (e.target === overlay) closeTransferModal(); });
          overlay.querySelectorAll("[data-modal-close]").forEach((btn) => { btn.onclick = closeTransferModal; });
          document.body.appendChild(overlay);
          HKUI.refreshIcons(overlay);

          const listEl = overlay.querySelector("#transfer-member-list");
          const searchEl = overlay.querySelector("#transfer-member-search");
          const submitBtn = overlay.querySelector("#transfer-submit-btn");
          let selectedId = null;
          let members = [];

          function bindRecipientClicks() {
            listEl.querySelectorAll("[data-recipient-id]").forEach((btn) => {
              btn.onclick = () => {
                selectedId = Number(btn.dataset.recipientId);
                listEl.innerHTML = renderRecipientList(members, selectedId);
                bindRecipientClicks();
                submitBtn.disabled = !selectedId;
              };
            });
          }

          async function loadRecipients(q = "") {
            listEl.innerHTML = `<div style="font-size:14px;color:var(--text-muted);padding:16px 0;text-align:center"><span class="hk-spin"></span></div>`;
            try {
              const data = await HKApi.transferRecipients(reservationId, q);
              members = data.members || [];
              listEl.innerHTML = renderRecipientList(members, selectedId);
              bindRecipientClicks();
            } catch (e) {
              listEl.innerHTML = HKUI.alertBox("danger", "오류", HKUI.escapeHtml(e.message));
            }
          }

          let searchTimer = null;
          searchEl.addEventListener("input", () => {
            clearTimeout(searchTimer);
            searchTimer = setTimeout(() => loadRecipients(searchEl.value.trim()), 280);
          });

          submitBtn.onclick = async () => {
            if (!selectedId) return;
            const picked = members.find((m) => m.id === selectedId);
            const ok = await HKUI.confirmDialog(
              "양도할까요?",
              `<b>${HKUI.escapeHtml(picked?.name || "선택한 회원")}</b>님에게 ${dateLabel} <b>${r.startTime}</b> 예약을 양도합니다. <b>즉시 완료</b>되며 본인 예약은 취소됩니다.`
            );
            if (!ok) return;
            const prevLabel = submitBtn.textContent;
            submitBtn.disabled = true;
            submitBtn.textContent = "양도 중…";
            try {
              await HKApi.requestTransfer(reservationId, selectedId);
              HKUI.toast("양도가 완료되었습니다");
              closeTransferModal();
              await loadPage(currentPage);
            } catch (e) {
              submitBtn.disabled = false;
              submitBtn.textContent = prevLabel;
              HKUI.toast(e.message, "danger");
            }
          };

          await loadRecipients();
          searchEl.focus();
        }

        function bindTransferButtons(items) {
          listEl.querySelectorAll("[data-transfer]").forEach((btn) => {
            btn.onclick = () => openTransferModal(Number(btn.dataset.transfer), items);
          });
        }

        async function loadPage(page) {
          currentPage = page;
          listEl.innerHTML = `<div class="hk-card hk-card--pad" style="text-align:center;padding:32px"><span class="hk-spin"></span></div>`;
          pagerEl.innerHTML = "";
          try {
            const data = await HKApi.myReservations(page, PAGE_SIZE);
            const items = data.items || [];
            listMeta = {
              page: data.page || page,
              pageSize: data.pageSize || PAGE_SIZE,
              total: data.total ?? 0,
              totalPages: data.totalPages ?? 0,
            };
            const totalCountEl = document.getElementById("total-count");
            if (totalCountEl) {
              totalCountEl.innerHTML = HKUI.kvTooltip(
                "누적 신청",
                `${data.activeTotal ?? listMeta.total}건`,
                HKUI.APPLY_TOTAL_TOOLTIP_HTML
              );
            }
            HKUI.bindTooltips(statsEl);

            if (!listMeta.total) {
              listEl.innerHTML = `<div class="hk-card hk-card--pad">${HKUI.emptyState({
                iconName: "calendar-x",
                title: "신청 내역이 없습니다",
                desc: "예약하기에서 차주 안마서비스를 신청해 보세요.",
                actionHtml: `<a href="${HKRoutes.reserve}"><button type="button" class="hk-btn hk-btn--primary">예약하러 가기</button></a>`,
              })}</div>`;
              HKUI.refreshIcons();
              return;
            }

            listEl.innerHTML = `<div style="display:flex;flex-direction:column;gap:12px">${items.map((r) => HKUI.reservationCard(r, { reapplyAvailable: !!r.reapplyAvailable })).join("")}</div>`;
            pagerEl.innerHTML = HKUI.paginationBar(listMeta);
            bindCancelButtons(items);
            bindTransferButtons(items);
            HKUI.bindPagination(pagerEl, listMeta, loadPage);
            HKUI.refreshIcons();
          } catch (e) {
            listEl.innerHTML = `<div class="hk-card hk-card--pad"><div class="hk-empty">${HKUI.escapeHtml(e.message)}</div></div>`;
          }
        }

        const initialPage = Math.max(1, parseInt(HKUI.queryParam("page") || "1", 10) || 1);
        await loadPage(initialPage);
      },
    });
  </script>
</body>
</html>
