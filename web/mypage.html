<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <link rel="icon" href="/assets/logo-mark.svg" type="image/svg+xml">
  <link rel="apple-touch-icon" href="/assets/logo-mark.svg">
  <title>헬스키퍼 — 마이페이지 · 예약 내역</title>
  <link rel="stylesheet" href="/_ds/healthkeeper-ds-31e44bd2-68dd-4c55-91c3-7ca10811b6be/styles.css">
  <link rel="stylesheet" href="/_shared/responsive.css">
  <link rel="stylesheet" href="/_shared/app.css">
  <script src="/_shared/ui.js"></script>
  <script src="/_shared/api.js"></script>
  <script src="/_shared/member-shell.js"></script>
</head>
<body>
  <div id="app"></div>
  <script>
    const PAGE_SIZE = 10;

    HKMember.mountPage({
      active: "mypage",
      auth: true,
      mainStyle: "max-width:1200px;margin:0 auto;padding:36px 32px 72px",
      render(profile) {
        return `
          <h1 style="font-size:34px;margin-bottom:4px">마이페이지</h1>
          <p style="font-size:16px;color:var(--text-secondary);margin:0 0 24px">${HKUI.escapeHtml(profile.name)}님의 예약 신청 내역입니다.</p>
          ${HKUI.subNav("res")}
          <div class="hk-card hk-card--pad hk-card--flat" style="margin-bottom:20px;background:var(--color-mist)" id="stats"></div>
          <div style="margin-bottom:18px">${HKUI.alertBox("info", "예약 상태 안내", "<b>신청</b>은 관리자 확정 후 완료됩니다. 일반 신청은 마감(수 17:00) 전까지 취소할 수 있고, <b>재신청 확정 건은 취소할 수 없어요.</b>")}</div>
          <div id="list"></div>
          <div id="pager"></div>`;
      },
      afterMount: async (profile) => {
        const statsEl = document.getElementById("stats");
        const lastUsed = profile.lastUsedDate ? profile.lastUsedDate.replace(/-/g, ".") : "-";
        const applyTotal = profile.applyTotal != null ? profile.applyTotal : profile.totalUses;
        statsEl.innerHTML = `<div style="display:flex;gap:48px;flex-wrap:wrap">
          ${HKUI.kv("마지막 이용일", lastUsed)}
          ${HKUI.kvTooltip("우선권", HKUI.badge(profile.lastUsedDate ? "이용 이력 있음" : "이력 없음 · 최우선", "info"), HKUI.PRIORITY_TOOLTIP_HTML)}
          <div id="total-count">${HKUI.kvTooltip("누적 신청", applyTotal != null ? `${applyTotal}건` : "…", HKUI.APPLY_TOTAL_TOOLTIP_HTML)}</div>
        </div>`;
        HKUI.bindTooltips(statsEl);
        HKUI.refreshIcons();

        const listEl = document.getElementById("list");
        const pagerEl = document.getElementById("pager");
        let currentPage = 1;
        let reapplyAvailable = false;
        let listMeta = { page: 1, pageSize: PAGE_SIZE, total: 0, totalPages: 0 };

        try {
          const sys = await HKApi.systemState();
          reapplyAvailable = sys.state === "REAPPLY";
        } catch (_) {}

        function bindCancelButtons(items) {
          listEl.querySelectorAll("[data-cancel]").forEach((btn) => {
            btn.onclick = async () => {
              const r = items.find((x) => x.id === Number(btn.dataset.cancel));
              const d = new Date(r.slotDate + "T12:00:00");
              const dow = ["일","월","화","수","목","금","토"][d.getDay()];
              const dateLabel = `${HKUI.formatDateShort(r.slotDate)}(${dow})`;
              const ok = await HKUI.confirmDialog("신청을 취소할까요?", `${dateLabel} <b>${r.startTime}</b> 신청을 취소합니다. 마감 전 취소는 <b>우선권에 영향을 주지 않습니다.</b>`, { confirmLabel: "취소하기", confirmVariant: "danger" });
              if (!ok) return;
              try {
                await HKApi.cancelReservation(Number(btn.dataset.cancel));
                HKUI.toast("신청이 취소되었습니다 · 우선권에는 영향이 없습니다");
                await loadPage(currentPage);
              } catch (e) {
                HKUI.toast(e.message, "danger");
              }
            };
          });
        }

        async function loadPage(page) {
          currentPage = page;
          listEl.innerHTML = `<div class="hk-card hk-card--pad" style="text-align:center;padding:32px"><span class="hk-spin"></span></div>`;
          pagerEl.innerHTML = "";
          try {
            const data = await HKApi.myReservations(page, PAGE_SIZE);
            const items = data.items || [];
            listMeta = {
              page: data.page || page,
              pageSize: data.pageSize || PAGE_SIZE,
              total: data.total ?? 0,
              totalPages: data.totalPages ?? 0,
            };
            document.getElementById("total-count").outerHTML = HKUI.kvTooltip(
              "누적 신청",
              `${data.activeTotal ?? listMeta.total}건`,
              HKUI.APPLY_TOTAL_TOOLTIP_HTML
            );
            HKUI.bindTooltips(statsEl);

            if (!listMeta.total) {
              listEl.innerHTML = `<div class="hk-card hk-card--pad">${HKUI.emptyState({
                iconName: "calendar-x",
                title: "신청 내역이 없습니다",
                desc: "예약하기에서 차주 안마서비스를 신청해 보세요.",
                actionHtml: `<a href="${HKRoutes.reserve}"><button type="button" class="hk-btn hk-btn--primary">예약하러 가기</button></a>`,
              })}</div>`;
              HKUI.refreshIcons();
              return;
            }

            listEl.innerHTML = `<div style="display:flex;flex-direction:column;gap:12px">${items.map((r) => HKUI.reservationCard(r, { reapplyAvailable })).join("")}</div>`;
            pagerEl.innerHTML = HKUI.paginationBar(listMeta);
            bindCancelButtons(items);
            HKUI.bindPagination(pagerEl, listMeta, loadPage);
            HKUI.refreshIcons();
          } catch (e) {
            listEl.innerHTML = `<div class="hk-card hk-card--pad"><div class="hk-empty">${HKUI.escapeHtml(e.message)}</div></div>`;
          }
        }

        const initialPage = Math.max(1, parseInt(HKUI.queryParam("page") || "1", 10) || 1);
        await loadPage(initialPage);
      },
    });
  </script>
</body>
</html>
