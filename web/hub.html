<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <link rel="icon" href="/assets/logo-mark.svg" type="image/svg+xml">
  <link rel="apple-touch-icon" href="/assets/logo-mark.svg">
  <title>헬스키퍼 예약 시스템 — 전체 화면</title>
  <link rel="stylesheet" href="/_ds/healthkeeper-ds-31e44bd2-68dd-4c55-91c3-7ca10811b6be/styles.css">
  <link rel="stylesheet" href="/_shared/responsive.css">
  <link rel="stylesheet" href="/_shared/app.css">
  <script src="/_shared/ui.js"></script>
</head>
<body>
  <header class="hk-mheader-wrap">
    <div class="hk-mheader" style="max-width:1100px">
      <img src="/assets/logo-lockup.svg" alt="헬스키퍼" height="34">
      <div style="flex:1"></div>
      <span style="font-size:13px;color:var(--text-muted)">화면 설계 · 전체 페이지</span>
    </div>
  </header>
  <main style="max-width:1100px;margin:0 auto;padding:48px 32px 72px">
    <div style="margin-bottom:40px;max-width:720px">
      <h1 style="font-size:38px;letter-spacing:-0.02em;margin:0 0 12px;line-height:1.15">아이뱅크 안마서비스(헬스키퍼)<br>예약 시스템 화면</h1>
      <p style="font-size:16.5;color:var(--text-secondary);line-height:1.6;margin:0">사용자(회원) 영역과 관리자 영역으로 나뉘며, 각 화면은 데모 상태 전환·신청·확정 등 주요 상호작용을 포함합니다.</p>
    </div>
    <div class="hub-grid" id="hub"></div>
    <a href="/이메일/index.html" class="hub-card" style="display:flex;align-items:center;gap:18px;padding:22px 24px;background:var(--surface-card);border:1px solid var(--border-default);border-radius:8px;text-decoration:none;color:inherit;margin-top:40px">
      <div style="width:48px;height:48px;border-radius:11px;background:var(--color-signal-blue-soft);display:flex;align-items:center;justify-content:center" id="email-icon"></div>
      <div style="flex:1;min-width:0">
        <div style="display:flex;align-items:center;gap:10px">
          <span class="hk-badge hk-badge--soft">EMAIL</span>
          <span style="font-size:17px;font-weight:700;color:var(--color-midnight-navy)">이메일 템플릿</span>
        </div>
        <div style="font-size:13.5;color:var(--text-secondary);margin-top:3px">예약 완료(일반/재신청) · 탈락/재신청 안내 — 자동/수동 발송</div>
      </div>
      <span id="email-arrow"></span>
    </a>
  </main>
  <footer class="hk-footer">
    <div class="hk-footer-inner" style="max-width:1100px">
      <img src="/assets/logo-mark.svg" width="26" height="26" alt="">
      <span>© 2026 ibank Healthkeeper · 사내 안마서비스 예약 시스템 · 헬스키퍼 디자인 시스템</span>
    </div>
  </footer>
  <script>
    const member = [
      ["home", "서비스 소개 (홈)", "헬스키퍼 안내 · 운영 사이클 · 정책 요약", "index"],
      ["user-plus", "회원가입", "이메일 인증코드 → 기본정보(부서·직급) → 완료", "signup"],
      ["log-in", "로그인", "인증 계정 로그인 · 미인증/실패 처리", "login"],
      ["calendar-days", "예약하기 (캘린더)", "주간 슬롯 · 상태 전환 · 우선권 경합", "reserve"],
      ["rotate-ccw", "탈락자 재신청", "빈 슬롯 선착순 · 즉시 확정 · 충돌 거절", "reapply"],
      ["list-checks", "마이페이지 · 예약 내역", "상태별 내역 · 마감 전 취소", "mypage"],
      ["user-round-cog", "마이페이지 · 계정", "Teams 연동 계정 · 이용 정보", "profile"],
    ];
    const admin = [
      ["shield", "Admin 로그인", "관리자 인증 · 실패 처리", "admin/login"],
      ["layout-dashboard", "대시보드", "현황 통계 · 확정 대기 · 메일 발송 상태", "admin/dashboard"],
      ["calendar-check", "예약 관리", "날짜·상태별 신청 목록 (일반/재신청)", "admin/reservations"],
      ["scale", "신청자 상세 · 우선권", "우선권 자동 정렬 · 확정 · 탈락", "admin/applicant"],
      ["mail", "재신청 안내 메일", "탈락자 선택 · 빈슬롯 안내 · 발송 상태", "admin/reapply-mail"],
      ["palmtree", "휴가 관리", "차주 휴가 지정 · 오픈 후 등록 차단", "admin/vacation"],
      ["settings", "운영 설정", "시간/슬롯 · 오픈마감 · 메일 템플릿", "admin/settings"],
    ];
    function col(tag, tagColor, title, sub, items) {
      return `<section>
        <span class="hk-badge hk-badge--soft" style="background:${tagColor}1a;color:${tagColor}">${tag}</span>
        <h2 style="font-size:24px;margin:10px 0 2px">${title}</h2>
        <p style="font-size:14.5;color:var(--text-secondary);margin:0 0 18px">${sub}</p>
        <div style="display:flex;flex-direction:column;gap:10px">${items.map((it, i) => card(it, i)).join("")}</div>
      </section>`;
    }
    function card([iconName, title, desc, href], i) {
      return `<a href="/${href}" class="hub-card" style="display:flex;align-items:center;gap:14px;padding:16px 18px;background:var(--surface-card);border:1px solid var(--border-default);border-radius:8px;text-decoration:none;color:inherit">
        <span style="font-size:12px;font-weight:700;color:var(--text-muted)">${String(i + 1).padStart(2, "0")}</span>
        <div style="width:42px;height:42px;border-radius:10px;background:var(--color-signal-blue-soft);display:flex;align-items:center;justify-content:center">${HKUI.icon(iconName, 21, "var(--color-signal-blue)")}</div>
        <div style="flex:1;min-width:0"><div style="font-size:15.5px;font-weight:700;color:var(--color-midnight-navy)">${title}</div><div style="font-size:13px;color:var(--text-secondary);margin-top:1px">${desc}</div></div>
        ${HKUI.icon("arrow-right", 18, "var(--color-steel-blue)")}
      </a>`;
    }
    document.getElementById("hub").innerHTML =
      col("MEMBER", "#006bff", "사용자 화면", "회원 · 비회원 · 예약 신청자", member) +
      col("ADMIN", "#0b3558", "Admin 화면", "서비스 운영자", admin);
    document.getElementById("email-icon").innerHTML = HKUI.icon("mail", 24, "var(--color-signal-blue)");
    document.getElementById("email-arrow").innerHTML = HKUI.icon("arrow-right", 18, "var(--color-steel-blue)");
    HKUI.loadLucide().then(() => HKUI.refreshIcons());
  </script>
</body>
</html>
