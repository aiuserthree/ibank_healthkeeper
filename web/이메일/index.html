<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <link rel="icon" href="/assets/logo-mark.svg" type="image/svg+xml">
  <link rel="apple-touch-icon" href="/assets/logo-mark.svg">
  <title>헬스키퍼 — 이메일 템플릿</title>
  <link rel="stylesheet" href="/_ds/healthkeeper-ds-31e44bd2-68dd-4c55-91c3-7ca10811b6be/styles.css">
  <link rel="stylesheet" href="/_shared/responsive.css">
  <link rel="stylesheet" href="/_shared/app.css">
  <script src="/_shared/ui.js"></script>
</head>
<body>
  <header class="hk-mheader-wrap">
    <div class="hk-mheader" style="max-width:1180px">
      <img src="/assets/logo-lockup.svg" alt="헬스키퍼" height="34">
      <div style="flex:1"></div>
      <a href="/index.html" style="font-size:13.5px;color:var(--text-muted);text-decoration:none">← 전체 화면 목록</a>
    </div>
  </header>
  <main style="max-width:1180px;margin:0 auto;padding:48px 32px 72px">
    <div style="margin-bottom:36px;max-width:720px">
      <span class="hk-badge hk-badge--soft">EMAIL</span>
      <h1 style="font-size:36px;letter-spacing:-0.02em;margin:14px 0 12px">이메일 템플릿</h1>
      <p style="font-size:16.5;color:var(--text-secondary);line-height:1.6;margin:0">인증 · 예약 완료(일반·재신청) · 탈락/재신청 안내 등 4종 템플릿입니다. 모든 메일은 테이블 기반 인라인 스타일로 작성되어 메일 클라이언트에서 안전하게 렌더됩니다.</p>
    </div>
    <div class="hk-mail-gallery" id="gallery"></div>
    <div style="margin-top:28px;padding:16px 20px;background:var(--color-fog);border-radius:8px;font-size:13px;color:var(--text-secondary);line-height:1.6">
      제작 메모 — 로고·아이콘은 브라우저 미리보기용 SVG입니다. 실제 발송 시에는 호스팅된 PNG로 교체하고, 발송 시점에 <b>{이름}</b>·<b>{날짜}</b>·<b>{빈슬롯목록}</b>·<b>{인증링크}</b> 변수를 치환하세요.
    </div>
  </main>
  <footer class="hk-footer">
    <div class="hk-footer-inner" style="max-width:1180px">
      <img src="/assets/logo-mark.svg" width="26" height="26" alt="">
      <span>© 2026 ibank Healthkeeper · 메일 발송 정책 기반 템플릿</span>
    </div>
  </footer>
  <script>
    const MAILS = [
      { file: "01-이메일인증.html", icon: "shield-check", tint: "#006bff", bg: "#e6f0ff", subject: "[헬스키퍼] 이메일 인증코드 안내", trigger: "회원가입 1단계 · 인증코드 발송 시", to: "가입 진행자", desc: "6자리 인증코드(5분 유효) 안내" },
      { file: "02-예약완료-일반.html", icon: "circle-check-big", tint: "#1f8a5b", bg: "#e4f4ec", subject: "[헬스키퍼] 예약이 확정되었습니다", trigger: "관리자 확정 시 자동 발송", to: "확정 신청자", desc: "확정 날짜·시간 안내, 마감 전 취소 가능" },
      { file: "03-예약완료-재신청.html", icon: "rotate-ccw", tint: "#004eba", bg: "#e6f0ff", subject: "[헬스키퍼] 재신청 예약이 확정되었습니다", trigger: "재신청 즉시 확정 시 자동 발송", to: "재신청 확정자", desc: "확정 날짜·시간, 취소 불가 강조" },
      { file: "04-탈락-재신청안내.html", icon: "bell-ring", tint: "#c2780c", bg: "#fbf0db", subject: "[헬스키퍼] 탈락 안내 및 재신청 가능 슬롯 안내", trigger: "마감(수 17:00) 시 자동 / 관리자 수동", to: "우선권 탈락자", desc: "빈 슬롯·재신청 시간·선착순·즉시확정·취소불가" },
    ];

    async function previewMailHtml(file) {
      const res = await fetch("/이메일/" + file + "?preview=" + Date.now());
      return await res.text();
    }

    document.getElementById("gallery").innerHTML = MAILS.map((m, idx) => `
      <div class="hk-card hk-mail-card">
        <div class="hk-mail-card__head">
          <div style="display:flex;align-items:center;gap:12px;margin-bottom:14px">
            <div style="width:40px;height:40px;border-radius:10px;background:${m.bg};display:flex;align-items:center;justify-content:center">${HKUI.icon(m.icon, 20, m.tint)}</div>
            <div style="min-width:0">
              <div style="font-size:16px;font-weight:700;color:var(--color-midnight-navy)">${m.subject}</div>
              <div style="font-size:12.5px;color:var(--text-muted);margin-top:2px">헬스키퍼 &lt;no-reply@ibank.co.kr&gt; · 받는사람: ${m.to}</div>
            </div>
          </div>
          <div style="display:flex;gap:8px;flex-wrap:wrap;align-items:center">
            ${HKUI.badge(String(idx + 1).padStart(2, "0"), "soft")}
            ${HKUI.badge(m.trigger, "info")}
            <span style="font-size:13px;color:var(--text-secondary)">${m.desc}</span>
            <div style="flex:1"></div>
            <button type="button" class="hk-mail-open-tab" data-mail-file="${m.file}" style="font-size:13px;font-weight:700;color:var(--color-signal-blue);background:none;border:none;cursor:pointer;display:inline-flex;align-items:center;gap:4px;padding:0">전체로 보기 ${HKUI.icon("external-link", 14, "var(--color-signal-blue)")}</button>
          </div>
        </div>
        <div class="hk-mail-card__preview"><iframe data-mail-file="${m.file}" title="${HKUI.escapeHtml(m.subject)}"></iframe></div>
      </div>`).join("");

    Promise.all(
      Array.from(document.querySelectorAll("iframe[data-mail-file]")).map(async (iframe) => {
        const wrap = document.createElement("div");
        wrap.style.cssText = "width:100%;height:760px";
        iframe.replaceWith(wrap);
        const html = await previewMailHtml(iframe.dataset.mailFile);
        HKUI.mountMailPreviewIframe(wrap, html);
      })
    ).then(() => {
      document.querySelectorAll(".hk-mail-open-tab").forEach((btn) => {
        btn.onclick = async () => {
          const res = await fetch("/이메일/" + btn.dataset.mailFile);
          HKUI.openMailPreviewHtml(await res.text());
        };
      });
      return HKUI.loadLucide().then(() => HKUI.refreshIcons());
    });
  </script>
</body>
</html>
