<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <link rel="icon" href="/assets/logo-mark.svg" type="image/svg+xml">
  <link rel="apple-touch-icon" href="/assets/logo-mark.svg">
  <title>헬스키퍼 관리자 — 예약 관리</title>
  <link rel="stylesheet" href="/_ds/healthkeeper-ds-31e44bd2-68dd-4c55-91c3-7ca10811b6be/styles.css">
  <link rel="stylesheet" href="/_shared/responsive.css">
  <link rel="stylesheet" href="/_shared/app.css">
  <script src="/_shared/ui.js"></script>
  <script src="/_shared/api.js"></script>
  <script src="/_shared/admin-shell.js"></script>
  <script src="/_shared/admin-reservation-board.js"></script>
</head>
<body>
  <div id="app"></div>
  <script>
    const STATE_LABEL = { OPEN: "예약 가능(OPEN)", BEFORE_OPEN: "오픈 전", REAPPLY: "재신청", CLOSED: "마감" };
    let dashData = null;

    function weekSub(boards) {
      if (boards.length > 1) {
        return "이번 주 · 차주 신청 현황을 함께 확인합니다 · 차주 월요일부터 차주 신청만 표시됩니다";
      }
      const b = boards[0];
      if (b?.boardLabel) return b.boardLabel;
      if (b?.weekStart && b?.weekEnd) {
        return `차주 ${HKUI.formatDate(b.weekStart)} – ${HKUI.formatDate(b.weekEnd)} · 날짜별 신청 현황`;
      }
      return "날짜별 신청 현황 · 일반/재신청 구분 · 우선권을 확인하고 확정하세요";
    }

    function dualBoardNotice(boards) {
      if (boards.length < 2) return "";
      return `<div style="margin-bottom:24px">${HKUI.alertBox("info", "이번 주 · 차주 신청 현황 동시 표시", "수요일 09:00 차주 신청 오픈 후 <b>차주 월요일 전까지</b> 이번 주 이용 주차와 차주 신청 현황을 함께 보여줍니다. 차주 월요일부터는 차주 신청만 표시됩니다.")}</div>`;
    }

    function headRight(d) {
      const state = d.state || d.cycleState;
      return `<div style="display:flex;align-items:center;gap:10px;flex-wrap:wrap">
        ${HKUI.badge(STATE_LABEL[state] || state || "-", "info", true)}
        <a href="${HKAdminRoutes.reapplyMail}"><button type="button" class="hk-btn hk-btn--secondary hk-btn--sm">${HKUI.icon("mail", 16, "var(--color-midnight-navy)")} 탈락자 안내 메일</button></a>
      </div>`;
    }

    async function loadVacationDates(cycleId, slots) {
      const holidayDates = (slots || []).filter((s) => s.isHoliday).map((s) => s.slotDate);
      try {
        const vac = cycleId ? await HKApi.vacations(cycleId) : { dates: [] };
        return new Set([...(vac.dates || []), ...holidayDates]);
      } catch (_) {
        return new Set([
          ...(slots || []).filter((s) => s.isVacation).map((s) => s.slotDate),
          ...holidayDates,
        ]);
      }
    }

    HKAdmin.mountPage({
      active: "reservations",
      render() {
        return `${HKAdmin.pageHead("예약 관리", "이번 주 예약 현황을 확인합니다", HKUI.badge("로딩…", "soft"))}<div id="content"></div>`;
      },
      afterMount: async () => {
        try {
          dashData = await HKApi.dashboard();
          const resData = await HKApi.adminReservations();
          const boards = Array.isArray(resData.boards) && resData.boards.length
            ? resData.boards
            : resData.slots || resData.weekDates
              ? [resData]
              : [];
          if (!boards.length) {
            document.getElementById("content").innerHTML = HKUI.alertBox("info", "표시할 신청 현황이 없습니다", "현재 주차에 해당하는 예약 사이클이 없습니다.");
            HKUI.refreshIcons();
            return;
          }
          const primary = boards[0];

          document.querySelector(".hk-amain").firstElementChild.outerHTML = HKAdmin.pageHead(
            "예약 관리",
            weekSub(boards),
            headRight({ ...dashData, cycleState: primary.cycleState, state: primary.cycleState })
          );

          const content = document.getElementById("content");

          async function renderPage(refetchBoards = false) {
            if (refetchBoards) {
              const resData = await HKApi.adminReservations();
              boards.length = 0;
              const next = Array.isArray(resData.boards) && resData.boards.length
                ? resData.boards
                : resData.slots || resData.weekDates
                  ? [resData]
                  : [];
              boards.push(...next);
            }
            content.innerHTML = dualBoardNotice(boards) + `<div id="boards-root"></div>`;
            const root = document.getElementById("boards-root");
            for (let i = 0; i < boards.length; i++) {
              const board = boards[i];
              const vacationDates = await loadVacationDates(board.cycleId, board.slots);
              const section = document.createElement("section");
              section.style.marginBottom = i < boards.length - 1 ? "40px" : "0";
              root.appendChild(section);
              HKReservationBoard.mount(section, board, vacationDates, boards.length > 1);
            }
            HKUI.refreshIcons();
          }

          await renderPage();
        } catch (e) {
          const content = document.getElementById("content");
          if (content) {
            content.innerHTML = HKUI.alertBox("danger", "불러오기 실패", HKUI.escapeHtml(e.message || "예약 현황을 불러오지 못했습니다."));
            HKUI.refreshIcons();
          }
        }
      },
    });
  </script>
</body>
</html>
