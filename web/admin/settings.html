<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <link rel="icon" href="/assets/logo-mark.svg" type="image/svg+xml">
  <link rel="apple-touch-icon" href="/assets/logo-mark.svg">
  <title>헬스키퍼 관리자 — 운영 설정</title>
  <link rel="stylesheet" href="/_ds/healthkeeper-ds-31e44bd2-68dd-4c55-91c3-7ca10811b6be/styles.css">
  <link rel="stylesheet" href="/_shared/responsive.css">
  <link rel="stylesheet" href="/_shared/app.css">
  <script src="/_shared/ui.js"></script>
  <script src="/_shared/api.js"></script>
  <script src="/_shared/admin-shell.js"></script>
</head>
<body>
  <div id="app"></div>
  <script>
    const MAIL_TPL = {
      confirm: { label: "예약 완료 메일 (일반)", file: "/이메일/02-예약완료-일반.html", previewFile: "/이메일/preview/02-예약완료-일반.html", apiType: "RESERVE_DONE_NORMAL", subject: "[헬스키퍼] 예약이 확정되었습니다", body: "안녕하세요, {이름}님.\n신청하신 안마서비스 예약이 관리자 확정으로 완료되었습니다. 아래 일정에 맞춰 방문해 주세요." },
      "confirm-re": { label: "예약 완료 메일 (재신청)", file: "/이메일/03-예약완료-재신청.html", previewFile: "/이메일/preview/03-예약완료-재신청.html", apiType: "RESERVE_DONE_REAPPLY", subject: "[헬스키퍼] 재신청 예약이 확정되었습니다", body: "안녕하세요, {이름}님.\n선착순 재신청이 즉시 확정되었습니다. 아래 일정으로 안마서비스가 예약되었어요." },
      reapply: { label: "탈락 / 재신청 안내 메일", file: "/이메일/04-탈락-재신청안내.html", previewFile: "/이메일/preview/04-탈락-재신청안내.html", apiType: "DROP_REAPPLY_NOTICE", subject: "[헬스키퍼] 탈락 안내 및 재신청 가능 슬롯 안내", body: "안녕하세요, {이름}님.\n신청하신 시간대는 우선권(마지막 이용일)에 따라 다른 분께 확정되어 탈락 처리되었습니다. 아래 비어있는 슬롯에 선착순으로 재신청하실 수 있어요." },
    };
    let settings = {};
    let tplKey = "confirm";

    function s(key, fallback = "") {
      return settings[key] ?? fallback;
    }

    function lockedNotice(text) {
      return `<div style="padding:10px 12px;background:#fff8e6;border:1px solid #f0dfa8;border-radius:var(--radius-sm);font-size:12.5px;color:var(--text-secondary);line-height:1.6">${text}</div>`;
    }

    HKAdmin.mountPage({
      active: "settings",
      render() {
        return `${HKAdmin.pageHead("운영 설정", "운영 일정 조회 · 메일 템플릿 편집", "")}
          <div style="display:grid;grid-template-columns:1fr 1fr;gap:16px;align-items:start" id="sections"></div>
          <div style="margin-top:16px" id="mail-editor"></div>`;
      },
      afterMount: async () => {
        settings = await HKApi.settings();
        const openDow = HKUI.normDow(s("open.dow", "WED"));
        const reapplyStartDow = HKUI.normDow(s("reapply.start.dow", "THU"));
        const reapplyCloseDow = HKUI.normDow(s("reapply.close.dow", "THU"));

        document.getElementById("sections").innerHTML = `
          ${HKAdmin.sectionCard("clock", "운영 시간 · 슬롯", "기본 13:30~17:00, 하루 4타임", `<div style="display:flex;flex-direction:column;gap:12px">
            ${lockedNotice("운영 시간·슬롯 구성은 <b>시스템 기본값으로 고정</b>되어 있습니다. 변경이 필요하면 <b>시스템 관리자</b>에게 문의해 주세요.")}
            <div class="hk-time-pair-row">${HKUI.fieldTimeAmPm("운영 시작", "operating_start", s("operating_start", "13:30"), { disabled: true })}${HKUI.fieldTimeAmPm("운영 종료", "operating_end", s("operating_end", "17:00"), { disabled: true })}</div>
            <div style="display:grid;grid-template-columns:1fr 1fr;gap:12px">${HKUI.fieldInput("타임 길이 (분)", "slot_duration", { value: s("slot_duration", "30"), disabled: true })}${HKUI.fieldInput("휴식 시간 (분)", "slot_break", { value: s("slot_break", "30"), disabled: true })}</div>
            <div style="padding:10px 12px;background:var(--color-mist);border-radius:var(--radius-sm);font-size:12.5px;color:var(--text-secondary)">현재 슬롯 — 13:30 / 14:30 / 15:30 / 16:30 · 주당 최대 20슬롯</div>
          </div>`)}
          ${HKAdmin.sectionCard("calendar-clock", "예약 오픈 / 마감", "현재 수요일 09:00 예약 오픈 · 17:00 마감", `<div style="display:flex;flex-direction:column;gap:12px">
            ${lockedNotice("예약 오픈·마감 요일/시간은 <b>시스템 기본값으로 고정</b>되어 있습니다. 변경이 필요하면 <b>시스템 관리자</b>에게 문의해 주세요.")}
            ${HKUI.fieldSelect("예약 오픈 요일", "open.dow", HKUI.WEEKDAY_OPTIONS, { value: openDow, disabled: true })}
            <div class="hk-time-pair-row">${HKUI.fieldTimeAmPm("예약 오픈", "open.time", s("open.time", "09:00"), { disabled: true })}${HKUI.fieldTimeAmPm("예약 마감", "close.time", s("close.time", "17:00"), { disabled: true })}</div>
          </div>`)}
          ${HKAdmin.sectionCard("rotate-ccw", "재신청 창", "탈락자 한정 · 선착순 · 즉시 확정", `<div style="display:flex;flex-direction:column;gap:12px">
            ${lockedNotice("재신청 시작·마감 요일/시간은 <b>시스템 기본값으로 고정</b>되어 있습니다. 변경이 필요하면 <b>시스템 관리자</b>에게 문의해 주세요.")}
            <div class="hk-time-pair-row">${HKUI.fieldSelect("재신청 시작 요일", "reapply.start.dow", HKUI.WEEKDAY_OPTIONS, { value: reapplyStartDow, disabled: true })}${HKUI.fieldTimeAmPm("재신청 시작", "reapply.start.time", s("reapply.start.time", "09:00"), { disabled: true })}</div>
            <div class="hk-time-pair-row">${HKUI.fieldSelect("재신청 마감 요일", "reapply.close.dow", HKUI.WEEKDAY_OPTIONS, { value: reapplyCloseDow, disabled: true })}${HKUI.fieldTimeAmPm("재신청 마감", "reapply.close.time", s("reapply.close.time", "17:00"), { disabled: true })}</div>
            <div style="padding:10px 12px;background:var(--color-mist);border-radius:var(--radius-sm);font-size:12.5px;color:var(--text-secondary);line-height:1.6">
              <div style="font-weight:600;color:var(--color-midnight-navy);margin-bottom:6px">재신청 확정 방식</div>
              <ul style="margin:0;padding-left:18px;display:flex;flex-direction:column;gap:4px">
                <li><b>즉시 확정 · 취소 불가</b> — 슬롯 선택 시 바로 확정됩니다. 재신청 건은 취소할 수 없습니다.</li>
                <li><b>동시 신청 보호</b> — 같은 슬롯에 동시에 들어와도 한 명만 확정됩니다. (DB 슬롯 락)</li>
              </ul>
            </div>
          </div>`)}
          ${HKAdmin.sectionCard("mail", "메일 자동 발송", "발송 시점별 자동화 설정", `<div style="display:flex;flex-direction:column;gap:12px">
            <div style="padding:10px 12px;background:var(--color-mist);border-radius:var(--radius-sm);font-size:12.5px;color:var(--text-secondary);line-height:1.6">
              <div style="font-weight:600;color:var(--color-midnight-navy);margin-bottom:6px">자동 발송 시점</div>
              <ul style="margin:0;padding-left:18px;display:flex;flex-direction:column;gap:4px">
                <li><b>예약 완료 메일</b> — 관리자 확정·재신청 즉시 확정 시 자동 발송됩니다.</li>
                <li><b>탈락 / 재신청 안내</b> — 예약 마감 배치 후(목요일 09:00) 탈락자에게 자동 발송됩니다.</li>
              </ul>
            </div>
          </div>`)}`;

        document.getElementById("mail-editor").innerHTML = HKAdmin.sectionCard("file-text", "메일 템플릿", "발송 메일 양식을 관리합니다", `
          <div style="display:grid;grid-template-columns:1fr 1fr;gap:16px;align-items:start">
            <div style="display:flex;flex-direction:column;gap:12px;min-width:0">
              ${HKUI.fieldSelect("템플릿 선택", "tpl-select", Object.entries(MAIL_TPL).map(([k, t]) => [k, t.label]), { value: tplKey })}
              <div class="hk-field"><label class="hk-field__label">메일 제목</label><input class="hk-input" id="tpl-subject"></div>
              <div class="hk-field" style="flex:1"><label class="hk-field__label">메일 본문 (인사·안내 문단)</label><textarea class="hk-textarea" id="tpl-body" rows="8" placeholder="안내 박스(회색·노란 영역)는 export 디자인 고정 · 본문만 수정"></textarea></div>
            </div>
            <div style="display:flex;flex-direction:column;gap:8px;min-width:0">
              <div style="font-size:12.5px;font-weight:600;color:var(--text-secondary)">발송 레이아웃 미리보기 (export 디자인 기준)</div>
              <div id="tpl-live-preview" style="background:#eef1f6;border:1px solid var(--border-default);border-radius:var(--radius-sm);overflow:hidden;height:980px"></div>
            </div>
          </div>
          <p id="tpl-design-note" style="margin:10px 0 0;font-size:12.5px;color:var(--text-muted);line-height:1.6"></p>
          <div style="margin-top:14px;display:flex;gap:10px;align-items:center;flex-wrap:wrap">
            <button type="button" class="hk-btn hk-btn--secondary hk-btn--sm" id="save-tpl">템플릿 저장</button>
            <button type="button" class="hk-btn hk-btn--ghost hk-btn--sm" id="restore-tpl">기본값 복원</button>
            <span style="font-size:12.5px;color:var(--text-muted)">· 본문 수정 시 미리보기 반영 · 안내 박스는 고정 · {이름} 등은 발송 시 치환</span>
          </div>`);

        const subjectEl = document.getElementById("tpl-subject");
        const bodyEl = document.getElementById("tpl-body");
        const designNoteEl = document.getElementById("tpl-design-note");
        const livePreviewEl = document.getElementById("tpl-live-preview");
        let revokeLivePreview = null;
        let previewTimer = null;

        function updateDesignNote(t, data) {
          if (!designNoteEl) return;
          if (data?.usesDesignHtml) {
            designNoteEl.textContent =
              "좌측은 본문(인사·안내 문단)만 편집합니다. 버튼 아래 안내 박스·푸터는 export 디자인 고정입니다.";
          } else {
            designNoteEl.textContent = "발송 시 아래 텍스트가 그대로 사용됩니다.";
          }
        }

        async function fetchMailPreviewHtml() {
          const t = MAIL_TPL[tplKey];
          const useExport = HKUI.shouldUseExportPreview(bodyEl.value, t.body);
          const res = await fetch(t.previewFile + "?t=" + Date.now());
          if (!res.ok) throw new Error(res.status);
          let html = await res.text();
          if (!useExport) {
            html = HKUI.applyMailBodyPlainToDesign(html, bodyEl.value, t.body);
          }
          return { html, useExport, t };
        }

        async function refreshLivePreview() {
          if (!livePreviewEl) return;
          try {
            const { html, useExport, t } = await fetchMailPreviewHtml();
            if (revokeLivePreview) revokeLivePreview();
            revokeLivePreview = HKUI.mountMailPreviewIframe(
              livePreviewEl, html, undefined, t.apiType, useExport, useExport ? t.previewFile : null
            );
          } catch (_) {
            livePreviewEl.innerHTML = `<p style="padding:24px;color:var(--text-muted);font-size:13px">미리보기를 불러올 수 없습니다.</p>`;
          }
        }

        function scheduleLivePreview() {
          clearTimeout(previewTimer);
          previewTimer = setTimeout(refreshLivePreview, 300);
        }

        async function loadTpl() {
          const t = MAIL_TPL[tplKey];
          subjectEl.value = t.subject || "";
          bodyEl.value = t.body || "";
          try {
            const data = await HKApi.mailTemplate(t.apiType);
            if (data.subjectTemplate) subjectEl.value = data.subjectTemplate;
            if (data.bodyTemplate) {
              bodyEl.value = HKUI.normalizeMailBodyForEditor(data.bodyTemplate, t.body);
            }
            updateDesignNote(t, data);
          } catch (_) {
            updateDesignNote(t, { usesDesignHtml: true });
          }
          await refreshLivePreview();
        }
        document.getElementById("tpl-select").onchange = async (e) => { tplKey = e.target.value; await loadTpl(); };
        subjectEl.addEventListener("input", scheduleLivePreview);
        bodyEl.addEventListener("input", scheduleLivePreview);
        await loadTpl();
        HKUI.bindTimeAmPmFields(document.getElementById("sections"));
        document.getElementById("sections").addEventListener("change", (e) => {
          if (e.target.closest("[data-time-field]")) HKUI.bindTimeAmPmFields(document.getElementById("sections"));
        });

        document.getElementById("save-tpl").onclick = async () => {
          const t = MAIL_TPL[tplKey];
          const ok = await HKUI.confirmDialog(
            "템플릿을 저장할까요?",
            `${t.label} 제목·본문을 저장합니다. 다음 발송 메일부터 반영됩니다.`,
            { confirmLabel: "저장하기" }
          );
          if (!ok) return;
          try {
            await HKApi.updateMailTemplate(t.apiType, {
              subjectTemplate: subjectEl.value,
              bodyTemplate: bodyEl.value,
            });
            await HKUI.confirmDialog(
              "저장되었습니다",
              "메일 템플릿이 저장되었습니다.",
              { confirmLabel: "확인", hideCancel: true }
            );
          } catch (e) {
            await HKUI.confirmDialog(
              "저장할 수 없습니다",
              HKUI.escapeHtml(e.message),
              { confirmLabel: "확인", hideCancel: true }
            );
          }
        };

        document.getElementById("restore-tpl").onclick = async () => {
          const t = MAIL_TPL[tplKey];
          const ok = await HKUI.confirmDialog(
            "기본값으로 복원할까요?",
            `${t.label} 제목·본문을 기본 문구로 되돌립니다.`,
            { confirmLabel: "복원하기" }
          );
          if (!ok) return;
          subjectEl.value = t.subject;
          bodyEl.value = t.body;
          try {
            await HKApi.updateMailTemplate(t.apiType, {
              subjectTemplate: t.subject,
              bodyTemplate: t.body,
            });
            await refreshLivePreview();
            await HKUI.confirmDialog(
              "복원되었습니다",
              "기본 문구로 복원·저장되었습니다.",
              { confirmLabel: "확인", hideCancel: true }
            );
          } catch (e) {
            await HKUI.confirmDialog(
              "복원할 수 없습니다",
              HKUI.escapeHtml(e.message),
              { confirmLabel: "확인", hideCancel: true }
            );
          }
        };

        HKUI.refreshIcons();
      },
    });
  </script>
</body>
</html>
