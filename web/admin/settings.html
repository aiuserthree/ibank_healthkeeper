<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>헬스키퍼 관리자 — 운영 설정</title>
  <link rel="stylesheet" href="/_ds/healthkeeper-ds-31e44bd2-68dd-4c55-91c3-7ca10811b6be/styles.css">
  <link rel="stylesheet" href="/_shared/responsive.css">
  <link rel="stylesheet" href="/_shared/app.css">
  <script src="/_shared/ui.js"></script>
  <script src="/_shared/api.js"></script>
  <script src="/_shared/admin-shell.js"></script>
</head>
<body>
  <div id="app"></div>
  <script>
    const MAIL_TPL = {
      confirm: { label: "예약 완료 메일 (일반)", file: "/이메일/02-예약완료-일반.html", apiType: "RESERVE_DONE_NORMAL", subject: "[헬스키퍼] 예약이 확정되었습니다", body: "안녕하세요, {이름}님.\n신청하신 안마서비스 예약이 관리자 확정으로 완료되었습니다.\n\n날짜: {날짜}\n시간: {시간}\n\n· 일반 신청 취소는 마감(수요일 17:00) 전까지 가능합니다." },
      "confirm-re": { label: "예약 완료 메일 (재신청)", file: "/이메일/03-예약완료-재신청.html", apiType: "RESERVE_DONE_REAPPLY", subject: "[헬스키퍼] 재신청 예약이 확정되었습니다", body: "안녕하세요, {이름}님.\n선착순 재신청이 즉시 확정되었습니다.\n\n날짜: {날짜}\n시간: {시간}\n\n· 재신청 건은 취소할 수 없습니다." },
      reapply: { label: "탈락 / 재신청 안내 메일", file: "/이메일/04-탈락-재신청안내.html", apiType: "DROP_REAPPLY_NOTICE", subject: "[헬스키퍼] 탈락 안내 및 재신청 가능 슬롯 안내", body: "안녕하세요, {이름}님.\n신청하신 시간대는 우선권에 따라 탈락 처리되었습니다.\n\n비어있는 슬롯: {빈슬롯목록}\n재신청 시작: {재신청시작}\n재신청 마감: {재신청마감}\n\n· 재신청 건은 취소할 수 없습니다." },
    };
    let settings = {};
    let tplKey = "reapply";

    function s(key, fallback = "") {
      return settings[key] ?? fallback;
    }

    HKAdmin.mountPage({
      active: "settings",
      render() {
        return `${HKAdmin.pageHead("운영 설정", "운영 시간 · 예약 오픈/마감 · 재신청 창 · 메일 템플릿", `<button type="button" class="hk-btn hk-btn--primary" id="save-all">설정 저장</button>`)}
          <div style="display:grid;grid-template-columns:1fr 1fr;gap:16px;align-items:start" id="sections"></div>
          <div style="margin-top:16px" id="mail-editor"></div>
          <div id="preview-overlay" style="display:none;position:fixed;inset:0;background:rgba(11,53,88,0.4);backdrop-filter:blur(2px);z-index:300;align-items:center;justify-content:center;padding:24px"></div>`;
      },
      afterMount: async () => {
        settings = await HKApi.settings();
        const openDow = HKUI.normDow(s("open.dow", "WED"));
        const reapplyStartDow = HKUI.normDow(s("reapply.start.dow", "THU"));
        const reapplyCloseDow = HKUI.normDow(s("reapply.close.dow", "THU"));

        document.getElementById("sections").innerHTML = `
          ${HKAdmin.sectionCard("clock", "운영 시간 · 슬롯", "기본 13:30~17:00, 하루 4타임", `<div style="display:flex;flex-direction:column;gap:12px">
            <div class="hk-time-pair-row">${HKUI.fieldTimeAmPm("운영 시작", "operating_start", s("operating_start", "13:30"))}${HKUI.fieldTimeAmPm("운영 종료", "operating_end", s("operating_end", "17:00"))}</div>
            <div style="display:grid;grid-template-columns:1fr 1fr;gap:12px">${HKUI.fieldInput("타임 길이 (분)", "slot_duration", { value: s("slot_duration", "30") })}${HKUI.fieldInput("휴식 시간 (분)", "slot_break", { value: s("slot_break", "30") })}</div>
            <div style="padding:10px 12px;background:var(--color-mist);border-radius:var(--radius-sm);font-size:12.5px;color:var(--text-secondary)">현재 슬롯 — 13:30 / 14:30 / 15:30 / 16:30 · 주당 최대 20슬롯</div>
          </div>`)}
          ${HKAdmin.sectionCard("calendar-clock", "예약 오픈 / 마감", "현재 수요일 09:00 예약 오픈 · 17:00 마감", `<div style="display:flex;flex-direction:column;gap:12px">
            ${HKUI.fieldSelect("예약 오픈 요일", "open.dow", HKUI.WEEKDAY_OPTIONS, { value: openDow })}
            <div class="hk-time-pair-row">${HKUI.fieldTimeAmPm("예약 오픈", "open.time", s("open.time", "09:00"))}${HKUI.fieldTimeAmPm("예약 마감", "close.time", s("close.time", "17:00"))}</div>
          </div>`)}
          ${HKAdmin.sectionCard("rotate-ccw", "재신청 창", "탈락자 한정 · 선착순 · 즉시 확정", `<div style="display:flex;flex-direction:column;gap:12px">
            <div class="hk-time-pair-row">${HKUI.fieldSelect("재신청 시작 요일", "reapply.start.dow", HKUI.WEEKDAY_OPTIONS, { value: reapplyStartDow })}${HKUI.fieldTimeAmPm("재신청 시작", "reapply.start.time", s("reapply.start.time", "09:00"))}</div>
            <div class="hk-time-pair-row">${HKUI.fieldSelect("재신청 마감 요일", "reapply.close.dow", HKUI.WEEKDAY_OPTIONS, { value: reapplyCloseDow })}${HKUI.fieldTimeAmPm("재신청 마감", "reapply.close.time", s("reapply.close.time", "17:00"))}</div>
            <label class="hk-switch"><input type="checkbox" name="reapply_instant" ${s("reapply_instant", "true") !== "false" ? "checked" : ""}><span class="hk-switch__track"><span class="hk-switch__thumb"></span></span>재신청 즉시 확정 (취소 불가)</label>
            <label class="hk-switch"><input type="checkbox" name="reapply_lock" checked disabled><span class="hk-switch__track"><span class="hk-switch__thumb"></span></span>동시 신청 시 슬롯 락 처리</label>
          </div>`)}
          ${HKAdmin.sectionCard("mail", "메일 자동 발송", "발송 시점별 자동화 설정", `<div style="display:flex;flex-direction:column;gap:12px">
            <label class="hk-switch"><input type="checkbox" name="mail_confirm" checked disabled><span class="hk-switch__track"><span class="hk-switch__thumb"></span></span>예약 완료 메일 자동 발송 (확정 시)</label>
            <label class="hk-switch"><input type="checkbox" name="mail_reapply" checked disabled><span class="hk-switch__track"><span class="hk-switch__thumb"></span></span>탈락 / 재신청 안내 자동 발송 (목요일 09:00)</label>
            <label class="hk-switch"><input type="checkbox" name="mail_retry" checked disabled><span class="hk-switch__track"><span class="hk-switch__thumb"></span></span>발송 실패 시 재시도 큐 사용</label>
          </div>`)}`;

        document.getElementById("mail-editor").innerHTML = HKAdmin.sectionCard("file-text", "메일 템플릿", "발송 메일 양식을 관리합니다", `
          <div style="display:grid;grid-template-columns:1fr 1fr;gap:16px">
            <div style="display:flex;flex-direction:column;gap:12px">
              ${HKUI.fieldSelect("템플릿 선택", "tpl-select", Object.entries(MAIL_TPL).map(([k, t]) => [k, t.label]), { value: tplKey })}
              <div class="hk-field"><label class="hk-field__label">메일 제목</label><input class="hk-input" id="tpl-subject"></div>
            </div>
            <div class="hk-field"><label class="hk-field__label">메일 내용 (텍스트 요약)</label><textarea class="hk-textarea" id="tpl-body" rows="8"></textarea></div>
          </div>
          <p id="tpl-design-note" style="margin:10px 0 0;font-size:12.5px;color:var(--text-muted);line-height:1.6"></p>
          <div style="margin-top:14px;display:flex;gap:10px;align-items:center;flex-wrap:wrap">
            <button type="button" class="hk-btn hk-btn--primary hk-btn--sm" id="preview-btn">${HKUI.icon("eye", 16, "#fff")} 미리보기</button>
            <button type="button" class="hk-btn hk-btn--secondary hk-btn--sm" id="save-tpl">템플릿 저장</button>
            <button type="button" class="hk-btn hk-btn--ghost hk-btn--sm" id="restore-tpl">기본값 복원</button>
            <span style="font-size:12.5px;color:var(--text-muted)">· {이름} {날짜} {시간} 등 변수는 발송 시 치환됩니다 · 실제 발송 레이아웃은 미리보기 HTML 기준</span>
          </div>`);

        const subjectEl = document.getElementById("tpl-subject");
        const bodyEl = document.getElementById("tpl-body");
        const designNoteEl = document.getElementById("tpl-design-note");

        function updateDesignNote(t, data) {
          if (!designNoteEl) return;
          if (data?.usesDesignHtml) {
            designNoteEl.textContent =
              "실제 발송 메일은 디자인 HTML 템플릿으로 전송됩니다. 아래 텍스트는 문구 참고용이며, 미리보기에서 최종 화면을 확인하세요.";
          } else {
            designNoteEl.textContent = "발송 시 아래 텍스트가 그대로 사용됩니다.";
          }
        }

        async function loadTpl() {
          const t = MAIL_TPL[tplKey];
          subjectEl.value = t.subject || "";
          bodyEl.value = t.body || "";
          try {
            const data = await HKApi.mailTemplate(t.apiType);
            if (data.subjectTemplate) subjectEl.value = data.subjectTemplate;
            updateDesignNote(t, data);
          } catch (_) {
            updateDesignNote(t, { usesDesignHtml: true });
          }
        }
        document.getElementById("tpl-select").onchange = async (e) => { tplKey = e.target.value; await loadTpl(); };
        await loadTpl();
        HKUI.bindTimeAmPmFields(document.getElementById("sections"));
        document.getElementById("sections").addEventListener("change", (e) => {
          if (e.target.closest("[data-time-field]")) HKUI.bindTimeAmPmFields(document.getElementById("sections"));
        });

        document.getElementById("save-all").onclick = async () => {
          const ok = await HKUI.confirmDialog(
            "운영 설정을 저장할까요?",
            "운영 시간, 예약 오픈/마감, 재신청 창 설정이 저장됩니다.",
            { confirmLabel: "저장하기" }
          );
          if (!ok) return;
          HKUI.bindTimeAmPmFields(document.getElementById("sections"));
          const updates = { ...settings };
          document.querySelectorAll("#sections input[name], #sections select[name]").forEach((inp) => {
            if (inp.disabled) return;
            if (inp.type === "checkbox") updates[inp.name] = inp.checked ? "true" : "false";
            else if (inp.name === "open.dow" || inp.name === "reapply.start.dow" || inp.name === "reapply.close.dow") updates[inp.name] = HKUI.dowToApi(inp.value);
            else updates[inp.name] = inp.value;
          });
          try {
            await HKApi.updateSettings(updates);
            settings = updates;
            await HKUI.confirmDialog(
              "저장되었습니다",
              "운영 설정이 저장되었습니다.",
              { confirmLabel: "확인", hideCancel: true }
            );
          } catch (e) {
            await HKUI.confirmDialog(
              "저장할 수 없습니다",
              HKUI.escapeHtml(e.message),
              { confirmLabel: "확인", hideCancel: true }
            );
          }
        };

        document.getElementById("save-tpl").onclick = async () => {
          try {
            await HKApi.updateMailTemplate(MAIL_TPL[tplKey].apiType, {
              subjectTemplate: subjectEl.value,
              bodyTemplate: bodyEl.value,
            });
            HKUI.toast("메일 템플릿이 저장되었습니다");
          } catch (e) {
            HKUI.toast(e.message, "danger");
          }
        };

        document.getElementById("restore-tpl").onclick = () => {
          const t = MAIL_TPL[tplKey];
          subjectEl.value = t.subject;
          bodyEl.value = t.body;
          HKUI.toast("기본 문구로 복원했습니다");
        };

        function mailPreviewVars() {
          const origin = window.location.origin;
          const chip = "display:inline-block;margin:0 6px 6px 0;padding:6px 12px;background:#ffffff;border:1px solid #d4e0ed;border-radius:999px;font-size:13px;color:#0b3558;";
          return {
            이름: "김민수",
            name: "김민수",
            날짜: "6월 23일 (화)",
            slotDate: "6월 23일 (화)",
            시간: "15:30 – 16:00",
            slotTime: "15:30 – 16:00",
            logoUrl: origin + "/assets/logo-lockup.svg",
            mypageUrl: origin + "/mypage",
            reapplyUrl: origin + "/reapply",
            재신청시작: "목요일 09:00",
            reapplyOpenAt: "목요일 09:00",
            재신청마감: "목요일 17:00",
            reapplyDeadline: "목요일 17:00",
            빈슬롯목록: "화 6/23 · 13:30, 목 6/25 · 14:30",
            emptySlots: "화 6/23 · 13:30, 목 6/25 · 14:30",
            빈슬롯목록Html:
              `<span style="${chip}">화 6/23 · 13:30</span>` +
              `<span style="${chip}">목 6/25 · 14:30</span>`,
            emptySlotsHtml:
              `<span style="${chip}">화 6/23 · 13:30</span>` +
              `<span style="${chip}">목 6/25 · 14:30</span>`,
          };
        }

        function applyMailPreviewVars(html) {
          let out = html;
          Object.entries(mailPreviewVars()).forEach(([key, value]) => {
            out = out.split("{" + key + "}").join(value);
          });
          return out;
        }

        document.getElementById("preview-btn").onclick = async () => {
          const t = MAIL_TPL[tplKey];
          const overlay = document.getElementById("preview-overlay");
          overlay.style.display = "flex";
          overlay.innerHTML = `<div style="width:660px;max-width:100%;max-height:88vh;background:var(--surface-card);border-radius:var(--radius-md,8px);overflow:hidden;display:flex;flex-direction:column;box-shadow:var(--shadow-lg)" onclick="event.stopPropagation()">
            <div style="display:flex;align-items:center;gap:12px;padding:15px 18px;border-bottom:1px solid var(--border-default)">
              ${HKUI.icon("mail", 18, "var(--color-signal-blue)")}
              <div style="flex:1;min-width:0"><div style="font-size:14px;font-weight:700;color:var(--color-midnight-navy);overflow:hidden;text-overflow:ellipsis;white-space:nowrap">${HKUI.escapeHtml(subjectEl.value || t.label)}</div><div style="font-size:12px;color:var(--text-muted)">${t.label} · 미리보기</div></div>
              <a href="${t.file}" target="_blank" style="font-size:13px;font-weight:600;color:var(--color-signal-blue);text-decoration:none;display:inline-flex;align-items:center;gap:4px">새 창 ${HKUI.icon("external-link", 14, "var(--color-signal-blue)")}</a>
              <button type="button" id="close-preview" aria-label="닫기" style="border:none;background:transparent;cursor:pointer;padding:6px;display:flex">${HKUI.icon("x", 20, "var(--color-slate-blue)")}</button>
            </div>
            <div id="preview-frame-wrap" style="background:#eef1f6;overflow:auto;flex:1;min-height:760px"></div>
          </div>`;
          overlay.onclick = () => { overlay.style.display = "none"; };
          document.getElementById("close-preview").onclick = () => { overlay.style.display = "none"; };
          const wrap = document.getElementById("preview-frame-wrap");
          try {
            const res = await fetch(t.file);
            const html = applyMailPreviewVars(await res.text());
            const iframe = document.createElement("iframe");
            iframe.title = "메일 미리보기";
            iframe.style.cssText = "width:100%;height:760px;border:none;display:block";
            iframe.srcdoc = html;
            wrap.appendChild(iframe);
          } catch (_) {
            wrap.innerHTML = `<p style="padding:24px;color:var(--text-muted)">미리보기를 불러올 수 없습니다.</p>`;
          }
          HKUI.refreshIcons();
        };

        HKUI.refreshIcons();
      },
    });
  </script>
</body>
</html>
