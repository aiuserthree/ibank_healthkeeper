<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <link rel="icon" href="/assets/logo-mark.svg" type="image/svg+xml">
  <link rel="apple-touch-icon" href="/assets/logo-mark.svg">
  <title>헬스키퍼 관리자 — 대시보드</title>
  <link rel="stylesheet" href="/_ds/healthkeeper-ds-31e44bd2-68dd-4c55-91c3-7ca10811b6be/styles.css">
  <link rel="stylesheet" href="/_shared/responsive.css">
  <link rel="stylesheet" href="/_shared/app.css">
  <script src="/_shared/ui.js"></script>
  <script src="/_shared/api.js"></script>
  <script src="/_shared/admin-shell.js"></script>
</head>
<body>
  <div id="app"></div>
  <script>
    const STATE_LABEL = {
      OPEN: "예약 가능(OPEN)",
      BEFORE_OPEN: "오픈 전",
      REAPPLY: "재신청",
      CLOSED: "마감",
    };

    function stateBadge(d) {
      const st = d.state || d.cycleState;
      const label = STATE_LABEL[st] || st || "-";
      return HKUI.badge(`현재 상태 · ${label}`, "info", true);
    }

    function pendingItem(p) {
      const applicants = (p.applicants || []).slice().sort((a, b) => (a.priority_rank || 99) - (b.priority_rank || 99));
      const top = applicants[0];
      const applicantHtml = top
        ? `<div style="display:flex;align-items:center;gap:10px;min-width:0;flex:1">
            ${HKUI.avatar(top.member_name, "sm", top.avatarUrl || "")}
            <div style="min-width:0">
              <div style="font-size:14px;font-weight:700;color:var(--color-midnight-navy)">${HKUI.escapeHtml(top.member_name)}</div>
              <div style="font-size:12px;color:var(--text-muted);overflow:hidden;text-overflow:ellipsis;white-space:nowrap">${HKUI.escapeHtml(top.member_email || "")}${top.no_history ? " · 이력 없음" : ""}</div>
            </div>
          </div>`
        : "";
      return `<div class="hk-dash-pending-item">
        ${HKUI.icon("clock", 18, "var(--color-slate-blue)")}
        <span style="font-size:15px;font-weight:700;color:var(--color-midnight-navy)">${HKUI.escapeHtml(p.label || p.slotLabel || "-")}</span>
        ${p.count > 1 ? HKUI.badge(`중복 ${p.count}명`, "warning") : ""}
        ${applicantHtml}
      </div>`;
    }

    function mailRow(label, sent, fail) {
      return `<div class="hk-dash-mail-row">
        ${HKUI.icon("mail", 16, "var(--color-slate-blue)")}
        <span style="font-size:13.5px;color:var(--color-midnight-navy);flex:1">${HKUI.escapeHtml(label)}</span>
        ${HKUI.badge(`발송 ${sent}`, "success")}
        ${fail > 0 ? HKUI.badge(`실패 ${fail}`, "danger") : HKUI.badge("실패 0", "soft")}
      </div>`;
    }

    HKAdmin.mountPage({
      active: "dashboard",
      render() {
        return `${HKAdmin.pageHead("대시보드", "이번 주 예약 현황 요약", HKUI.badge("로딩…", "soft"))}<div id="content"></div>`;
      },
      afterMount: async () => {
        const d = await HKApi.dashboard();
        const r = d.reservations || {};
        const m = d.mail || {};
        const pending = d.pendingSlots || [];
        const pendingTotal = d.pendingSlotsTotal ?? pending.length;

        document.querySelector(".hk-amain").firstElementChild.outerHTML = HKAdmin.pageHead(
          "대시보드",
          d.weekLabel || "이번 주 예약 현황 요약",
          stateBadge(d)
        );

        const pendingAlert = (r.requested || pendingTotal)
          ? (d.canConfirm === false
              ? HKUI.alertBox(
                  "info",
                  "신청 접수 중 · 확정은 마감 후",
                  `일반 신청은 우선권(마지막 이용일 → 신청 시각) 기반입니다. ${d.closeAt ? HKUI.formatDeadlineRelative(d.closeAt, "17:00") : "수요일 17:00"} 마감 후 우선권에 따라 자동 확정됩니다.`
                )
              : HKUI.alertBox(
                  "warning",
                  "확정 대기 중인 신청이 있습니다",
                  "마감 후 우선권(마지막 이용일 → 신청 시각)으로 자동 확정됩니다. 월요일 15:30만 관리자 지정이 필요합니다."
                ))
          : "";

        let pendingListHtml = "";
        if (pending.length) {
          pendingListHtml = pending.map(pendingItem).join("");
        } else if ((r.requested || 0) > 0) {
          pendingListHtml = `<div style="font-size:13px;color:var(--text-secondary);padding:8px 0">신청 ${r.requested}건 — <a href="${HKAdminRoutes.reservations}">예약 관리</a>에서 확인하세요.</div>`;
        } else {
          pendingListHtml = `<div style="font-size:13px;color:var(--text-muted);padding:12px 0">확정 대기 슬롯이 없습니다.</div>`;
        }

        document.getElementById("content").innerHTML = `
          ${pendingAlert}
          <div class="hk-dash-stats">
            ${HKUI.statCard("inbox", r.total || 0, "이번 주 신청", { bg: "var(--color-signal-blue-soft)", fg: "var(--color-signal-blue)" })}
            ${HKUI.statCard("circle-check-big", r.confirmed || 0, "확정 완료", { bg: "var(--color-success-soft)", fg: "var(--color-success)" })}
            ${HKUI.statCard("hourglass", r.pending || r.requested || 0, "확정 대기", { bg: "var(--color-warning-soft)", fg: "var(--color-warning)" })}
            ${HKUI.statCard("user-x", r.dropped || 0, "탈락", { bg: "var(--color-danger-soft)", fg: "var(--color-danger)" })}
          </div>
          <div class="hk-dash-split">
            <div class="hk-card hk-card--pad">
              <div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:16px;flex-wrap:wrap;gap:8px">
                <h2 style="font-size:20px;margin:0">확정 대기 슬롯${pendingTotal ? ` <span style="font-size:14px;font-weight:600;color:var(--text-muted)">(${pendingTotal}건)</span>` : ""}</h2>
                <a href="${HKAdminRoutes.reservations}"><button type="button" class="hk-btn hk-btn--secondary hk-btn--sm">예약 관리로 ${HKUI.icon("arrow-right", 16, "var(--color-midnight-navy)")}</button></a>
              </div>
              <div class="hk-dash-pending">${pendingListHtml}</div>
            </div>
            <div class="hk-card hk-card--pad">
              <h2 style="font-size:20px;margin:0 0 16px">메일 발송 상태</h2>
              <div style="display:flex;flex-direction:column;gap:12px">
                ${mailRow("예약 완료 메일 (일반)", m.confirmSent || 0, m.confirmFail || 0)}
                ${mailRow("예약 완료 메일 (재신청)", m.confirmReapplySent || 0, m.confirmReapplyFail || 0)}
                ${mailRow("탈락/재신청 안내 메일", m.reapplySent || 0, m.reapplyFail || 0)}
              </div>
              <div class="hk-dash-mail-foot">
                <a href="${HKAdminRoutes.reapplyMail}"><button type="button" class="hk-btn hk-btn--secondary hk-btn--block hk-btn--sm">재발송 / 안내 메일 관리</button></a>
              </div>
            </div>
          </div>`;

        HKUI.refreshIcons();
      },
    });
  </script>
</body>
</html>
